<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense — Mini-Game Hub</title>
    <style>
        :root {
            --bg: #0f1117; --panel: #171a23; --panel-2: #1e2230; --border: #2a2f3f;
            --text: #e8eaf2; --muted: #9aa1b5; --accent: #8b5cf6; --accent-2: #22d3ee;
            --good: #34d399; --bad: #f87171; --gold: #fbbf24; --shadow: 0 10px 30px rgba(0,0,0,.35);
        }
        body.light-mode {
            --bg: #eef1f7; --panel: #ffffff; --panel-2: #f3f5fa; --border: #d8dce8;
            --text: #232735; --muted: #5b6274; --shadow: 0 10px 30px rgba(35,39,53,.12);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(900px 450px at 80% -10%, rgba(34,211,238,.10), transparent 60%), var(--bg);
            color: var(--text); transition: background-color .3s, color .3s;
        }
        .topbar {
            width: 100%; max-width: 520px; display: flex; align-items: center;
            justify-content: space-between; gap: 10px; padding: 14px 16px;
        }
        .back { color: var(--muted); text-decoration: none; font-weight: 600; padding: 8px 12px; border-radius: 10px; }
        .back:hover { color: var(--text); background: var(--panel); }
        h1 { font-size: 1.5rem; margin: 0; }
        .top-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: var(--panel); border: 1px solid var(--border); color: var(--text);
            width: 40px; height: 40px; border-radius: 10px; font-size: 1.05rem; cursor: pointer;
        }
        .icon-btn:hover { border-color: var(--accent); }

        .hud { display: flex; gap: 8px; padding: 4px 16px 12px; flex-wrap: wrap; justify-content: center; }
        .stat {
            background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
            padding: 7px 14px; text-align: center; min-width: 74px;
        }
        .stat .label { font-size: .68rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .stat .value { font-size: 1.15rem; font-weight: 800; }
        #money-el .value { color: var(--gold); }
        #lives-el .value { color: var(--bad); }
        #best-el .value { color: var(--gold); }

        .stage { position: relative; width: min(94vw, 380px); }
        canvas {
            display: block; width: 100%; height: auto;
            border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow);
            touch-action: none; cursor: pointer;
        }
        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; gap: 10px;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
            background: rgba(10,12,18,.7); border-radius: 16px; backdrop-filter: blur(2px); z-index: 5;
        }
        .overlay.hidden { display: none; }
        .overlay .big { font-size: 2rem; font-weight: 800; margin: 0; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,.5); }
        .overlay .sub { color: #e8eaf2; margin: 0; text-shadow: 0 1px 4px rgba(0,0,0,.5); }
        .overlay .new-best { color: var(--gold); font-weight: 800; }
        .btn {
            padding: 12px 26px; font-size: 1rem; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 6px 18px rgba(139,92,246,.35); transition: transform .15s;
        }
        .btn:hover { transform: translateY(-2px); }

        .shop { display: flex; gap: 8px; padding: 12px 16px 4px; flex-wrap: wrap; justify-content: center; }
        .tower-btn {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            padding: 9px 14px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--panel); color: var(--text); font-weight: 700; cursor: pointer;
            font-size: .9rem; transition: all .15s ease; min-width: 86px;
        }
        .tower-btn small { color: var(--gold); font-weight: 700; }
        .tower-btn span.desc { color: var(--muted); font-weight: 500; font-size: .68rem; }
        .tower-btn:hover { border-color: var(--accent); }
        .tower-btn.active { border-color: var(--accent); background: var(--panel-2); box-shadow: 0 0 0 2px rgba(139,92,246,.3); }
        .tower-btn.broke { opacity: .45; }
        .wave-btn {
            padding: 11px 22px; border-radius: 12px; border: none; cursor: pointer;
            font-size: .98rem; font-weight: 800; color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            box-shadow: 0 6px 18px rgba(139,92,246,.35);
        }
        .wave-btn:disabled { opacity: .45; cursor: default; box-shadow: none; }
        .hint { color: var(--muted); font-size: .88rem; padding: 10px 16px 20px; text-align: center; max-width: 440px; }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="back" href="index.html">← Hub</a>
        <h1>🗼 Tower Defense</h1>
        <div class="top-actions">
            <button id="sound-btn" class="icon-btn" title="Toggle sound">🔊</button>
            <button id="theme-btn" class="icon-btn" title="Toggle theme">☀️</button>
        </div>
    </header>

    <div class="hud">
        <div class="stat" id="money-el"><div class="label">Gold</div><div class="value" id="money">130</div></div>
        <div class="stat" id="lives-el"><div class="label">Lives</div><div class="value" id="lives">10</div></div>
        <div class="stat"><div class="label">Wave</div><div class="value" id="wave">0</div></div>
        <div class="stat" id="best-el"><div class="label">Best</div><div class="value" id="best">0</div></div>
    </div>

    <div class="stage">
        <canvas id="gameCanvas" width="380" height="546"></canvas>
        <div class="overlay hidden" id="overlay">
            <p class="big" id="ov-title"></p>
            <p class="sub" id="ov-sub"></p>
            <button class="btn" id="ov-btn">Play Again</button>
        </div>
    </div>

    <div class="shop">
        <button class="tower-btn" data-type="blaster">🔫 Blaster<small>50 g</small><span class="desc">fast · single</span></button>
        <button class="tower-btn" data-type="cannon">💥 Cannon<small>90 g</small><span class="desc">slow · splash</span></button>
        <button class="tower-btn" data-type="frost">❄️ Frost<small>60 g</small><span class="desc">chills enemies</span></button>
        <button class="wave-btn" id="wave-btn">▶ Start Wave 1</button>
    </div>

    <p class="hint">Pick a tower, then tap any grass tile to build. Enemies march the sand path — every leak costs lives (bosses cost 3). Clearing a wave pays a <b>+25 g</b> bonus.</p>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        function applyTheme() {
            const light = localStorage.getItem('theme') === 'light';
            document.body.classList.toggle('light-mode', light);
            themeBtn.textContent = light ? '🌙' : '☀️';
        }
        themeBtn.onclick = () => { localStorage.setItem('theme', localStorage.getItem('theme') === 'light' ? 'dark' : 'light'); applyTheme(); };
        applyTheme();

        let muted = localStorage.getItem('mg-muted') === '1', actx;
        const soundBtn = document.getElementById('sound-btn');
        soundBtn.textContent = muted ? '🔇' : '🔊';
        soundBtn.onclick = () => { muted = !muted; localStorage.setItem('mg-muted', muted ? '1' : '0'); soundBtn.textContent = muted ? '🔇' : '🔊'; };
        function beep(freq, dur = 0.08, type = 'square', vol = 0.04, slide = 0) {
            if (muted) return;
            actx = actx || new (window.AudioContext || window.webkitAudioContext)();
            const o = actx.createOscillator(), g = actx.createGain();
            o.type = type; o.frequency.value = freq;
            if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), actx.currentTime + dur);
            g.gain.setValueAtTime(vol, actx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
            o.connect(g); g.connect(actx.destination);
            o.start(); o.stop(actx.currentTime + dur);
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        const BEST_KEY = 'mg-best-towerdef';
        const CELL = 42, COLS = 9, ROWS = 13;
        const cx = c => c * CELL + CELL / 2, cy = r => r * CELL + CELL / 2;

        // path: snake from top-left entry to bottom-left exit
        const TURNS = [[-1, 1], [7, 1], [7, 4], [1, 4], [1, 7], [7, 7], [7, 10], [-1, 10]];
        const WAYPOINTS = TURNS.map(([c, r]) => [cx(c), cy(r)]);
        const pathCells = new Set();
        for (let i = 0; i < TURNS.length - 1; i++) {
            const [c1, r1] = TURNS[i], [c2, r2] = TURNS[i + 1];
            for (let c = Math.min(c1, c2); c <= Math.max(c1, c2); c++) {
                for (let r = Math.min(r1, r2); r <= Math.max(r1, r2); r++) {
                    if (c >= 0) pathCells.add(c + ',' + r);
                }
            }
        }

        const TYPES = {
            blaster: { cost: 50, range: 95, rate: 22, dmg: 8, color: '#22d3ee' },
            cannon: { cost: 90, range: 85, rate: 65, dmg: 26, splash: 42, color: '#fbbf24' },
            frost: { cost: 60, range: 80, rate: 40, dmg: 4, slow: 80, color: '#93c5fd' },
        };

        let money, lives, wave, cleared, towers, enemies, bullets, puffs, queue, spawnTimer, autoTimer;
        let running, over, selected = null, hover = null, last = 0;
        let best = +localStorage.getItem(BEST_KEY) || 0;
        document.getElementById('best').textContent = best;

        const el = id => document.getElementById(id);
        const overlay = el('overlay');

        function reset() {
            money = 130; lives = 10; wave = 0; cleared = 0;
            towers = []; enemies = []; bullets = []; puffs = []; queue = [];
            spawnTimer = 0; autoTimer = 0; running = false; over = false; selected = null;
            overlay.classList.add('hidden');
            updateHud();
        }

        function updateHud() {
            el('money').textContent = money;
            el('lives').textContent = lives;
            el('wave').textContent = wave;
            el('best').textContent = best;
            const btn = el('wave-btn');
            btn.disabled = running || over;
            btn.textContent = running ? `Wave ${wave}…` : `▶ Start Wave ${wave + 1}`;
            document.querySelectorAll('.tower-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.type === selected);
                b.classList.toggle('broke', TYPES[b.dataset.type].cost > money);
            });
        }

        function startWave() {
            if (running || over) return;
            wave++;
            running = true;
            const boss = wave % 5 === 0, fast = !boss && wave % 4 === 0;
            const hp = 18 * Math.pow(1.22, wave - 1);
            const count = boss ? 2 + Math.floor(wave / 5) : 8 + wave;
            queue = [];
            for (let i = 0; i < count; i++) {
                queue.push({
                    hp: hp * (boss ? 6 : fast ? 0.6 : 1),
                    speed: boss ? 0.72 : fast ? 1.85 : 1.15,
                    boss, fast,
                    reward: boss ? 30 : fast ? 5 : 6,
                    gap: boss ? 90 : fast ? 26 : 36,
                });
            }
            spawnTimer = 0;
            beep(400, .1, 'triangle', .05);
            updateHud();
        }

        function spawnEnemy(spec) {
            enemies.push({
                x: WAYPOINTS[0][0], y: WAYPOINTS[0][1], wp: 1,
                hp: spec.hp, maxHp: spec.hp, speed: spec.speed,
                boss: spec.boss, fast: spec.fast, reward: spec.reward, slow: 0,
            });
        }

        function waveCleared() {
            running = false;
            cleared = wave;
            money += 25;
            if (cleared > best) { best = cleared; localStorage.setItem(BEST_KEY, best); }
            beep(660, .1, 'triangle', .05); setTimeout(() => beep(880, .15, 'triangle', .05), 120);
            autoTimer = 300; // ~5s to next wave
            updateHud();
        }

        function gameOver() {
            over = true; running = false;
            beep(150, .5, 'sawtooth', .07, -80);
            const isBest = cleared >= best && cleared > 0;
            el('ov-title').textContent = '☠️ Overrun!';
            el('ov-sub').innerHTML = `You held for <b>${cleared}</b> wave${cleared === 1 ? '' : 's'}` +
                (isBest ? ' · <span class="new-best">🏆 New best!</span>' : ` · Best: ${best}`);
            overlay.classList.remove('hidden');
            updateHud();
        }

        function update(dt) {
            // spawning
            if (running && queue.length) {
                spawnTimer -= dt;
                if (spawnTimer <= 0) {
                    const spec = queue.shift();
                    spawnEnemy(spec);
                    spawnTimer = spec.gap;
                }
            }
            if (running && !queue.length && !enemies.length) waveCleared();
            if (!running && !over && cleared > 0 && autoTimer > 0) {
                autoTimer -= dt;
                if (autoTimer <= 0) startWave();
                else el('wave-btn').textContent = `▶ Wave ${wave + 1} in ${Math.ceil(autoTimer / 60)}s — tap to rush`;
            }

            // enemies
            for (const e of enemies) {
                if (e.slow > 0) e.slow -= dt;
                const sp = e.speed * (e.slow > 0 ? 0.55 : 1) * dt;
                const [tx, ty] = WAYPOINTS[e.wp];
                const dx = tx - e.x, dy = ty - e.y;
                const d = Math.hypot(dx, dy);
                if (d <= sp) {
                    e.x = tx; e.y = ty;
                    e.wp++;
                    if (e.wp >= WAYPOINTS.length) {
                        e.dead = true;
                        lives -= e.boss ? 3 : 1;
                        beep(200, .15, 'sawtooth', .05, -60);
                        updateHud();
                        if (lives <= 0) { lives = 0; updateHud(); return gameOver(); }
                    }
                } else {
                    e.x += dx / d * sp; e.y += dy / d * sp;
                }
            }
            enemies = enemies.filter(e => !e.dead);

            // towers fire
            for (const t of towers) {
                t.cd -= dt;
                if (t.cd > 0) continue;
                const spec = TYPES[t.type];
                let target = null, bestProg = -1;
                for (const e of enemies) {
                    const d = Math.hypot(e.x - t.x, e.y - t.y);
                    if (d <= spec.range) {
                        const prog = e.wp * 1000 - Math.hypot(WAYPOINTS[e.wp][0] - e.x, WAYPOINTS[e.wp][1] - e.y);
                        if (prog > bestProg) { bestProg = prog; target = e; }
                    }
                }
                if (!target) continue;
                t.cd = spec.rate;
                t.angle = Math.atan2(target.y - t.y, target.x - t.x);
                bullets.push({ x: t.x, y: t.y, target, dmg: spec.dmg, splash: spec.splash, slow: spec.slow, color: spec.color });
                beep(t.type === 'cannon' ? 180 : t.type === 'frost' ? 700 : 520, .04, 'square', .02);
            }

            // bullets home in
            for (const b of bullets) {
                const t = b.target;
                const tx = t.dead ? b.x : t.x, ty = t.dead ? b.y : t.y;
                const dx = tx - b.x, dy = ty - b.y;
                const d = Math.hypot(dx, dy);
                if (t.dead || d < 9) {
                    b.gone = true;
                    if (!t.dead) hit(b);
                } else {
                    b.x += dx / d * 8.5 * dt; b.y += dy / d * 8.5 * dt;
                }
            }
            bullets = bullets.filter(b => !b.gone);

            puffs.forEach(p => { p.r += 1.8 * dt; p.life -= 0.06 * dt; });
            puffs = puffs.filter(p => p.life > 0);
        }

        function hit(b) {
            const victims = b.splash
                ? enemies.filter(e => Math.hypot(e.x - b.target.x, e.y - b.target.y) <= b.splash)
                : [b.target];
            if (b.splash) puffs.push({ x: b.target.x, y: b.target.y, r: 8, life: 1, color: b.color });
            for (const e of victims) {
                e.hp -= b.dmg;
                if (b.slow) e.slow = Math.max(e.slow, b.slow);
                if (e.hp <= 0 && !e.dead) {
                    e.dead = true;
                    money += e.reward;
                    puffs.push({ x: e.x, y: e.y, r: 4, life: 1, color: '#fbbf24' });
                    beep(600, .05, 'triangle', .03);
                }
            }
            updateHud();
        }

        function place(c, r) {
            if (!selected || over) return;
            const spec = TYPES[selected];
            if (money < spec.cost) return;
            if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return;
            if (pathCells.has(c + ',' + r)) return;
            if (towers.some(t => t.col === c && t.row === r)) return;
            towers.push({ type: selected, col: c, row: r, x: cx(c), y: cy(r), cd: 0, angle: -Math.PI / 2 });
            money -= spec.cost;
            beep(340, .08, 'square', .04);
            if (money < Math.min(...Object.values(TYPES).map(t => t.cost))) selected = null;
            updateHud();
        }

        function draw() {
            const light = document.body.classList.contains('light-mode');
            // grass checker
            for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
                ctx.fillStyle = (r + c) % 2
                    ? (light ? '#9ad67f' : '#20402d')
                    : (light ? '#90cf75' : '#1d3a29');
                ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
            }
            // path
            pathCells.forEach(k => {
                const [c, r] = k.split(',').map(Number);
                ctx.fillStyle = light ? '#e5d3a1' : '#4a4234';
                ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
                ctx.fillStyle = light ? 'rgba(120,100,60,.25)' : 'rgba(0,0,0,.2)';
                ctx.fillRect(c * CELL + 4, r * CELL + 4, 4, 4);
                ctx.fillRect(c * CELL + CELL - 10, r * CELL + CELL - 10, 4, 4);
            });
            // entry/exit arrows
            ctx.fillStyle = light ? '#475569' : '#c8cede';
            ctx.font = '800 15px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('➜', 12, cy(1) + 5);
            ctx.fillText('➜', 12, cy(10) + 5);

            // placement preview
            if (selected && hover && !pathCells.has(hover[0] + ',' + hover[1]) &&
                !towers.some(t => t.col === hover[0] && t.row === hover[1])) {
                const spec = TYPES[selected];
                const ok = money >= spec.cost;
                ctx.fillStyle = ok ? 'rgba(139,92,246,.3)' : 'rgba(248,113,113,.3)';
                ctx.fillRect(hover[0] * CELL, hover[1] * CELL, CELL, CELL);
                ctx.strokeStyle = ok ? 'rgba(139,92,246,.5)' : 'rgba(248,113,113,.5)';
                ctx.beginPath(); ctx.arc(cx(hover[0]), cy(hover[1]), spec.range, 0, 7); ctx.stroke();
            }

            // towers
            for (const t of towers) {
                const spec = TYPES[t.type];
                ctx.fillStyle = light ? 'rgba(35,39,53,.25)' : 'rgba(0,0,0,.35)';
                ctx.beginPath(); ctx.arc(t.x, t.y + 3, 14, 0, 7); ctx.fill();
                ctx.fillStyle = light ? '#64748b' : '#3c4356';
                ctx.beginPath(); ctx.arc(t.x, t.y, 14, 0, 7); ctx.fill();
                ctx.strokeStyle = spec.color; ctx.lineWidth = 5; ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(t.x, t.y);
                ctx.lineTo(t.x + Math.cos(t.angle) * 15, t.y + Math.sin(t.angle) * 15);
                ctx.stroke();
                ctx.fillStyle = spec.color;
                ctx.beginPath(); ctx.arc(t.x, t.y, 7, 0, 7); ctx.fill();
            }

            // enemies
            for (const e of enemies) {
                const r = e.boss ? 15 : e.fast ? 8 : 10;
                ctx.fillStyle = e.slow > 0 ? '#93c5fd' : e.boss ? '#b91c1c' : e.fast ? '#fb923c' : '#ef4444';
                ctx.beginPath(); ctx.arc(e.x, e.y, r, 0, 7); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,.3)';
                ctx.beginPath(); ctx.arc(e.x - r * 0.3, e.y - r * 0.3, r * 0.35, 0, 7); ctx.fill();
                // hp bar
                ctx.fillStyle = 'rgba(0,0,0,.5)';
                ctx.fillRect(e.x - 12, e.y - r - 9, 24, 4);
                ctx.fillStyle = '#34d399';
                ctx.fillRect(e.x - 12, e.y - r - 9, 24 * Math.max(0, e.hp / e.maxHp), 4);
                if (e.boss) { ctx.font = '10px sans-serif'; ctx.fillText('👑', e.x, e.y - r - 12); }
            }

            // bullets + puffs
            for (const b of bullets) {
                ctx.fillStyle = b.color;
                ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, 7); ctx.fill();
            }
            for (const p of puffs) {
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.strokeStyle = p.color; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }

        function loop(now) {
            const dt = Math.min((now - (last || now)) / 16.667, 3);
            last = now;
            if (!over) update(dt);
            draw();
            requestAnimationFrame(loop);
        }

        function cellAt(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width * W;
            const y = (e.clientY - rect.top) / rect.height * H;
            return [Math.floor(x / CELL), Math.floor(y / CELL)];
        }
        canvas.addEventListener('pointermove', e => { hover = cellAt(e); });
        canvas.addEventListener('pointerleave', () => { hover = null; });
        canvas.addEventListener('pointerdown', e => {
            e.preventDefault();
            const [c, r] = cellAt(e);
            hover = [c, r];
            place(c, r);
        });

        document.querySelectorAll('.tower-btn').forEach(b => {
            b.onclick = () => {
                selected = selected === b.dataset.type ? null : b.dataset.type;
                updateHud();
            };
        });
        el('wave-btn').onclick = () => { autoTimer = 0; startWave(); };
        el('ov-btn').onclick = () => { reset(); };

        reset();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
