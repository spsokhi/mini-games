<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Runner — Mini-Game Hub</title>
    <style>
        :root {
            --bg: #0f1117; --panel: #171a23; --panel-2: #1e2230; --border: #2a2f3f;
            --text: #e8eaf2; --muted: #9aa1b5; --accent: #8b5cf6; --accent-2: #22d3ee;
            --gold: #fbbf24; --shadow: 0 10px 30px rgba(0,0,0,.35);
        }
        body.light-mode {
            --bg: #eef1f7; --panel: #ffffff; --panel-2: #f3f5fa; --border: #d8dce8;
            --text: #232735; --muted: #5b6274; --shadow: 0 10px 30px rgba(35,39,53,.12);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(900px 450px at 80% -10%, rgba(52,211,153,.10), transparent 60%), var(--bg);
            color: var(--text); transition: background-color .3s, color .3s;
        }
        .topbar {
            width: 100%; max-width: 700px; display: flex; align-items: center;
            justify-content: space-between; gap: 10px; padding: 14px 16px;
        }
        .back { color: var(--muted); text-decoration: none; font-weight: 600; padding: 8px 12px; border-radius: 10px; }
        .back:hover { color: var(--text); background: var(--panel); }
        h1 { font-size: 1.5rem; margin: 0; }
        .top-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: var(--panel); border: 1px solid var(--border); color: var(--text);
            width: 40px; height: 40px; border-radius: 10px; font-size: 1.05rem; cursor: pointer;
        }
        .icon-btn:hover { border-color: var(--accent); }

        .hud { display: flex; gap: 10px; padding: 4px 16px 12px; flex-wrap: wrap; justify-content: center; }
        .stat {
            background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
            padding: 7px 18px; text-align: center; min-width: 88px;
        }
        .stat .label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .stat .value { font-size: 1.25rem; font-weight: 800; }
        #best-el .value { color: var(--gold); }

        .stage { position: relative; width: min(94vw, 660px); }
        canvas {
            display: block; width: 100%; height: auto;
            border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow);
            touch-action: none; cursor: pointer;
        }
        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; gap: 10px;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
            background: rgba(10,12,18,.6); border-radius: 16px; backdrop-filter: blur(2px);
        }
        .overlay.hidden { display: none; }
        .overlay .big { font-size: 2rem; font-weight: 800; margin: 0; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,.5); }
        .overlay .sub { color: #e8eaf2; margin: 0; text-shadow: 0 1px 4px rgba(0,0,0,.5); }
        .overlay .new-best { color: var(--gold); font-weight: 800; }
        .btn {
            padding: 12px 26px; font-size: 1rem; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 6px 18px rgba(139,92,246,.35); transition: transform .15s;
        }
        .btn:hover { transform: translateY(-2px); }
        .hint { color: var(--muted); font-size: .88rem; padding: 12px 16px; text-align: center; max-width: 560px; }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="back" href="index.html">← Hub</a>
        <h1>🦖 Dino Runner</h1>
        <div class="top-actions">
            <button id="sound-btn" class="icon-btn" title="Toggle sound">🔊</button>
            <button id="theme-btn" class="icon-btn" title="Toggle theme">☀️</button>
        </div>
    </header>

    <div class="hud">
        <div class="stat"><div class="label">Score</div><div class="value" id="score">0</div></div>
        <div class="stat" id="best-el"><div class="label">Best</div><div class="value" id="best">0</div></div>
    </div>

    <div class="stage">
        <canvas id="gameCanvas" width="660" height="260"></canvas>
        <div class="overlay" id="overlay">
            <p class="big" id="ov-title">🦖 Dino Runner</p>
            <p class="sub" id="ov-sub">Jump the cacti, duck the birds</p>
            <button class="btn" id="ov-btn">Run!</button>
        </div>
    </div>

    <p class="hint"><b>Space / ↑ / tap</b> to jump · <b>↓ / hold the lower part of the screen</b> to duck. The world speeds up the longer you survive!</p>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        function applyTheme() {
            const light = localStorage.getItem('theme') === 'light';
            document.body.classList.toggle('light-mode', light);
            themeBtn.textContent = light ? '🌙' : '☀️';
        }
        themeBtn.onclick = () => { localStorage.setItem('theme', localStorage.getItem('theme') === 'light' ? 'dark' : 'light'); applyTheme(); };
        applyTheme();

        let muted = localStorage.getItem('mg-muted') === '1', actx;
        const soundBtn = document.getElementById('sound-btn');
        soundBtn.textContent = muted ? '🔇' : '🔊';
        soundBtn.onclick = () => { muted = !muted; localStorage.setItem('mg-muted', muted ? '1' : '0'); soundBtn.textContent = muted ? '🔇' : '🔊'; };
        function beep(freq, dur = 0.08, type = 'square', vol = 0.04, slide = 0) {
            if (muted) return;
            actx = actx || new (window.AudioContext || window.webkitAudioContext)();
            const o = actx.createOscillator(), g = actx.createGain();
            o.type = type; o.frequency.value = freq;
            if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), actx.currentTime + dur);
            g.gain.setValueAtTime(vol, actx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
            o.connect(g); g.connect(actx.destination);
            o.start(); o.stop(actx.currentTime + dur);
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        const BEST_KEY = 'mg-best-dino';
        const GROUND = H - 42;
        const GRAVITY = 0.62, JUMP = -11.8;

        let state = 'menu'; // menu | play | over
        let dino, obstacles, dist, score, speed, ducking, groundX, t, last = 0, deathAt = 0, milestone;
        let best = +localStorage.getItem(BEST_KEY) || 0;
        document.getElementById('best').textContent = best;

        const overlay = document.getElementById('overlay');
        const ovTitle = document.getElementById('ov-title');
        const ovSub = document.getElementById('ov-sub');
        const ovBtn = document.getElementById('ov-btn');

        function reset() {
            dino = { x: 64, y: GROUND, vy: 0 };
            obstacles = [];
            dist = 0; score = 0; speed = 5.6; ducking = false; groundX = 0; t = 0; milestone = 100;
            document.getElementById('score').textContent = 0;
        }

        function dinoBox() {
            const onGround = dino.y >= GROUND - 0.5;
            const duckNow = ducking && onGround;
            const w = duckNow ? 44 : 26, h = duckNow ? 26 : 46;
            return { x: dino.x - w / 2 + 3, y: dino.y - h + 3, w: w - 6, h: h - 5, duckNow };
        }

        function spawnObstacle() {
            const lastOb = obstacles[obstacles.length - 1];
            if (lastOb) {
                const edge = lastOb.x + lastOb.w;
                if (edge > W - 1) return; // wait until the last one is fully on screen
                const gap = 240 + Math.random() * 280 + speed * 22;
                if (W - edge < gap) return;
            } else if (dist < 380) return; // opening grace period

            if (score > 200 && Math.random() < 0.3) {
                // bird at one of three heights: low (jump), mid (duck), high (freebie)
                const lift = [0, 34, 78][Math.floor(Math.random() * 3)];
                obstacles.push({ type: 'bird', x: W + 10, w: 34, h: 24, bottom: GROUND - lift, wob: Math.random() * 7 });
            } else if (Math.random() < 0.5) {
                const n = 1 + Math.floor(Math.random() * 3); // 1-3 small cacti
                obstacles.push({ type: 'cactus', x: W + 10, w: n * 16 + (n - 1) * 4, h: 32, n, big: false });
            } else {
                const n = 1 + Math.floor(Math.random() * 2); // 1-2 big cacti
                obstacles.push({ type: 'cactus', x: W + 10, w: n * 24 + (n - 1) * 5, h: 48, n, big: true });
            }
        }

        function jump() {
            if (state !== 'play') return;
            if (dino.y >= GROUND - 0.5) {
                dino.vy = JUMP;
                beep(520, .09, 'square', .04, 200);
            }
        }

        function start() {
            if (Date.now() - deathAt < 500) return; // don't let a mashed jump skip the results
            reset();
            state = 'play';
            overlay.classList.add('hidden');
            last = 0;
            requestAnimationFrame(loop);
        }

        function die() {
            state = 'over';
            deathAt = Date.now();
            beep(160, .3, 'sawtooth', .06, -100);
            let isBest = false;
            if (score > best) { best = score; localStorage.setItem(BEST_KEY, best); isBest = true; }
            document.getElementById('best').textContent = best;
            ovTitle.textContent = '💥 Extinct!';
            ovSub.innerHTML = `Score: <b>${score}</b>` + (isBest ? ' · <span class="new-best">🏆 New best!</span>' : ` · Best: ${best}`);
            ovBtn.textContent = 'Run Again';
            overlay.classList.remove('hidden');
        }

        function update(dt) {
            t += dt;
            speed = Math.min(12.5, 5.6 + score * 0.012);
            dist += speed * dt;
            score = Math.floor(dist / 10);
            document.getElementById('score').textContent = score;
            if (score >= milestone) {
                milestone += 100;
                beep(880, .07, 'triangle', .05); setTimeout(() => beep(1100, .09, 'triangle', .05), 90);
            }

            // dino physics (ducking mid-air = fast fall)
            dino.vy += GRAVITY * dt + (ducking && dino.y < GROUND ? 0.5 * dt : 0);
            dino.y = Math.min(GROUND, dino.y + dino.vy * dt);
            if (dino.y >= GROUND) dino.vy = 0;

            groundX = (groundX - speed * dt) % 28;

            obstacles.forEach(o => { o.x -= (o.type === 'bird' ? speed + 1 : speed) * dt; });
            while (obstacles.length && obstacles[0].x + obstacles[0].w < -20) obstacles.shift();
            spawnObstacle();

            const d = dinoBox();
            for (const o of obstacles) {
                const top = o.type === 'bird' ? o.bottom - o.h : GROUND - o.h;
                if (d.x < o.x + o.w - 4 && d.x + d.w > o.x + 4 &&
                    d.y < (o.type === 'bird' ? o.bottom : GROUND) - 4 && d.y + d.h > top + 4) {
                    return die();
                }
            }
        }

        function draw() {
            const light = document.body.classList.contains('light-mode');
            // sky
            const sky = ctx.createLinearGradient(0, 0, 0, H);
            if (light) { sky.addColorStop(0, '#bae6fd'); sky.addColorStop(1, '#f0f9ff'); }
            else { sky.addColorStop(0, '#0b1120'); sky.addColorStop(1, '#1b2436'); }
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, W, H);

            if (light) {
                ctx.fillStyle = '#fde047';
                ctx.beginPath(); ctx.arc(W - 80, 52, 22, 0, 7); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,.85)';
                for (let i = 0; i < 3; i++) {
                    const cx = ((i * 260 - dist * 0.15) % (W + 140) + W + 140) % (W + 140) - 70;
                    const cy = 46 + i * 26;
                    ctx.beginPath();
                    ctx.arc(cx, cy, 15, 0, 7); ctx.arc(cx + 17, cy + 4, 11, 0, 7); ctx.arc(cx - 17, cy + 4, 11, 0, 7);
                    ctx.fill();
                }
            } else {
                ctx.fillStyle = '#e2e8f0';
                ctx.beginPath(); ctx.arc(W - 80, 52, 16, 0, 7); ctx.fill();
                ctx.fillStyle = '#0b1120';
                ctx.beginPath(); ctx.arc(W - 74, 47, 14, 0, 7); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,.5)';
                for (let i = 0; i < 14; i++) {
                    const sx = ((i * 137 - dist * 0.06) % (W + 20) + W + 20) % (W + 20) - 10;
                    ctx.fillRect(sx, (i * 53) % 120 + 14, 2, 2);
                }
            }

            // distant dunes
            ctx.fillStyle = light ? 'rgba(120,113,108,.18)' : 'rgba(148,163,184,.08)';
            for (let i = 0; i < 4; i++) {
                const dx = ((i * 220 - dist * 0.3) % (W + 240) + W + 240) % (W + 240) - 120;
                ctx.beginPath();
                ctx.ellipse(dx, GROUND + 4, 110, 26, 0, Math.PI, 0);
                ctx.fill();
            }

            // ground
            ctx.strokeStyle = light ? '#78716c' : '#8b8f9f';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, GROUND + 1); ctx.lineTo(W, GROUND + 1); ctx.stroke();
            ctx.fillStyle = light ? 'rgba(120,113,108,.5)' : 'rgba(139,143,159,.4)';
            for (let x = groundX; x < W; x += 28) ctx.fillRect(x, GROUND + 9, 12, 2);
            for (let x = groundX + 14; x < W; x += 28) ctx.fillRect(x, GROUND + 17, 7, 2);

            // obstacles
            obstacles.forEach(o => {
                if (o.type === 'cactus') {
                    ctx.fillStyle = light ? '#16a34a' : '#22c55e';
                    const uw = o.big ? 24 : 16, gap = o.big ? 5 : 4;
                    for (let i = 0; i < o.n; i++) {
                        const cx = o.x + i * (uw + gap), trunkW = o.big ? 10 : 7;
                        const hh = o.h - (i % 2) * (o.big ? 10 : 6); // vary heights inside a cluster
                        ctx.fillRect(cx + (uw - trunkW) / 2, GROUND - hh, trunkW, hh);
                        // arms
                        ctx.fillRect(cx, GROUND - hh * 0.72, uw * 0.32, o.big ? 6 : 4);
                        ctx.fillRect(cx, GROUND - hh * 0.72, o.big ? 6 : 4, hh * 0.3);
                        ctx.fillRect(cx + uw - uw * 0.32, GROUND - hh * 0.55, uw * 0.32, o.big ? 6 : 4);
                        ctx.fillRect(cx + uw - (o.big ? 6 : 4), GROUND - hh * 0.55, o.big ? 6 : 4, hh * 0.24);
                    }
                } else {
                    // bird
                    const by = o.bottom - o.h / 2 + Math.sin(t * 0.1 + o.wob) * 2;
                    ctx.fillStyle = light ? '#57534e' : '#cbd5e1';
                    ctx.beginPath(); ctx.ellipse(o.x + 16, by, 13, 7, 0, 0, 7); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(o.x + 27, by - 2); ctx.lineTo(o.x + 37, by); ctx.lineTo(o.x + 27, by + 3); ctx.fill();
                    const flap = Math.sin(t * 0.35 + o.wob) * 9;
                    ctx.beginPath(); ctx.moveTo(o.x + 12, by); ctx.lineTo(o.x + 4, by - 10 - flap); ctx.lineTo(o.x + 20, by - 2); ctx.fill();
                    ctx.fillStyle = light ? '#fafaf9' : '#1e2230';
                    ctx.beginPath(); ctx.arc(o.x + 24, by - 2, 1.6, 0, 7); ctx.fill();
                }
            });

            // dino
            const d = dinoBox();
            const body = light ? '#475569' : '#e2e8f0';
            const runFrame = dino.y >= GROUND - 0.5 && state === 'play' ? Math.floor(t / 6) % 2 : 0;
            ctx.fillStyle = body;
            if (d.duckNow) {
                ctx.fillRect(dino.x - 22, GROUND - 24, 36, 16);            // long low body
                ctx.fillRect(dino.x + 8, GROUND - 30, 16, 12);             // head forward
                ctx.fillRect(dino.x - 30, GROUND - 20, 10, 6);             // tail
                ctx.fillRect(dino.x - 14 + runFrame * 10, GROUND - 8, 6, 8);
                ctx.fillRect(dino.x + 2 - runFrame * 10, GROUND - 8, 6, 8);
                ctx.fillStyle = light ? '#f8fafc' : '#171a23';
                ctx.fillRect(dino.x + 17, GROUND - 27, 3, 3);              // eye
            } else {
                const yTop = dino.y - 46;
                ctx.fillRect(dino.x - 9, yTop + 14, 20, 22);               // body
                ctx.fillRect(dino.x - 1, yTop, 18, 16);                    // head
                ctx.fillRect(dino.x - 19, yTop + 18, 12, 7);               // tail
                ctx.fillRect(dino.x - 9, yTop + 24, 5, 4);                 // tiny arm
                if (dino.y < GROUND - 0.5) {                               // airborne: legs tucked
                    ctx.fillRect(dino.x - 6, dino.y - 12, 7, 10);
                    ctx.fillRect(dino.x + 3, dino.y - 12, 7, 10);
                } else {
                    ctx.fillRect(dino.x - 7 + runFrame * 9, dino.y - 12, 7, 12);
                    ctx.fillRect(dino.x + 2 - runFrame * 9, dino.y - 12, 7, 12);
                }
                ctx.fillStyle = light ? '#f8fafc' : '#171a23';
                ctx.fillRect(dino.x + 9, yTop + 4, 3, 3);                  // eye
            }
        }

        function loop(now) {
            if (state === 'over') { draw(); return; }
            const dt = Math.min((now - (last || now)) / 16.667, 3);
            last = now;
            if (state === 'menu') t += dt;
            else update(dt);
            draw();
            if (state !== 'over') requestAnimationFrame(loop);
        }

        ovBtn.onclick = e => { e.stopPropagation(); start(); };
        canvas.addEventListener('pointerdown', e => {
            e.preventDefault();
            if (state !== 'play') { start(); return; }
            const rect = canvas.getBoundingClientRect();
            const y = (e.clientY - rect.top) / rect.height;
            if (y > 0.62) ducking = true;
            else jump();
        });
        window.addEventListener('pointerup', () => { ducking = false; });
        overlay.addEventListener('pointerdown', e => {
            if (e.target === ovBtn) return;
            if (state !== 'play') start();
        });
        document.addEventListener('keydown', e => {
            if (e.key === ' ' || e.key === 'ArrowUp') {
                e.preventDefault();
                if (e.repeat) return;
                if (state !== 'play') start();
                else jump();
            }
            if (e.key === 'ArrowDown') { e.preventDefault(); ducking = true; }
        });
        document.addEventListener('keyup', e => {
            if (e.key === 'ArrowDown') ducking = false;
        });

        reset();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
