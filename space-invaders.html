<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders — Mini-Game Hub</title>
    <style>
        :root {
            --bg: #0f1117; --panel: #171a23; --panel-2: #1e2230; --border: #2a2f3f;
            --text: #e8eaf2; --muted: #9aa1b5; --accent: #8b5cf6; --accent-2: #22d3ee;
            --good: #34d399; --bad: #f87171; --gold: #fbbf24; --shadow: 0 10px 30px rgba(0,0,0,.35);
        }
        body.light-mode {
            --bg: #eef1f7; --panel: #ffffff; --panel-2: #f3f5fa; --border: #d8dce8;
            --text: #232735; --muted: #5b6274; --shadow: 0 10px 30px rgba(35,39,53,.12);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(900px 450px at 80% -10%, rgba(139,92,246,.14), transparent 60%), var(--bg);
            color: var(--text); transition: background-color .3s, color .3s;
        }
        .topbar {
            width: 100%; max-width: 640px; display: flex; align-items: center;
            justify-content: space-between; gap: 10px; padding: 14px 16px;
        }
        .back { color: var(--muted); text-decoration: none; font-weight: 600; padding: 8px 12px; border-radius: 10px; }
        .back:hover { color: var(--text); background: var(--panel); }
        h1 { font-size: 1.5rem; margin: 0; }
        .top-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: var(--panel); border: 1px solid var(--border); color: var(--text);
            width: 40px; height: 40px; border-radius: 10px; font-size: 1.05rem; cursor: pointer;
        }
        .icon-btn:hover { border-color: var(--accent); }

        .hud { display: flex; gap: 10px; padding: 4px 16px 12px; flex-wrap: wrap; justify-content: center; }
        .stat {
            background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
            padding: 7px 16px; text-align: center; min-width: 82px;
        }
        .stat .label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .stat .value { font-size: 1.2rem; font-weight: 800; }
        #best-el .value { color: var(--gold); }
        #lives-el .value { color: var(--bad); }

        .stage { position: relative; width: min(94vw, 600px); }
        canvas {
            display: block; width: 100%; height: auto; background: #05070e;
            border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow);
            touch-action: none;
        }
        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; gap: 10px;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
            background: rgba(5,7,14,.72); border-radius: 16px; backdrop-filter: blur(3px);
        }
        .overlay.hidden { display: none; }
        .overlay .big { font-size: 2rem; font-weight: 800; margin: 0; color: #fff; }
        .overlay .sub { color: #9aa1b5; margin: 0; line-height: 1.7; }
        .overlay .new-best { color: var(--gold); font-weight: 800; }
        .btn {
            padding: 12px 26px; font-size: 1rem; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 6px 18px rgba(139,92,246,.35); transition: transform .15s;
        }
        .btn:hover { transform: translateY(-2px); }
        .hint { color: var(--muted); font-size: .88rem; padding: 12px 16px; text-align: center; }

        .touch-controls { display: none; gap: 10px; padding: 12px; }
        .touch-controls button {
            width: 76px; height: 60px; font-size: 1.5rem; border-radius: 14px;
            border: 1px solid var(--border); background: var(--panel); color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }
        .touch-controls button:active { background: var(--accent); }
        .touch-controls .fire { background: rgba(248,113,113,.15); border-color: var(--bad); }
        @media (pointer: coarse) { .touch-controls { display: flex; } .hint .kb { display: none; } }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="back" href="index.html">← Hub</a>
        <h1>👾 Space Invaders</h1>
        <div class="top-actions">
            <button id="sound-btn" class="icon-btn" title="Toggle sound">🔊</button>
            <button id="theme-btn" class="icon-btn" title="Toggle theme">☀️</button>
        </div>
    </header>

    <div class="hud">
        <div class="stat"><div class="label">Score</div><div class="value" id="score">0</div></div>
        <div class="stat" id="best-el"><div class="label">Best</div><div class="value" id="best">0</div></div>
        <div class="stat"><div class="label">Wave</div><div class="value" id="wave">1</div></div>
        <div class="stat" id="lives-el"><div class="label">Lives</div><div class="value" id="lives">3</div></div>
    </div>

    <div class="stage">
        <canvas id="gameCanvas" width="600" height="440"></canvas>
        <div class="overlay" id="overlay">
            <p class="big" id="ov-title">👾 Space Invaders</p>
            <p class="sub" id="ov-sub">🛸 = 30 pts · 👾 = 20 pts · 👽 = 10 pts<br>Watch out — they shoot back!</p>
            <button class="btn" id="ov-btn">Play</button>
        </div>
    </div>

    <p class="hint"><span class="kb">← → move · Space to shoot · <b>P</b> to pause</span></p>

    <div class="touch-controls">
        <button id="t-left">⬅️</button>
        <button class="fire" id="t-fire">🔥</button>
        <button id="t-right">➡️</button>
    </div>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        function applyTheme() {
            const light = localStorage.getItem('theme') === 'light';
            document.body.classList.toggle('light-mode', light);
            themeBtn.textContent = light ? '🌙' : '☀️';
        }
        themeBtn.onclick = () => { localStorage.setItem('theme', localStorage.getItem('theme') === 'light' ? 'dark' : 'light'); applyTheme(); };
        applyTheme();

        let muted = localStorage.getItem('mg-muted') === '1', actx;
        const soundBtn = document.getElementById('sound-btn');
        soundBtn.textContent = muted ? '🔇' : '🔊';
        soundBtn.onclick = () => { muted = !muted; localStorage.setItem('mg-muted', muted ? '1' : '0'); soundBtn.textContent = muted ? '🔇' : '🔊'; };
        function beep(freq, dur = 0.07, type = 'square', vol = 0.04, slide = 0) {
            if (muted) return;
            actx = actx || new (window.AudioContext || window.webkitAudioContext)();
            const o = actx.createOscillator(), g = actx.createGain();
            o.type = type; o.frequency.value = freq;
            if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), actx.currentTime + dur);
            g.gain.setValueAtTime(vol, actx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
            o.connect(g); g.connect(actx.destination);
            o.start(); o.stop(actx.currentTime + dur);
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        const BEST_KEY = 'mg-best-invaders';

        const ROWS = [
            { emoji: '🛸', pts: 30 },
            { emoji: '👾', pts: 20 },
            { emoji: '👾', pts: 20 },
            { emoji: '👽', pts: 10 },
        ];
        const ALIEN_W = 34, ALIEN_H = 26;

        let player, bullets, alienBullets, aliens, particles, stars;
        let score, lives, wave, alienDir, alienSpeed, fireCooldown, invincible;
        let leftPressed = false, rightPressed = false, firePressed = false;
        let state = 'menu', last = 0;
        let best = +localStorage.getItem(BEST_KEY) || 0;
        document.getElementById('best').textContent = best;

        const overlay = document.getElementById('overlay');
        const ovTitle = document.getElementById('ov-title');
        const ovSub = document.getElementById('ov-sub');
        const ovBtn = document.getElementById('ov-btn');

        stars = Array.from({ length: 60 }, () => ({
            x: Math.random() * W, y: Math.random() * H,
            r: Math.random() * 1.3 + 0.3, tw: Math.random() * Math.PI * 2
        }));

        function spawnWave() {
            aliens = [];
            const cols = 8;
            const startX = (W - cols * (ALIEN_W + 18)) / 2 + 9;
            ROWS.forEach((row, r) => {
                for (let c = 0; c < cols; c++) {
                    aliens.push({
                        x: startX + c * (ALIEN_W + 18), y: 56 + r * (ALIEN_H + 16),
                        emoji: row.emoji, pts: row.pts
                    });
                }
            });
            alienDir = 1;
            alienSpeed = 0.55 + wave * 0.18;
        }

        function newGame() {
            player = { x: W / 2 - 20, w: 40, h: 18 };
            bullets = []; alienBullets = []; particles = [];
            score = 0; lives = 3; wave = 1;
            fireCooldown = 0; invincible = 0;
            spawnWave();
            updateHud();
        }

        function updateHud() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('wave').textContent = wave;
            document.getElementById('best').textContent = best;
        }

        function shoot() {
            if (fireCooldown > 0 || bullets.length >= 3) return;
            bullets.push({ x: player.x + player.w / 2, y: H - 40 });
            fireCooldown = 16;
            beep(700, .06, 'square', .04, -300);
        }

        function explode(x, y, color) {
            for (let i = 0; i < 12; i++) {
                const a = Math.random() * Math.PI * 2, s = Math.random() * 3 + 1;
                particles.push({ x, y, dx: Math.cos(a) * s, dy: Math.sin(a) * s, life: 24, color });
            }
        }

        function update(dt) {
            if (leftPressed) player.x -= 6 * dt;
            if (rightPressed) player.x += 6 * dt;
            player.x = Math.max(6, Math.min(W - player.w - 6, player.x));
            if (firePressed) shoot();
            if (fireCooldown > 0) fireCooldown -= dt;
            if (invincible > 0) invincible -= dt;

            bullets.forEach(b => b.y -= 9 * dt);
            bullets = bullets.filter(b => b.y > -12);
            alienBullets.forEach(b => b.y += (3.2 + wave * 0.25) * dt);
            alienBullets = alienBullets.filter(b => b.y < H + 12);

            // alien movement
            let edge = false;
            aliens.forEach(a => {
                a.x += alienSpeed * alienDir * dt;
                if (a.x < 8 || a.x + ALIEN_W > W - 8) edge = true;
            });
            if (edge) {
                alienDir *= -1;
                aliens.forEach(a => { a.y += 14; });
            }

            // alien fire
            if (aliens.length && Math.random() < (0.008 + wave * 0.002) * dt) {
                const shooter = aliens[Math.floor(Math.random() * aliens.length)];
                alienBullets.push({ x: shooter.x + ALIEN_W / 2, y: shooter.y + ALIEN_H });
                beep(300, .05, 'sawtooth', .02);
            }

            // bullets vs aliens
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                for (let j = aliens.length - 1; j >= 0; j--) {
                    const a = aliens[j];
                    if (b.x > a.x && b.x < a.x + ALIEN_W && b.y > a.y && b.y < a.y + ALIEN_H) {
                        bullets.splice(i, 1);
                        aliens.splice(j, 1);
                        score += a.pts;
                        if (score > best) { best = score; localStorage.setItem(BEST_KEY, best); }
                        explode(a.x + ALIEN_W / 2, a.y + ALIEN_H / 2, '#8b5cf6');
                        beep(440 + Math.random() * 120, .08, 'square', .05, 200);
                        updateHud();
                        break;
                    }
                }
            }

            // alien bullets vs player
            const py = H - 34;
            if (invincible <= 0) {
                for (let i = alienBullets.length - 1; i >= 0; i--) {
                    const b = alienBullets[i];
                    if (b.x > player.x && b.x < player.x + player.w && b.y > py && b.y < py + player.h) {
                        alienBullets.splice(i, 1);
                        hitPlayer();
                        break;
                    }
                }
            }

            // aliens reach the player row
            if (aliens.some(a => a.y + ALIEN_H >= py - 4)) return gameOver();

            particles.forEach(p => { p.x += p.dx * dt; p.y += p.dy * dt; p.life -= dt; });
            particles = particles.filter(p => p.life > 0);

            if (!aliens.length) {
                wave++;
                score += 50;
                if (score > best) { best = score; localStorage.setItem(BEST_KEY, best); }
                alienBullets = [];
                spawnWave();
                updateHud();
                beep(660, .1, 'triangle', .06); setTimeout(() => beep(990, .15, 'triangle', .06), 120);
            }
        }

        function hitPlayer() {
            lives--;
            invincible = 90;
            explode(player.x + player.w / 2, H - 26, '#f87171');
            beep(150, .3, 'sawtooth', .07, -80);
            updateHud();
            if (lives <= 0) gameOver();
        }

        function gameOver() {
            state = 'over';
            const isBest = score >= best && score > 0;
            ovTitle.textContent = '💀 Game Over';
            ovSub.innerHTML = `Score: <b>${score}</b> · Wave ${wave}` +
                (isBest ? ' · <span class="new-best">🏆 New best!</span>' : ` · Best: ${best}`);
            ovBtn.textContent = 'Play Again';
            overlay.classList.remove('hidden');
        }

        function draw(t) {
            ctx.fillStyle = '#05070e';
            ctx.fillRect(0, 0, W, H);

            stars.forEach(s => {
                ctx.globalAlpha = 0.4 + Math.sin(t / 600 + s.tw) * 0.3;
                ctx.fillStyle = '#e8eaf2';
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, 7);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            ctx.font = '26px serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            aliens.forEach(a => ctx.fillText(a.emoji, a.x + ALIEN_W / 2, a.y + ALIEN_H / 2));

            // player ship
            if (invincible <= 0 || Math.floor(t / 100) % 2 === 0) {
                const px = player.x, py = H - 34;
                const grad = ctx.createLinearGradient(px, py, px + player.w, py);
                grad.addColorStop(0, '#22d3ee'); grad.addColorStop(1, '#8b5cf6');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.moveTo(px + player.w / 2, py - 10);
                ctx.lineTo(px + player.w, py + player.h);
                ctx.lineTo(px, py + player.h);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#fbbf24';
                ctx.fillRect(px + player.w / 2 - 2, py + player.h, 4, 4 + Math.random() * 4);
            }

            ctx.fillStyle = '#e8eaf2';
            bullets.forEach(b => ctx.fillRect(b.x - 1.5, b.y - 8, 3, 10));
            ctx.fillStyle = '#f87171';
            alienBullets.forEach(b => ctx.fillRect(b.x - 1.5, b.y, 3, 9));

            particles.forEach(p => {
                ctx.globalAlpha = p.life / 24;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
            });
            ctx.globalAlpha = 1;
        }

        function loop(now) {
            if (state !== 'play') return;
            const dt = Math.min((now - (last || now)) / 16.667, 3);
            last = now;
            update(dt);
            if (state === 'play') {
                draw(now);
                requestAnimationFrame(loop);
            }
        }

        function begin() {
            if (state === 'menu' || state === 'over') newGame();
            state = 'play';
            overlay.classList.add('hidden');
            last = 0;
            requestAnimationFrame(loop);
        }
        ovBtn.onclick = begin;

        function pause() {
            if (state !== 'play') return;
            state = 'pause';
            ovTitle.textContent = '⏸️ Paused';
            ovSub.textContent = '';
            ovBtn.textContent = 'Resume';
            overlay.classList.remove('hidden');
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') leftPressed = true;
            else if (e.key === 'ArrowRight') rightPressed = true;
            else if (e.key === ' ') {
                e.preventDefault();
                if (state === 'play') firePressed = true;
                else begin();
            } else if (e.key === 'p' || e.key === 'P') {
                if (state === 'play') pause(); else if (state === 'pause') begin();
            }
        });
        document.addEventListener('keyup', e => {
            if (e.key === 'ArrowLeft') leftPressed = false;
            else if (e.key === 'ArrowRight') rightPressed = false;
            else if (e.key === ' ') firePressed = false;
        });

        function bindHold(id, on, off) {
            const el = document.getElementById(id);
            el.addEventListener('pointerdown', e => { e.preventDefault(); on(); });
            el.addEventListener('pointerup', off);
            el.addEventListener('pointerleave', off);
        }
        bindHold('t-left', () => leftPressed = true, () => leftPressed = false);
        bindHold('t-right', () => rightPressed = true, () => rightPressed = false);
        bindHold('t-fire', () => firePressed = true, () => firePressed = false);

        document.addEventListener('visibilitychange', () => { if (document.hidden) pause(); });

        newGame();
        draw(0);
    </script>
</body>
</html>
