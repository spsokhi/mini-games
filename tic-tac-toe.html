<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe — Mini-Game Hub</title>
    <style>
        :root {
            --bg: #0f1117; --panel: #171a23; --panel-2: #1e2230; --border: #2a2f3f;
            --text: #e8eaf2; --muted: #9aa1b5; --accent: #8b5cf6; --accent-2: #22d3ee;
            --x-color: #22d3ee; --o-color: #f472b6; --gold: #fbbf24;
            --shadow: 0 10px 30px rgba(0,0,0,.35);
        }
        body.light-mode {
            --bg: #eef1f7; --panel: #ffffff; --panel-2: #f3f5fa; --border: #d8dce8;
            --text: #232735; --muted: #5b6274; --x-color: #0891b2; --o-color: #db2777;
            --shadow: 0 10px 30px rgba(35,39,53,.12);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(900px 450px at 80% -10%, rgba(34,211,238,.1), transparent 60%), var(--bg);
            color: var(--text); transition: background-color .3s, color .3s;
        }
        .topbar {
            width: 100%; max-width: 560px; display: flex; align-items: center;
            justify-content: space-between; gap: 10px; padding: 14px 16px;
        }
        .back { color: var(--muted); text-decoration: none; font-weight: 600; padding: 8px 12px; border-radius: 10px; }
        .back:hover { color: var(--text); background: var(--panel); }
        h1 { font-size: 1.5rem; margin: 0; }
        .icon-btn {
            background: var(--panel); border: 1px solid var(--border); color: var(--text);
            width: 40px; height: 40px; border-radius: 10px; font-size: 1.05rem; cursor: pointer;
        }
        .icon-btn:hover { border-color: var(--accent); }

        .modes { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 4px 16px 10px; }
        .mode-btn {
            padding: 9px 16px; border-radius: 999px; border: 1px solid var(--border);
            background: var(--panel); color: var(--muted); font-weight: 600; cursor: pointer;
            transition: all .15s ease;
        }
        .mode-btn:hover { border-color: var(--accent); color: var(--text); }
        .mode-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #fff; border-color: transparent;
        }

        .scoreboard { display: flex; gap: 10px; padding-bottom: 12px; }
        .score-box {
            background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
            padding: 6px 18px; text-align: center; min-width: 84px;
        }
        .score-box .who { font-size: .75rem; font-weight: 700; letter-spacing: 1px; color: var(--muted); }
        .score-box .num { font-size: 1.25rem; font-weight: 800; }
        .score-box.x .num { color: var(--x-color); }
        .score-box.o .num { color: var(--o-color); }

        .status { font-size: 1.15rem; font-weight: 600; min-height: 1.6em; margin: 2px 0 10px; }

        .board {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            width: min(88vw, 380px); background: var(--panel); border: 1px solid var(--border);
            border-radius: 16px; padding: 12px; box-shadow: var(--shadow);
        }
        .cell {
            aspect-ratio: 1; background: var(--panel-2); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(2.4rem, 12vw, 3.6rem); font-weight: 800; cursor: pointer;
            transition: background .15s ease, transform .1s ease;
            user-select: none;
        }
        .cell:hover:not(.filled) { background: var(--border); }
        .cell:active:not(.filled) { transform: scale(.96); }
        .cell.filled { cursor: default; }
        .cell.x { color: var(--x-color); }
        .cell.o { color: var(--o-color); }
        .cell.win { background: rgba(251, 191, 36, .18); box-shadow: inset 0 0 0 2px var(--gold); animation: winPulse .5s ease 2; }
        .cell.placed { animation: place .18s ease; }
        @keyframes place { from { transform: scale(.4); opacity: 0; } }
        @keyframes winPulse { 50% { transform: scale(1.05); } }

        .actions { padding: 16px; display: flex; gap: 10px; }
        .btn {
            padding: 11px 24px; font-size: 1rem; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 6px 18px rgba(139,92,246,.35); transition: transform .15s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn.ghost { background: var(--panel); color: var(--muted); border: 1px solid var(--border); box-shadow: none; }
        .btn.ghost:hover { color: var(--text); }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="back" href="index.html">← Hub</a>
        <h1>⭕ Tic-Tac-Toe</h1>
        <button id="theme-btn" class="icon-btn" title="Toggle theme">☀️</button>
    </header>

    <div class="modes">
        <button class="mode-btn active" data-mode="pvp">👥 2 Players</button>
        <button class="mode-btn" data-mode="ai-normal">🤖 AI · Normal</button>
        <button class="mode-btn" data-mode="ai-hard">🧠 AI · Unbeatable</button>
    </div>

    <div class="scoreboard">
        <div class="score-box x"><div class="who">X</div><div class="num" id="score-x">0</div></div>
        <div class="score-box"><div class="who">DRAWS</div><div class="num" id="score-d">0</div></div>
        <div class="score-box o"><div class="who" id="o-label">O</div><div class="num" id="score-o">0</div></div>
    </div>

    <div class="status" id="status">Player X's turn</div>
    <div class="board" id="board"></div>

    <div class="actions">
        <button class="btn" id="next-btn">Next Round</button>
        <button class="btn ghost" id="reset-scores-btn">Reset Scores</button>
    </div>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        function applyTheme() {
            const light = localStorage.getItem('theme') === 'light';
            document.body.classList.toggle('light-mode', light);
            themeBtn.textContent = light ? '🌙' : '☀️';
        }
        themeBtn.onclick = () => { localStorage.setItem('theme', localStorage.getItem('theme') === 'light' ? 'dark' : 'light'); applyTheme(); };
        applyTheme();

        const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        const STATS_KEY = 'mg-ttt-stats';
        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');

        let mode = 'pvp';
        let cells = Array(9).fill('');
        let current = 'X';
        let active = true;
        let starter = 'X'; // alternates each round
        let stats = JSON.parse(localStorage.getItem(STATS_KEY) || '{"x":0,"o":0,"d":0}');

        function saveStats() { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); }
        function renderStats() {
            document.getElementById('score-x').textContent = stats.x;
            document.getElementById('score-o').textContent = stats.o;
            document.getElementById('score-d').textContent = stats.d;
            document.getElementById('o-label').textContent = mode === 'pvp' ? 'O' : 'AI';
        }

        function winnerOf(b) {
            for (const [a, m, c] of WINS)
                if (b[a] && b[a] === b[m] && b[a] === b[c]) return { player: b[a], line: [a, m, c] };
            return b.includes('') ? null : { player: 'D', line: [] };
        }

        function render() {
            boardEl.innerHTML = '';
            cells.forEach((v, i) => {
                const d = document.createElement('div');
                d.className = 'cell' + (v ? ' filled ' + v.toLowerCase() : '');
                d.textContent = v;
                d.onclick = () => humanMove(i);
                boardEl.appendChild(d);
            });
        }

        function humanMove(i) {
            if (!active || cells[i]) return;
            if (mode !== 'pvp' && current === 'O') return; // AI's turn
            place(i);
        }

        function place(i) {
            cells[i] = current;
            const el = boardEl.children[i];
            el.textContent = current;
            el.className = 'cell filled placed ' + current.toLowerCase();
            const w = winnerOf(cells);
            if (w) return finish(w);
            current = current === 'X' ? 'O' : 'X';
            updateStatus();
            if (mode !== 'pvp' && current === 'O') setTimeout(aiMove, 420);
        }

        function updateStatus() {
            if (mode !== 'pvp' && current === 'O') statusEl.textContent = '🤖 AI is thinking…';
            else statusEl.textContent = `Player ${current}'s turn`;
        }

        function finish(w) {
            active = false;
            if (w.player === 'D') {
                stats.d++;
                statusEl.textContent = "🤝 It's a draw!";
            } else {
                w.line.forEach(i => boardEl.children[i].classList.add('win'));
                if (w.player === 'X') { stats.x++; statusEl.textContent = '🎉 X wins!'; }
                else { stats.o++; statusEl.textContent = mode === 'pvp' ? '🎉 O wins!' : '🤖 AI wins!'; }
            }
            saveStats();
            renderStats();
        }

        // --- AI ---
        function emptyIdx(b) { return b.map((v, i) => v ? null : i).filter(i => i !== null); }

        function findWinningMove(b, p) {
            for (const i of emptyIdx(b)) {
                b[i] = p;
                const win = winnerOf(b)?.player === p;
                b[i] = '';
                if (win) return i;
            }
            return -1;
        }

        function normalAI() {
            let i = findWinningMove(cells, 'O');
            if (i === -1) i = findWinningMove(cells, 'X');
            if (i === -1 && !cells[4]) i = 4;
            if (i === -1) {
                const corners = [0, 2, 6, 8].filter(c => !cells[c]);
                if (corners.length) i = corners[Math.floor(Math.random() * corners.length)];
            }
            if (i === -1) {
                const e = emptyIdx(cells);
                i = e[Math.floor(Math.random() * e.length)];
            }
            return i;
        }

        function minimax(b, isMax, depth) {
            const w = winnerOf(b);
            if (w) {
                if (w.player === 'O') return 10 - depth;
                if (w.player === 'X') return depth - 10;
                return 0;
            }
            let bestVal = isMax ? -Infinity : Infinity;
            for (const i of emptyIdx(b)) {
                b[i] = isMax ? 'O' : 'X';
                const v = minimax(b, !isMax, depth + 1);
                b[i] = '';
                bestVal = isMax ? Math.max(bestVal, v) : Math.min(bestVal, v);
            }
            return bestVal;
        }

        function hardAI() {
            let bestVal = -Infinity, bestMove = -1;
            for (const i of emptyIdx(cells)) {
                cells[i] = 'O';
                const v = minimax(cells, false, 0);
                cells[i] = '';
                if (v > bestVal) { bestVal = v; bestMove = i; }
            }
            return bestMove;
        }

        function aiMove() {
            if (!active) return;
            place(mode === 'ai-hard' ? hardAI() : normalAI());
        }

        function newRound() {
            cells = Array(9).fill('');
            starter = starter === 'X' ? 'O' : 'X';
            current = starter;
            active = true;
            render();
            updateStatus();
            if (mode !== 'pvp' && current === 'O') setTimeout(aiMove, 420);
        }

        document.querySelectorAll('.mode-btn').forEach(b => {
            b.onclick = () => {
                document.querySelectorAll('.mode-btn').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                mode = b.dataset.mode;
                starter = 'O'; // newRound flips it back to X
                renderStats();
                newRound();
            };
        });
        document.getElementById('next-btn').onclick = newRound;
        document.getElementById('reset-scores-btn').onclick = () => {
            stats = { x: 0, o: 0, d: 0 };
            saveStats();
            renderStats();
        };

        renderStats();
        cells = Array(9).fill('');
        current = 'X'; active = true;
        render();
        updateStatus();
    </script>
</body>
</html>
