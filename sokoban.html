<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sokoban — Mini-Game Hub</title>
    <style>
        :root {
            --bg: #0f1117; --panel: #171a23; --panel-2: #1e2230; --border: #2a2f3f;
            --text: #e8eaf2; --muted: #9aa1b5; --accent: #8b5cf6; --accent-2: #22d3ee;
            --good: #34d399; --gold: #fbbf24; --shadow: 0 10px 30px rgba(0,0,0,.35);
        }
        body.light-mode {
            --bg: #eef1f7; --panel: #ffffff; --panel-2: #f3f5fa; --border: #d8dce8;
            --text: #232735; --muted: #5b6274; --shadow: 0 10px 30px rgba(35,39,53,.12);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(900px 450px at 80% -10%, rgba(251,191,36,.10), transparent 60%), var(--bg);
            color: var(--text); transition: background-color .3s, color .3s;
        }
        .topbar {
            width: 100%; max-width: 560px; display: flex; align-items: center;
            justify-content: space-between; gap: 10px; padding: 14px 16px;
        }
        .back { color: var(--muted); text-decoration: none; font-weight: 600; padding: 8px 12px; border-radius: 10px; }
        .back:hover { color: var(--text); background: var(--panel); }
        h1 { font-size: 1.5rem; margin: 0; }
        .icon-btn {
            background: var(--panel); border: 1px solid var(--border); color: var(--text);
            width: 40px; height: 40px; border-radius: 10px; font-size: 1.05rem; cursor: pointer;
        }
        .icon-btn:hover { border-color: var(--accent); }

        .levels { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; padding: 4px 16px 10px; max-width: 520px; }
        .lvl-btn {
            width: 34px; height: 34px; border-radius: 9px; border: 1px solid var(--border);
            background: var(--panel); color: var(--muted); font-weight: 700; cursor: pointer; font-size: .85rem;
            transition: all .15s ease;
        }
        .lvl-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }
        .lvl-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #fff; border-color: transparent;
        }
        .lvl-btn.done { color: var(--good); border-color: rgba(52,211,153,.5); }
        .lvl-btn:disabled { opacity: .35; cursor: default; }

        .hud { display: flex; gap: 10px; padding-bottom: 12px; flex-wrap: wrap; justify-content: center; }
        .stat {
            background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
            padding: 7px 18px; text-align: center; min-width: 86px;
        }
        .stat .label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .stat .value { font-size: 1.25rem; font-weight: 800; }
        #done-el .value { color: var(--gold); }

        .stage { position: relative; }
        .board {
            display: grid; gap: 0;
            background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
            padding: 12px; box-shadow: var(--shadow);
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        .cell { width: var(--cs); height: var(--cs); position: relative; }
        .cell.wall {
            background: #2b3247; border-radius: 6px;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.08);
        }
        body.light-mode .cell.wall { background: #cdd3e1; box-shadow: inset 0 -3px 0 rgba(35,39,53,.15); }
        .cell.goal::after {
            content: ''; position: absolute; inset: 32%;
            border: 3px solid var(--accent-2); border-radius: 50%; opacity: .8;
        }
        .box {
            position: absolute; inset: 8%; border-radius: 22%;
            background: linear-gradient(135deg, #fbbf24, #d97706);
            box-shadow: inset 0 0 0 3px rgba(120,53,15,.5), inset 6px 6px 10px rgba(255,255,255,.25), 0 2px 6px rgba(0,0,0,.35);
            transition: transform .1s ease;
        }
        .box.home { background: linear-gradient(135deg, #34d399, #059669); box-shadow: inset 0 0 0 3px rgba(6,78,59,.5), 0 0 12px rgba(52,211,153,.4); }
        .player {
            position: absolute; inset: 12%; border-radius: 50%; z-index: 2;
            background: radial-gradient(circle at 35% 30%, #c4b5fd, #8b5cf6 60%, #6d28d9);
            box-shadow: 0 2px 6px rgba(0,0,0,.4);
        }
        .player::after {
            content: ''; position: absolute; top: 30%; left: 24%; width: 14%; height: 14%;
            border-radius: 50%; background: #1e1b4b;
            box-shadow: calc(var(--cs) * .26) 0 0 #1e1b4b;
        }

        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; gap: 10px;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
            background: rgba(10,12,18,.82); border-radius: 16px; backdrop-filter: blur(3px); z-index: 5;
        }
        body.light-mode .overlay { background: rgba(240,243,249,.9); }
        .overlay.hidden { display: none; }
        .overlay .big { font-size: 1.9rem; font-weight: 800; margin: 0; }
        .overlay .sub { color: var(--muted); margin: 0; line-height: 1.8; }
        .btn {
            padding: 12px 26px; font-size: 1rem; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 6px 18px rgba(139,92,246,.35); transition: transform .15s;
        }
        .btn:hover { transform: translateY(-2px); }

        .toolbar { display: flex; gap: 8px; padding: 16px; }
        .tool-btn {
            padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--panel); color: var(--text); font-weight: 600; cursor: pointer;
        }
        .tool-btn:hover:not(:disabled) { border-color: var(--accent); }
        .tool-btn:disabled { opacity: .4; cursor: default; }
        .hint { color: var(--muted); font-size: .88rem; padding: 0 16px 20px; text-align: center; max-width: 480px; }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="back" href="index.html">← Hub</a>
        <h1>📦 Sokoban</h1>
        <button id="theme-btn" class="icon-btn" title="Toggle theme">☀️</button>
    </header>

    <div class="levels" id="levels"></div>

    <div class="hud">
        <div class="stat"><div class="label">Level</div><div class="value" id="lvl">1</div></div>
        <div class="stat"><div class="label">Moves</div><div class="value" id="moves">0</div></div>
        <div class="stat" id="done-el"><div class="label">Solved</div><div class="value" id="done">0/12</div></div>
    </div>

    <div class="stage">
        <div class="board" id="board"></div>
        <div class="overlay hidden" id="overlay">
            <p class="big" id="ov-title"></p>
            <p class="sub" id="ov-sub"></p>
            <button class="btn" id="ov-btn">Next Level</button>
        </div>
    </div>

    <div class="toolbar">
        <button class="tool-btn" id="undo-btn">↩️ Undo</button>
        <button class="tool-btn" id="restart-btn">🔄 Restart</button>
    </div>

    <p class="hint">Push every crate onto a <b>ring</b>. Arrows / WASD or <b>swipe</b> to move, <b>U</b> to undo, <b>R</b> to restart. Crates only push — never pull — so mind the corners!</p>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        function applyTheme() {
            const light = localStorage.getItem('theme') === 'light';
            document.body.classList.toggle('light-mode', light);
            themeBtn.textContent = light ? '🌙' : '☀️';
        }
        themeBtn.onclick = () => { localStorage.setItem('theme', localStorage.getItem('theme') === 'light' ? 'dark' : 'light'); applyTheme(); };
        applyTheme();

        // Every level BFS-verified solvable; ordered by solution length.
        const LEVELS = [
            ['######',
             '#    #',
             '# @$.#',
             '#    #',
             '######'],
            ['#######',
             '#     #',
             '# $$  #',
             '# ..  #',
             '#  @  #',
             '#######'],
            ['#######',
             '#.  ###',
             '#  $  #',
             '#  @$ #',
             '### . #',
             '#######'],
            ['########',
             '#      #',
             '#  . # #',
             '# $$ # #',
             '#  . # #',
             '# @    #',
             '########'],
            ['########',
             '#      #',
             '# .$.  #',
             '# $@$  #',
             '#  .   #',
             '########'],
            ['########',
             '#  .   #',
             '# ##$# #',
             '# #  . #',
             '# # $# #',
             '# @  # #',
             '########'],
            ['#########',
             '#       #',
             '# $ . $ #',
             '# .@ .  #',
             '# $ . $ #',
             '#       #',
             '#########'],
            ['########',
             '#      #',
             '#  ##  #',
             '# $##. #',
             '# $  . #',
             '#  @   #',
             '########'],
            ['#########',
             '#.     .#',
             '#  $ $  #',
             '#   @   #',
             '#  $ $  #',
             '#.     .#',
             '#########'],
            ['#########',
             '#  ##   #',
             '# $$  ..#',
             '#  $  . #',
             '#@ #    #',
             '#########'],
            ['#########',
             '##  #  ##',
             '#  $ $  #',
             '# .# #. #',
             '#  $@$  #',
             '# .# #. #',
             '#       #',
             '#########'],
            ['##########',
             '#        #',
             '# ## ##$ #',
             '# #..  $ #',
             '# #..    #',
             '# ##  ####',
             '#  $ $   #',
             '#     @  #',
             '##########'],
        ];
        const N_LEVELS = LEVELS.length;
        const PROGRESS_KEY = 'mg-best-sokoban';       // highest level solved (hub badge)
        const UNLOCK_KEY = 'mg-sokoban-unlocked';     // highest level playable

        let lvl, W, H, walls, goals, boxes, player, moves, undoStack, solvedNow;
        const boardEl = document.getElementById('board');
        const overlay = document.getElementById('overlay');

        const unlocked = () => Math.min(N_LEVELS, +localStorage.getItem(UNLOCK_KEY) || 1);
        const solvedCount = () => Math.min(N_LEVELS, +localStorage.getItem(PROGRESS_KEY) || 0);

        function load(n) {
            lvl = n;
            const rows = LEVELS[n - 1];
            H = rows.length; W = Math.max(...rows.map(r => r.length));
            walls = new Set(); goals = new Set(); boxes = new Set();
            for (let r = 0; r < H; r++) for (let c = 0; c < W; c++) {
                const ch = (rows[r] || '')[c] || ' ';
                const k = r * W + c;
                if (ch === '#') walls.add(k);
                if (ch === '.' || ch === '*' || ch === '+') goals.add(k);
                if (ch === '$' || ch === '*') boxes.add(k);
                if (ch === '@' || ch === '+') player = k;
            }
            moves = 0; undoStack = []; solvedNow = false;
            overlay.classList.add('hidden');
            renderChrome();
            build();
        }

        function build() {
            const cs = Math.floor(Math.min(440, window.innerWidth * 0.94 - 26) / W);
            boardEl.style.setProperty('--cs', Math.min(52, cs) + 'px');
            boardEl.style.gridTemplateColumns = `repeat(${W}, var(--cs))`;
            boardEl.innerHTML = '';
            for (let k = 0; k < W * H; k++) {
                const d = document.createElement('div');
                d.className = 'cell' + (walls.has(k) ? ' wall' : '') + (goals.has(k) ? ' goal' : '');
                if (boxes.has(k)) {
                    const b = document.createElement('div');
                    b.className = 'box' + (goals.has(k) ? ' home' : '');
                    d.appendChild(b);
                }
                if (k === player) {
                    const p = document.createElement('div');
                    p.className = 'player';
                    d.appendChild(p);
                }
                boardEl.appendChild(d);
            }
            document.getElementById('moves').textContent = moves;
        }

        function renderChrome() {
            document.getElementById('lvl').textContent = lvl;
            document.getElementById('done').textContent = `${solvedCount()}/${N_LEVELS}`;
            const wrap = document.getElementById('levels');
            wrap.innerHTML = '';
            for (let i = 1; i <= N_LEVELS; i++) {
                const b = document.createElement('button');
                b.className = 'lvl-btn' + (i === lvl ? ' active' : i <= solvedCount() ? ' done' : '');
                b.textContent = i;
                b.disabled = i > unlocked();
                b.onclick = () => load(i);
                wrap.appendChild(b);
            }
        }

        function move(dr, dc) {
            if (solvedNow) return;
            const d = dr * W + dc;
            const p1 = player + d;
            if (walls.has(p1)) return;
            if (boxes.has(p1)) {
                const b1 = p1 + d;
                if (walls.has(b1) || boxes.has(b1)) return;
                undoStack.push({ player, boxes: new Set(boxes) });
                boxes.delete(p1);
                boxes.add(b1);
            } else {
                undoStack.push({ player, boxes: new Set(boxes) });
            }
            player = p1;
            moves++;
            build();
            if ([...boxes].every(b => goals.has(b))) win();
        }

        function win() {
            solvedNow = true;
            if (lvl > solvedCount()) localStorage.setItem(PROGRESS_KEY, lvl);
            if (lvl + 1 > unlocked()) localStorage.setItem(UNLOCK_KEY, Math.min(N_LEVELS, lvl + 1));
            renderChrome();
            const last = lvl === N_LEVELS;
            document.getElementById('ov-title').textContent = last ? '🏆 Warehouse Cleared!' : '📦 Level Solved!';
            document.getElementById('ov-sub').innerHTML = `Level ${lvl} done in <b>${moves}</b> moves` + (last ? '<br>That was the final level — legend!' : '');
            document.getElementById('ov-btn').textContent = last ? 'Play Again' : 'Next Level';
            setTimeout(() => overlay.classList.remove('hidden'), 350);
        }

        document.getElementById('ov-btn').onclick = () => load(lvl === N_LEVELS ? 1 : lvl + 1);
        document.getElementById('restart-btn').onclick = () => load(lvl);
        document.getElementById('undo-btn').onclick = undo;
        function undo() {
            if (!undoStack.length || solvedNow) return;
            const s = undoStack.pop();
            player = s.player;
            boxes = s.boxes;
            moves++;
            build();
        }

        document.addEventListener('keydown', e => {
            const k = e.key.toLowerCase();
            if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' '].includes(e.key.toLowerCase()) || ['w', 'a', 's', 'd'].includes(k)) e.preventDefault();
            if (e.key === 'ArrowUp' || k === 'w') move(-1, 0);
            else if (e.key === 'ArrowDown' || k === 's') move(1, 0);
            else if (e.key === 'ArrowLeft' || k === 'a') move(0, -1);
            else if (e.key === 'ArrowRight' || k === 'd') move(0, 1);
            else if (k === 'u') undo();
            else if (k === 'r') load(lvl);
        });

        let touchStart = null;
        boardEl.addEventListener('pointerdown', e => { touchStart = { x: e.clientX, y: e.clientY }; });
        window.addEventListener('pointerup', e => {
            if (!touchStart) return;
            const dx = e.clientX - touchStart.x, dy = e.clientY - touchStart.y;
            touchStart = null;
            if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
            if (Math.abs(dx) > Math.abs(dy)) move(0, dx > 0 ? 1 : -1);
            else move(dy > 0 ? 1 : -1, 0);
        });
        window.addEventListener('resize', build);

        load(Math.min(unlocked(), N_LEVELS));
    </script>
</body>
</html>
