<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frogger — Mini-Game Hub</title>
    <style>
        :root {
            --bg: #0f1117; --panel: #171a23; --panel-2: #1e2230; --border: #2a2f3f;
            --text: #e8eaf2; --muted: #9aa1b5; --accent: #8b5cf6; --accent-2: #22d3ee;
            --good: #34d399; --bad: #f87171; --gold: #fbbf24; --shadow: 0 10px 30px rgba(0,0,0,.35);
        }
        body.light-mode {
            --bg: #eef1f7; --panel: #ffffff; --panel-2: #f3f5fa; --border: #d8dce8;
            --text: #232735; --muted: #5b6274; --shadow: 0 10px 30px rgba(35,39,53,.12);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(900px 450px at 80% -10%, rgba(52,211,153,.1), transparent 60%), var(--bg);
            color: var(--text); transition: background-color .3s, color .3s;
        }
        .topbar {
            width: 100%; max-width: 600px; display: flex; align-items: center;
            justify-content: space-between; gap: 10px; padding: 14px 16px;
        }
        .back { color: var(--muted); text-decoration: none; font-weight: 600; padding: 8px 12px; border-radius: 10px; }
        .back:hover { color: var(--text); background: var(--panel); }
        h1 { font-size: 1.5rem; margin: 0; }
        .top-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: var(--panel); border: 1px solid var(--border); color: var(--text);
            width: 40px; height: 40px; border-radius: 10px; font-size: 1.05rem; cursor: pointer;
        }
        .icon-btn:hover { border-color: var(--accent); }

        .hud { display: flex; gap: 10px; padding: 4px 16px 12px; flex-wrap: wrap; justify-content: center; }
        .stat {
            background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
            padding: 7px 16px; text-align: center; min-width: 82px;
        }
        .stat .label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .stat .value { font-size: 1.2rem; font-weight: 800; }
        #best-el .value { color: var(--gold); }
        #lives-el .value { color: var(--bad); }

        .stage { position: relative; width: min(94vw, 520px); }
        canvas {
            display: block; width: 100%; height: auto;
            border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow);
            touch-action: none;
        }
        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; gap: 10px;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
            background: rgba(10,12,18,.72); border-radius: 16px; backdrop-filter: blur(3px);
        }
        .overlay.hidden { display: none; }
        .overlay .big { font-size: 2rem; font-weight: 800; margin: 0; color: #fff; }
        .overlay .sub { color: #cbd2e0; margin: 0; line-height: 1.7; }
        .overlay .new-best { color: var(--gold); font-weight: 800; }
        .btn {
            padding: 12px 26px; font-size: 1rem; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 6px 18px rgba(139,92,246,.35); transition: transform .15s;
        }
        .btn:hover { transform: translateY(-2px); }
        .hint { color: var(--muted); font-size: .88rem; padding: 12px 16px; text-align: center; }

        .dpad { display: none; grid-template-columns: repeat(3, 64px); gap: 6px; padding: 12px; }
        .dpad button {
            width: 64px; height: 56px; font-size: 1.4rem; border-radius: 12px;
            border: 1px solid var(--border); background: var(--panel); color: var(--text); cursor: pointer;
        }
        .dpad button:active { background: var(--accent); }
        .dpad .blank { visibility: hidden; }
        @media (pointer: coarse) { .dpad { display: grid; } .hint .kb { display: none; } }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="back" href="index.html">← Hub</a>
        <h1>🐸 Frogger</h1>
        <div class="top-actions">
            <button id="sound-btn" class="icon-btn" title="Toggle sound">🔊</button>
            <button id="theme-btn" class="icon-btn" title="Toggle theme">☀️</button>
        </div>
    </header>

    <div class="hud">
        <div class="stat"><div class="label">Score</div><div class="value" id="score">0</div></div>
        <div class="stat" id="best-el"><div class="label">Best</div><div class="value" id="best">0</div></div>
        <div class="stat"><div class="label">Level</div><div class="value" id="level">1</div></div>
        <div class="stat" id="lives-el"><div class="label">Lives</div><div class="value" id="lives">3</div></div>
    </div>

    <div class="stage">
        <canvas id="gameCanvas" width="520" height="520"></canvas>
        <div class="overlay" id="overlay">
            <p class="big" id="ov-title">🐸 Frogger</p>
            <p class="sub" id="ov-sub">Dodge the cars, ride the logs,<br>and fill all 5 lily pads!</p>
            <button class="btn" id="ov-btn">Play</button>
        </div>
    </div>

    <p class="hint"><span class="kb">Arrows / WASD to hop · </span>Swipe on the board to hop</p>

    <div class="dpad">
        <span class="blank"></span><button data-d="up">⬆️</button><span class="blank"></span>
        <button data-d="left">⬅️</button><button data-d="down">⬇️</button><button data-d="right">➡️</button>
    </div>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        function applyTheme() {
            const light = localStorage.getItem('theme') === 'light';
            document.body.classList.toggle('light-mode', light);
            themeBtn.textContent = light ? '🌙' : '☀️';
        }
        themeBtn.onclick = () => { localStorage.setItem('theme', localStorage.getItem('theme') === 'light' ? 'dark' : 'light'); applyTheme(); };
        applyTheme();

        let muted = localStorage.getItem('mg-muted') === '1', actx;
        const soundBtn = document.getElementById('sound-btn');
        soundBtn.textContent = muted ? '🔇' : '🔊';
        soundBtn.onclick = () => { muted = !muted; localStorage.setItem('mg-muted', muted ? '1' : '0'); soundBtn.textContent = muted ? '🔇' : '🔊'; };
        function beep(freq, dur = 0.07, type = 'square', vol = 0.04, slide = 0) {
            if (muted) return;
            actx = actx || new (window.AudioContext || window.webkitAudioContext)();
            const o = actx.createOscillator(), g = actx.createGain();
            o.type = type; o.frequency.value = freq;
            if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), actx.currentTime + dur);
            g.gain.setValueAtTime(vol, actx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
            o.connect(g); g.connect(actx.destination);
            o.start(); o.stop(actx.currentTime + dur);
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CELL = 40, COLS = 13, ROWS = 13;
        const W = COLS * CELL, H = ROWS * CELL;
        const BEST_KEY = 'mg-best-frogger';

        // rows: 0 = home bays, 1-5 water, 6 median, 7-11 road, 12 start
        const HOME_ROW = 0, START_ROW = 12;
        const BAY_COLS = [1, 3, 6, 9, 11];
        const CAR_EMOJI = ['🚗', '🚙', '🚕', '🛻', '🚓'];

        let frog, lanes, bays, score, lives, level, maxRowReached;
        let state = 'menu'; // menu | play | dead | over
        let last = 0, deadTimer = 0;
        let best = +localStorage.getItem(BEST_KEY) || 0;
        document.getElementById('best').textContent = best;

        const overlay = document.getElementById('overlay');
        const ovTitle = document.getElementById('ov-title');
        const ovSub = document.getElementById('ov-sub');
        const ovBtn = document.getElementById('ov-btn');

        function speedMult() { return 1 + (level - 1) * 0.25; }

        function buildLanes() {
            lanes = [];
            // road lanes (rows 7-11)
            const roadSpecs = [
                { row: 7,  speed:  1.5, count: 3 },
                { row: 8,  speed: -1.9, count: 2 },
                { row: 9,  speed:  1.2, count: 3 },
                { row: 10, speed: -2.3, count: 2 },
                { row: 11, speed:  1.7, count: 3 },
            ];
            roadSpecs.forEach(s => {
                const items = [];
                for (let i = 0; i < s.count; i++) {
                    items.push({
                        x: i * (W / s.count) + Math.random() * 60,
                        w: CELL * 1.4,
                        emoji: CAR_EMOJI[Math.floor(Math.random() * CAR_EMOJI.length)]
                    });
                }
                lanes.push({ row: s.row, type: 'car', speed: s.speed, items });
            });
            // water lanes (rows 1-5)
            const logSpecs = [
                { row: 1, speed:  1.3, count: 3, w: 3 },
                { row: 2, speed: -1.0, count: 3, w: 2 },
                { row: 3, speed:  1.8, count: 2, w: 4 },
                { row: 4, speed: -1.4, count: 3, w: 3 },
                { row: 5, speed:  1.0, count: 3, w: 2 },
            ];
            logSpecs.forEach(s => {
                const items = [];
                for (let i = 0; i < s.count; i++) {
                    items.push({ x: i * (W / s.count) + Math.random() * 50, w: CELL * s.w });
                }
                lanes.push({ row: s.row, type: 'log', speed: s.speed, items });
            });
        }

        function resetFrog() {
            frog = { x: Math.floor(COLS / 2) * CELL, row: START_ROW };
            maxRowReached = START_ROW;
        }

        function newGame() {
            score = 0; lives = 3; level = 1;
            bays = BAY_COLS.map(() => false);
            buildLanes();
            resetFrog();
            updateHud();
        }

        function updateHud() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('level').textContent = level;
            document.getElementById('best').textContent = best;
        }

        function addScore(n) {
            score += n;
            if (score > best) { best = score; localStorage.setItem(BEST_KEY, best); }
            updateHud();
        }

        function hop(d) {
            if (state !== 'play') return;
            if (d === 'left') frog.x = Math.max(0, frog.x - CELL);
            else if (d === 'right') frog.x = Math.min(W - CELL, frog.x + CELL);
            else if (d === 'down') frog.row = Math.min(START_ROW, frog.row + 1);
            else if (d === 'up') {
                frog.row = Math.max(HOME_ROW, frog.row - 1);
                if (frog.row < maxRowReached) {
                    maxRowReached = frog.row;
                    if (frog.row !== HOME_ROW) addScore(2);
                }
            }
            beep(500, .04, 'square', .03, 150);
            if (frog.row === HOME_ROW) checkHome();
        }

        function checkHome() {
            const centre = frog.x + CELL / 2;
            for (let i = 0; i < BAY_COLS.length; i++) {
                const bx = BAY_COLS[i] * CELL;
                if (!bays[i] && centre > bx && centre < bx + CELL) {
                    bays[i] = true;
                    addScore(50);
                    beep(660, .1, 'triangle', .06); setTimeout(() => beep(880, .12, 'triangle', .06), 100);
                    if (bays.every(b => b)) levelUp();
                    else resetFrog();
                    return;
                }
            }
            die(); // splashed into the hedge / occupied bay
        }

        function levelUp() {
            level++;
            addScore(200);
            bays = BAY_COLS.map(() => false);
            buildLanes();
            resetFrog();
            state = 'pause';
            ovTitle.textContent = `✨ Level ${level}!`;
            ovSub.textContent = '+200 bonus · everything moves faster now…';
            ovBtn.textContent = 'Continue';
            overlay.classList.remove('hidden');
        }

        function die() {
            if (state !== 'play') return;
            state = 'dead';
            deadTimer = 40;
            beep(160, .3, 'sawtooth', .07, -100);
            lives--;
            updateHud();
        }

        function update(dt) {
            const mult = speedMult();
            lanes.forEach(lane => {
                lane.items.forEach(it => {
                    it.x += lane.speed * mult * dt;
                    if (lane.speed > 0 && it.x > W) it.x = -it.w;
                    if (lane.speed < 0 && it.x + it.w < 0) it.x = W;
                });
            });

            if (state === 'dead') {
                deadTimer -= dt;
                if (deadTimer <= 0) {
                    if (lives <= 0) return gameOver();
                    resetFrog();
                    state = 'play';
                }
                return;
            }
            if (state !== 'play') return;

            const lane = lanes.find(l => l.row === frog.row);
            if (lane) {
                const fx1 = frog.x + 8, fx2 = frog.x + CELL - 8;
                if (lane.type === 'car') {
                    for (const car of lane.items) {
                        if (fx2 > car.x + 4 && fx1 < car.x + car.w - 4) return die();
                    }
                } else {
                    // water: must be on a log
                    const centre = frog.x + CELL / 2;
                    const log = lane.items.find(l => centre > l.x - 4 && centre < l.x + l.w + 4);
                    if (!log) return die();
                    frog.x += lane.speed * speedMult() * dt;
                    if (frog.x < -CELL / 2 || frog.x > W - CELL / 2) return die();
                }
            }
        }

        function gameOver() {
            state = 'over';
            const isBest = score >= best && score > 0;
            ovTitle.textContent = '💀 Game Over';
            ovSub.innerHTML = `Score: <b>${score}</b> · Level ${level}` +
                (isBest ? ' · <span class="new-best">🏆 New best!</span>' : ` · Best: ${best}`);
            ovBtn.textContent = 'Play Again';
            overlay.classList.remove('hidden');
        }

        function rowY(row) { return row * CELL; }

        function draw() {
            // terrain
            for (let r = 0; r < ROWS; r++) {
                let color;
                if (r === HOME_ROW) color = '#14532d';
                else if (r >= 1 && r <= 5) color = '#1d4ed8';
                else if (r === 6 || r === START_ROW) color = '#3f6212';
                else color = '#1f2430';
                ctx.fillStyle = color;
                ctx.fillRect(0, rowY(r), W, CELL);
            }
            // water shimmer
            ctx.fillStyle = 'rgba(255,255,255,.06)';
            for (let r = 1; r <= 5; r++)
                for (let x = (r * 37) % 60; x < W; x += 60)
                    ctx.fillRect(x, rowY(r) + 14, 26, 3);
            // road lane markings
            ctx.fillStyle = 'rgba(255,255,255,.25)';
            for (let r = 8; r <= 11; r++)
                for (let x = 6; x < W; x += 52)
                    ctx.fillRect(x, rowY(r) - 2, 26, 4);
            // home bays
            for (let i = 0; i < BAY_COLS.length; i++) {
                const bx = BAY_COLS[i] * CELL;
                ctx.fillStyle = '#052e16';
                ctx.beginPath();
                ctx.roundRect(bx + 3, rowY(HOME_ROW) + 3, CELL - 6, CELL - 6, 8);
                ctx.fill();
                if (bays[i]) {
                    ctx.font = '26px serif';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('🐸', bx + CELL / 2, rowY(HOME_ROW) + CELL / 2 + 1);
                } else {
                    ctx.font = '20px serif';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('🪷', bx + CELL / 2, rowY(HOME_ROW) + CELL / 2 + 1);
                }
            }

            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            lanes.forEach(lane => {
                const y = rowY(lane.row) + CELL / 2;
                if (lane.type === 'log') {
                    lane.items.forEach(l => {
                        ctx.fillStyle = '#92613a';
                        ctx.beginPath();
                        ctx.roundRect(l.x, y - 13, l.w, 26, 13);
                        ctx.fill();
                        ctx.fillStyle = 'rgba(0,0,0,.18)';
                        for (let x = l.x + 12; x < l.x + l.w - 10; x += 26)
                            ctx.fillRect(x, y - 9, 3, 18);
                    });
                } else {
                    ctx.font = '30px serif';
                    lane.items.forEach(c => {
                        ctx.save();
                        ctx.translate(c.x + c.w / 2, y + 1);
                        if (lane.speed > 0) ctx.scale(-1, 1); // car emoji face left by default
                        ctx.fillText(c.emoji, 0, 0);
                        ctx.restore();
                    });
                }
            });

            // frog (or splat)
            const fy = rowY(frog.row) + CELL / 2 + 1;
            ctx.font = '28px serif';
            if (state === 'dead') ctx.fillText('💥', frog.x + CELL / 2, fy);
            else ctx.fillText('🐸', frog.x + CELL / 2, fy);
        }

        function loop(now) {
            if (state !== 'play' && state !== 'dead') return;
            const dt = Math.min((now - (last || now)) / 16.667, 3);
            last = now;
            update(dt);
            if (state === 'play' || state === 'dead') {
                draw();
                requestAnimationFrame(loop);
            }
        }

        function begin() {
            if (state === 'menu' || state === 'over') newGame();
            state = 'play';
            overlay.classList.add('hidden');
            last = 0;
            requestAnimationFrame(loop);
        }
        ovBtn.onclick = begin;

        document.addEventListener('keydown', e => {
            const map = {
                ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
                w: 'up', s: 'down', a: 'left', d: 'right'
            };
            const d = map[e.key] || map[e.key.toLowerCase()];
            if (d) {
                e.preventDefault();
                if (state === 'play') hop(d);
            } else if (e.key === ' ' || e.key === 'Enter') {
                if (state === 'menu' || state === 'over' || state === 'pause') begin();
            }
        });

        document.querySelectorAll('.dpad button').forEach(b =>
            b.addEventListener('pointerdown', e => { e.preventDefault(); hop(b.dataset.d); }));

        let touchStart = null;
        canvas.addEventListener('pointerdown', e => { touchStart = { x: e.clientX, y: e.clientY }; });
        canvas.addEventListener('pointerup', e => {
            if (!touchStart) return;
            const dx = e.clientX - touchStart.x, dy = e.clientY - touchStart.y;
            touchStart = null;
            if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
            hop(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
        });

        newGame();
        draw();
    </script>
</body>
</html>
