<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Hockey — Mini-Game Hub</title>
    <style>
        :root {
            --bg: #0f1117; --panel: #171a23; --panel-2: #1e2230; --border: #2a2f3f;
            --text: #e8eaf2; --muted: #9aa1b5; --accent: #8b5cf6; --accent-2: #22d3ee;
            --good: #34d399; --bad: #f87171; --gold: #fbbf24; --shadow: 0 10px 30px rgba(0,0,0,.35);
        }
        body.light-mode {
            --bg: #eef1f7; --panel: #ffffff; --panel-2: #f3f5fa; --border: #d8dce8;
            --text: #232735; --muted: #5b6274; --shadow: 0 10px 30px rgba(35,39,53,.12);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(900px 450px at 80% -10%, rgba(34,211,238,.12), transparent 60%), var(--bg);
            color: var(--text); transition: background-color .3s, color .3s;
        }
        .topbar {
            width: 100%; max-width: 520px; display: flex; align-items: center;
            justify-content: space-between; gap: 10px; padding: 14px 16px;
        }
        .back { color: var(--muted); text-decoration: none; font-weight: 600; padding: 8px 12px; border-radius: 10px; }
        .back:hover { color: var(--text); background: var(--panel); }
        h1 { font-size: 1.5rem; margin: 0; }
        .top-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: var(--panel); border: 1px solid var(--border); color: var(--text);
            width: 40px; height: 40px; border-radius: 10px; font-size: 1.05rem; cursor: pointer;
        }
        .icon-btn:hover { border-color: var(--accent); }

        .hud { display: flex; gap: 10px; padding: 4px 16px 12px; flex-wrap: wrap; justify-content: center; }
        .stat {
            background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
            padding: 7px 18px; text-align: center; min-width: 90px;
        }
        .stat .label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .stat .value { font-size: 1.25rem; font-weight: 800; }
        #you-el .value { color: var(--accent-2); }
        #ai-el .value { color: var(--bad); }
        #wins-el .value { color: var(--gold); }

        .stage { position: relative; width: min(94vw, 400px); }
        canvas {
            display: block; width: 100%; height: auto;
            border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow);
            touch-action: none; cursor: none;
        }
        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; gap: 10px;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
            background: rgba(10,12,18,.72); border-radius: 16px; backdrop-filter: blur(3px);
        }
        .overlay.hidden { display: none; }
        .overlay .big { font-size: 2rem; font-weight: 800; margin: 0; color: #fff; }
        .overlay .sub { color: #cbd2e0; margin: 0; line-height: 1.7; }
        .overlay .new-best { color: var(--gold); font-weight: 800; }
        .btn {
            padding: 12px 26px; font-size: 1rem; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 6px 18px rgba(139,92,246,.35); transition: transform .15s;
        }
        .btn:hover { transform: translateY(-2px); }
        .hint { color: var(--muted); font-size: .88rem; padding: 12px 16px; text-align: center; }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="back" href="index.html">← Hub</a>
        <h1>🏒 Air Hockey</h1>
        <div class="top-actions">
            <button id="sound-btn" class="icon-btn" title="Toggle sound">🔊</button>
            <button id="theme-btn" class="icon-btn" title="Toggle theme">☀️</button>
        </div>
    </header>

    <div class="hud">
        <div class="stat" id="you-el"><div class="label">You</div><div class="value" id="you">0</div></div>
        <div class="stat" id="ai-el"><div class="label">AI</div><div class="value" id="ai">0</div></div>
        <div class="stat" id="wins-el"><div class="label">Match Wins</div><div class="value" id="wins">0</div></div>
    </div>

    <div class="stage">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="overlay" id="overlay">
            <p class="big" id="ov-title">🏒 Air Hockey</p>
            <p class="sub" id="ov-sub">Slide your mallet to smack the puck.<br>First to 7 goals wins!</p>
            <button class="btn" id="ov-btn">Play</button>
        </div>
    </div>

    <p class="hint">Move your mallet with the mouse or your finger — you control the bottom half.</p>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        function applyTheme() {
            const light = localStorage.getItem('theme') === 'light';
            document.body.classList.toggle('light-mode', light);
            themeBtn.textContent = light ? '🌙' : '☀️';
        }
        themeBtn.onclick = () => { localStorage.setItem('theme', localStorage.getItem('theme') === 'light' ? 'dark' : 'light'); applyTheme(); };
        applyTheme();

        let muted = localStorage.getItem('mg-muted') === '1', actx;
        const soundBtn = document.getElementById('sound-btn');
        soundBtn.textContent = muted ? '🔇' : '🔊';
        soundBtn.onclick = () => { muted = !muted; localStorage.setItem('mg-muted', muted ? '1' : '0'); soundBtn.textContent = muted ? '🔇' : '🔊'; };
        function beep(freq, dur = 0.06, type = 'square', vol = 0.05, slide = 0) {
            if (muted) return;
            actx = actx || new (window.AudioContext || window.webkitAudioContext)();
            const o = actx.createOscillator(), g = actx.createGain();
            o.type = type; o.frequency.value = freq;
            if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), actx.currentTime + dur);
            g.gain.setValueAtTime(vol, actx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
            o.connect(g); g.connect(actx.destination);
            o.start(); o.stop(actx.currentTime + dur);
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        const WINS_KEY = 'mg-wins-hockey';
        const PUCK_R = 14, MALLET_R = 26, GOAL_W = 140, TARGET = 7;
        const GOAL_L = (W - GOAL_W) / 2, GOAL_R = (W + GOAL_W) / 2;

        let puck, me, ai, sYou, sAi, goalFlash;
        let state = 'menu', last = 0;
        let wins = +localStorage.getItem(WINS_KEY) || 0;
        document.getElementById('wins').textContent = wins;

        const overlay = document.getElementById('overlay');
        const ovTitle = document.getElementById('ov-title');
        const ovSub = document.getElementById('ov-sub');
        const ovBtn = document.getElementById('ov-btn');

        function newGame() {
            sYou = 0; sAi = 0;
            me = { x: W / 2, y: H - 90, vx: 0, vy: 0, tx: W / 2, ty: H - 90 };
            ai = { x: W / 2, y: 90, vx: 0, vy: 0 };
            resetPuck('you');
            goalFlash = null;
            updateHud();
        }

        function resetPuck(loser) {
            puck = { x: W / 2, y: loser === 'you' ? H * 0.65 : H * 0.35, dx: 0, dy: 0 };
        }

        function updateHud() {
            document.getElementById('you').textContent = sYou;
            document.getElementById('ai').textContent = sAi;
            document.getElementById('wins').textContent = wins;
        }

        function malletHit(m) {
            const dx = puck.x - m.x, dy = puck.y - m.y;
            const dist = Math.hypot(dx, dy);
            if (dist >= MALLET_R + PUCK_R || dist === 0) return;
            const nx = dx / dist, ny = dy / dist;
            // push the puck out of the mallet
            puck.x = m.x + nx * (MALLET_R + PUCK_R + 0.5);
            puck.y = m.y + ny * (MALLET_R + PUCK_R + 0.5);
            // reflect velocity along the normal and add mallet momentum
            const vDotN = puck.dx * nx + puck.dy * ny;
            if (vDotN < 0) {
                puck.dx -= 2 * vDotN * nx;
                puck.dy -= 2 * vDotN * ny;
            }
            puck.dx = puck.dx * 0.5 + m.vx * 0.9 + nx * 2.5;
            puck.dy = puck.dy * 0.5 + m.vy * 0.9 + ny * 2.5;
            const sp = Math.hypot(puck.dx, puck.dy);
            if (sp > 14) { puck.dx *= 14 / sp; puck.dy *= 14 / sp; }
            beep(320 + Math.random() * 120, .05, 'square', .06);
        }

        function update(dt) {
            // smooth player mallet toward pointer target, track velocity
            const ox = me.x, oy = me.y;
            me.x += (me.tx - me.x) * Math.min(1, 0.55 * dt);
            me.y += (me.ty - me.y) * Math.min(1, 0.55 * dt);
            me.x = Math.max(MALLET_R + 8, Math.min(W - MALLET_R - 8, me.x));
            me.y = Math.max(H / 2 + MALLET_R, Math.min(H - MALLET_R - 8, me.y));
            me.vx = (me.x - ox) / Math.max(dt, .001);
            me.vy = (me.y - oy) / Math.max(dt, .001);

            // AI mallet
            const aox = ai.x, aoy = ai.y;
            let tx, ty;
            if (puck.y < H / 2 + 40) {
                // attack: aim slightly behind the puck to knock it downward
                tx = puck.x;
                ty = puck.y - PUCK_R - 6;
                if (puck.y < ai.y) ty = puck.y + 20; // puck got behind — recover
            } else {
                tx = W / 2 + (puck.x - W / 2) * 0.3;
                ty = 90;
            }
            const maxV = 4.6 * dt;
            ai.x += Math.max(-maxV, Math.min(maxV, (tx - ai.x) * 0.2));
            ai.y += Math.max(-maxV, Math.min(maxV, (ty - ai.y) * 0.2));
            ai.x = Math.max(MALLET_R + 8, Math.min(W - MALLET_R - 8, ai.x));
            ai.y = Math.max(MALLET_R + 8, Math.min(H / 2 - MALLET_R, ai.y));
            ai.vx = (ai.x - aox) / Math.max(dt, .001);
            ai.vy = (ai.y - aoy) / Math.max(dt, .001);

            // puck physics
            puck.x += puck.dx * dt;
            puck.y += puck.dy * dt;
            puck.dx *= Math.pow(0.993, dt);
            puck.dy *= Math.pow(0.993, dt);

            // side walls
            if (puck.x < PUCK_R + 6) { puck.x = PUCK_R + 6; puck.dx = Math.abs(puck.dx); beep(240, .04, 'square', .03); }
            if (puck.x > W - PUCK_R - 6) { puck.x = W - PUCK_R - 6; puck.dx = -Math.abs(puck.dx); beep(240, .04, 'square', .03); }

            // top/bottom: goal mouth or wall
            const inMouth = puck.x > GOAL_L + 6 && puck.x < GOAL_R - 6;
            if (puck.y < PUCK_R + 6) {
                if (inMouth) { if (puck.y < -PUCK_R) return goal('you'); }
                else { puck.y = PUCK_R + 6; puck.dy = Math.abs(puck.dy); beep(240, .04, 'square', .03); }
            }
            if (puck.y > H - PUCK_R - 6) {
                if (inMouth) { if (puck.y > H + PUCK_R) return goal('ai'); }
                else { puck.y = H - PUCK_R - 6; puck.dy = -Math.abs(puck.dy); beep(240, .04, 'square', .03); }
            }

            malletHit(me);
            malletHit(ai);

            if (goalFlash) {
                goalFlash.t -= dt;
                if (goalFlash.t <= 0) goalFlash = null;
            }
        }

        function goal(who) {
            if (who === 'you') { sYou++; beep(660, .12, 'triangle', .07); setTimeout(() => beep(880, .16, 'triangle', .07), 110); }
            else { sAi++; beep(220, .25, 'sawtooth', .06, -80); }
            updateHud();
            goalFlash = { who, t: 60 };
            if (sYou >= TARGET || sAi >= TARGET) return matchOver();
            resetPuck(who === 'you' ? 'ai' : 'you');
        }

        function matchOver() {
            state = 'over';
            const won = sYou >= TARGET;
            if (won) {
                wins++;
                localStorage.setItem(WINS_KEY, wins);
            }
            updateHud();
            ovTitle.textContent = won ? '🏆 You won the match!' : '🤖 AI wins the match!';
            ovSub.innerHTML = `Final score ${sYou} – ${sAi}` +
                (won ? ' · <span class="new-best">Career wins: ' + wins + '</span>' : '');
            ovBtn.textContent = 'Rematch';
            overlay.classList.remove('hidden');
        }

        function drawMallet(m, color) {
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(m.x, m.y, MALLET_R, 0, 7); ctx.fill();
            ctx.fillStyle = 'rgba(0,0,0,.25)';
            ctx.beginPath(); ctx.arc(m.x, m.y, MALLET_R - 8, 0, 7); ctx.fill();
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(m.x, m.y, MALLET_R - 14, 0, 7); ctx.fill();
        }

        function draw() {
            // table
            const g = ctx.createLinearGradient(0, 0, 0, H);
            g.addColorStop(0, '#101827'); g.addColorStop(1, '#0c1220');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, W, H);

            // markings
            ctx.strokeStyle = 'rgba(255,255,255,.18)';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(6, H / 2); ctx.lineTo(W - 6, H / 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(W / 2, H / 2, 52, 0, 7); ctx.stroke();
            ctx.beginPath(); ctx.arc(W / 2, H / 2, 5, 0, 7);
            ctx.fillStyle = 'rgba(255,255,255,.18)'; ctx.fill();

            // borders with goal gaps
            ctx.strokeStyle = 'rgba(255,255,255,.3)';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(GOAL_L, 5); ctx.lineTo(8, 5); ctx.lineTo(8, H - 5); ctx.lineTo(GOAL_L, H - 5);
            ctx.moveTo(GOAL_R, 5); ctx.lineTo(W - 8, 5); ctx.lineTo(W - 8, H - 5); ctx.lineTo(GOAL_R, H - 5);
            ctx.stroke();
            // goal mouths
            ctx.strokeStyle = '#f87171'; // AI's goal (top) — you score here
            ctx.beginPath(); ctx.moveTo(GOAL_L, 5); ctx.lineTo(GOAL_R, 5); ctx.stroke();
            ctx.strokeStyle = '#22d3ee';
            ctx.beginPath(); ctx.moveTo(GOAL_L, H - 5); ctx.lineTo(GOAL_R, H - 5); ctx.stroke();

            // goal flash
            if (goalFlash) {
                ctx.fillStyle = goalFlash.who === 'you' ? 'rgba(52,211,153,.9)' : 'rgba(248,113,113,.9)';
                ctx.font = '800 42px system-ui';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(goalFlash.who === 'you' ? 'GOAL! 🎉' : 'AI SCORES', W / 2, H / 2 - 90);
            }

            // puck
            ctx.fillStyle = '#0a0c12';
            ctx.beginPath(); ctx.arc(puck.x, puck.y + 2, PUCK_R, 0, 7); ctx.fill();
            ctx.fillStyle = '#2d3446';
            ctx.beginPath(); ctx.arc(puck.x, puck.y, PUCK_R, 0, 7); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,.15)';
            ctx.beginPath(); ctx.arc(puck.x, puck.y, PUCK_R - 6, 0, 7); ctx.fill();

            drawMallet(ai, '#f87171');
            drawMallet(me, '#22d3ee');
        }

        function loop(now) {
            if (state !== 'play') return;
            const dt = Math.min((now - (last || now)) / 16.667, 3);
            last = now;
            update(dt);
            if (state === 'play') {
                draw();
                requestAnimationFrame(loop);
            }
        }

        function begin() {
            if (state === 'menu' || state === 'over') newGame();
            state = 'play';
            overlay.classList.add('hidden');
            last = 0;
            requestAnimationFrame(loop);
        }
        ovBtn.onclick = begin;

        function setTarget(e) {
            const rect = canvas.getBoundingClientRect();
            me.tx = (e.clientX - rect.left) / rect.width * W;
            me.ty = (e.clientY - rect.top) / rect.height * H;
        }
        canvas.addEventListener('pointermove', setTarget);
        canvas.addEventListener('pointerdown', e => { e.preventDefault(); setTarget(e); });

        document.addEventListener('keydown', e => {
            if ((e.key === ' ' || e.key === 'Enter') && state !== 'play') { e.preventDefault(); begin(); }
            else if ((e.key === 'p' || e.key === 'P') && state === 'play') {
                state = 'pause';
                ovTitle.textContent = '⏸️ Paused';
                ovSub.textContent = '';
                ovBtn.textContent = 'Resume';
                overlay.classList.remove('hidden');
            } else if ((e.key === 'p' || e.key === 'P') && state === 'pause') begin();
        });
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && state === 'play') {
                state = 'pause';
                ovTitle.textContent = '⏸️ Paused';
                ovSub.textContent = '';
                ovBtn.textContent = 'Resume';
                overlay.classList.remove('hidden');
            }
        });

        newGame();
        draw();
    </script>
</body>
</html>
