<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A collection of fun mini-games built with HTML, CSS, and JavaScript.">
    <meta name="keywords" content="mini-games, html, css, javascript, web games, fun games">
    <meta name="author" content="Sukhi">
    <meta name="theme-color" content="#0f1117">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <title>Mini-Game Hub</title>
    <style>
        :root {
            --bg: #0f1117;
            --panel: #171a23;
            --panel-2: #1e2230;
            --border: #2a2f3f;
            --text: #e8eaf2;
            --muted: #9aa1b5;
            --accent: #8b5cf6;
            --accent-2: #22d3ee;
            --good: #34d399;
            --gold: #fbbf24;
            --shadow: 0 10px 30px rgba(0, 0, 0, .35);
        }
        body.light-mode {
            --bg: #eef1f7;
            --panel: #ffffff;
            --panel-2: #f3f5fa;
            --border: #d8dce8;
            --text: #232735;
            --muted: #5b6274;
            --shadow: 0 10px 30px rgba(35, 39, 53, .12);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(1000px 500px at 85% -10%, rgba(139, 92, 246, .14), transparent 60%),
                radial-gradient(800px 400px at 0% 110%, rgba(34, 211, 238, .10), transparent 60%),
                var(--bg);
            color: var(--text);
            transition: background-color .3s ease, color .3s ease;
            animation: fadeIn .4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 18px clamp(16px, 4vw, 40px);
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            user-select: none;
        }
        .brand .logo { font-size: 1.6rem; }
        .icon-btn {
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text);
            width: 42px;
            height: 42px;
            border-radius: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform .15s ease, border-color .15s ease;
        }
        .icon-btn:hover { transform: translateY(-2px); border-color: var(--accent); }

        .hero { text-align: center; padding: 20px 16px 8px; }
        h1 {
            font-size: clamp(2.2rem, 6vw, 3.4rem);
            margin: 0 0 8px;
            cursor: pointer;
            user-select: none;
            display: inline-block;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: transform .25s ease;
        }
        h1:hover { transform: scale(1.03); }
        .tagline { color: var(--muted); margin: 0 0 20px; font-size: 1.05rem; }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
            padding: 0 16px 8px;
        }
        .search-bar {
            width: min(420px, 90vw);
            padding: 12px 16px;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--panel);
            color: var(--text);
            outline: none;
            transition: border-color .2s ease, box-shadow .2s ease;
        }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139, 92, 246, .2); }
        .search-bar::placeholder { color: var(--muted); }

        .chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 8px 16px 4px; }
        .chip {
            padding: 8px 16px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--muted);
            font-size: .92rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s ease;
        }
        .chip:hover { border-color: var(--accent); color: var(--text); }
        .chip.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #fff;
            border-color: transparent;
        }

        .game-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
            gap: 16px;
            padding: 20px clamp(16px, 4vw, 40px) 10px;
            margin: 0 auto;
            max-width: 1200px;
            width: 100%;
        }
        .game {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            min-height: 160px;
            padding: 18px 12px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: var(--panel);
            color: var(--text);
            text-decoration: none;
            text-align: center;
            font-weight: 700;
            font-size: 1.02rem;
            box-shadow: var(--shadow);
            transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
            animation: cardIn .4s ease backwards;
        }
        @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
        .game:hover, .game:focus-visible {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 14px 34px rgba(139, 92, 246, .25);
            outline: none;
        }
        .game .icon { font-size: 2.6rem; line-height: 1; filter: drop-shadow(0 4px 10px rgba(0, 0, 0, .3)); }
        .game .tag {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: .68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--muted);
            background: var(--panel-2);
            border: 1px solid var(--border);
            padding: 3px 8px;
            border-radius: 999px;
        }
        .game .best {
            font-size: .8rem;
            font-weight: 600;
            color: var(--gold);
            min-height: 1.1em;
        }
        .game .desc { font-size: .78rem; font-weight: 400; color: var(--muted); }

        .no-results { color: var(--muted); padding: 40px 16px; text-align: center; font-size: 1.1rem; display: none; }

        .actions { text-align: center; padding: 14px 16px 30px; }
        .btn {
            padding: 12px 26px;
            font-size: 1.05rem;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(139, 92, 246, .35);
            transition: transform .15s ease, box-shadow .15s ease;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(139, 92, 246, .45); }
        .btn:active { transform: translateY(0); }

        footer {
            margin-top: auto;
            padding: 16px;
            text-align: center;
            color: var(--muted);
            border-top: 1px solid var(--border);
            font-size: .95rem;
        }
        footer .heart { color: #f87171; }

        .confetti {
            position: fixed;
            top: -20px;
            font-size: 1.4rem;
            pointer-events: none;
            z-index: 9999;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            to { transform: translateY(110vh) rotate(720deg); opacity: .2; }
        }
        .egg-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(1.2rem, 4vw, 2rem);
            font-weight: 800;
            background: var(--panel);
            border: 1px solid var(--accent);
            border-radius: 16px;
            padding: 18px 28px;
            box-shadow: var(--shadow);
            z-index: 9999;
            pointer-events: none;
            animation: eggPop .4s ease;
        }
        @keyframes eggPop { from { transform: translate(-50%, -50%) scale(.6); opacity: 0; } }

        /* Achievements */
        .ach-btn {
            display: flex; align-items: center; gap: 6px;
            background: var(--panel); border: 1px solid var(--border); color: var(--text);
            height: 42px; padding: 0 14px; border-radius: 12px; font-size: .95rem;
            font-weight: 700; cursor: pointer; transition: transform .15s ease, border-color .15s ease;
        }
        .ach-btn:hover { transform: translateY(-2px); border-color: var(--gold); }
        .ach-btn span { color: var(--gold); }
        .ach-modal {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            background: rgba(10,12,18,.7); backdrop-filter: blur(4px); z-index: 100; padding: 18px;
        }
        .ach-modal.hidden { display: none; }
        .ach-card {
            background: var(--panel); border: 1px solid var(--border); border-radius: 20px;
            box-shadow: var(--shadow); width: min(680px, 96vw); max-height: 84vh;
            display: flex; flex-direction: column; overflow: hidden;
            animation: eggPop .25s ease;
        }
        .ach-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 22px 12px;
        }
        .ach-head h2 { margin: 0; font-size: 1.3rem; }
        .ach-head .progress { color: var(--muted); font-size: .9rem; font-weight: 600; }
        .ach-head .progress b { color: var(--gold); }
        .ach-close {
            background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
            width: 36px; height: 36px; border-radius: 10px; font-size: 1rem; cursor: pointer;
        }
        .ach-close:hover { border-color: var(--accent); }
        .ach-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 10px; padding: 6px 22px 22px; overflow-y: auto;
        }
        .ach {
            display: flex; gap: 10px; align-items: center;
            background: var(--panel-2); border: 1px solid var(--border); border-radius: 12px;
            padding: 10px 12px;
        }
        .ach .ach-icon { font-size: 1.7rem; line-height: 1; }
        .ach .ach-name { font-weight: 700; font-size: .88rem; }
        .ach .ach-desc { color: var(--muted); font-size: .75rem; line-height: 1.35; }
        .ach.locked { opacity: .45; }
        .ach.locked .ach-icon { filter: grayscale(1); }
        .ach.earned { border-color: rgba(251,191,36,.5); box-shadow: 0 0 12px rgba(251,191,36,.12); }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="brand" title="Mini-Game Hub"><span class="logo">🕹️</span><span>Mini-Game Hub</span></div>
        <div style="display:flex;gap:8px;align-items:center">
            <button id="ach-btn" class="ach-btn" title="Achievements">🏅 <span id="ach-count">0/0</span></button>
            <button id="theme-toggle" class="icon-btn" title="Toggle theme">☀️</button>
        </div>
    </header>

    <section class="hero">
        <h1 id="game-title">Mini-Game Hub</h1>
        <p class="tagline">15 seconds to fun — pick a game. Press <b>/</b> to search.</p>
    </section>

    <div class="controls">
        <input type="text" id="search-bar" class="search-bar" placeholder="Search for a game…" autocomplete="off">
    </div>
    <div class="chips" id="chips"></div>

    <main class="game-list" id="game-list"></main>
    <p class="no-results" id="no-results">No games match your search 🤔</p>

    <div class="actions">
        <button id="random-game-button" class="btn">🎲 Play a Random Game</button>
    </div>

    <div class="ach-modal hidden" id="ach-modal">
        <div class="ach-card">
            <div class="ach-head">
                <h2>🏅 Achievements</h2>
                <div class="progress" id="ach-progress"></div>
                <button class="ach-close" id="ach-close">✕</button>
            </div>
            <div class="ach-grid" id="ach-grid"></div>
        </div>
    </div>

    <footer>Made with <span class="heart">&hearts;</span> in India by Sukhi</footer>

    <script>
        const GAMES = [
            { file: 'snake', name: 'Snake', icon: '🐍', tag: 'arcade', desc: 'Eat, grow, survive', best: { key: 'mg-best-snake', label: 'Best' } },
            { file: '2048', name: '2048', icon: '🧩', tag: 'puzzle', desc: 'Merge to 2048', best: { key: 'mg-best-2048', label: 'Best' } },
            { file: 'tic-tac-toe', name: 'Tic-Tac-Toe', icon: '⭕', tag: 'classic', desc: 'Beat the AI' },
            { file: 'memory-match', name: 'Memory Match', icon: '🧠', tag: 'puzzle', desc: 'Find all pairs', best: { key: 'mg-best-memory', label: 'Best', suffix: ' moves' } },
            { file: 'hangman', name: 'Hangman', icon: '🔤', tag: 'classic', desc: 'Guess the word', best: { key: 'mg-best-hangman', label: 'Streak' } },
            { file: 'trivia', name: 'Trivia Quiz', icon: '💡', tag: 'puzzle', desc: '10 random questions', best: { key: 'mg-best-trivia', label: 'Best' } },
            { file: 'breakout', name: 'Breakout', icon: '🧱', tag: 'arcade', desc: 'Smash the bricks', best: { key: 'mg-best-breakout', label: 'Best' } },
            { file: 'flappy-bird', name: 'Flappy Bird', icon: '🐦', tag: 'arcade', desc: 'Tap to fly', best: { key: 'mg-best-flappy', label: 'Best' } },
            { file: 'minesweeper', name: 'Minesweeper', icon: '💣', tag: 'puzzle', desc: 'Clear the field', best: { key: 'mg-best-mines-easy', label: 'Best', time: true } },
            { file: 'rock-paper-scissors', name: 'Rock-Paper-Scissors', icon: '✊', tag: 'classic', desc: 'First to 5 wins', best: { key: 'mg-wins-rps', label: 'Match wins' } },
            { file: 'space-invaders', name: 'Space Invaders', icon: '👾', tag: 'arcade', desc: 'Defend the Earth', best: { key: 'mg-best-invaders', label: 'Best' } },
            { file: 'sudoku', name: 'Sudoku', icon: '🔢', tag: 'puzzle', desc: 'Logic classic', best: { key: 'mg-best-sudoku-easy', label: 'Best', time: true } },
            { file: 'frogger', name: 'Frogger', icon: '🐸', tag: 'arcade', desc: 'Hop home safely', best: { key: 'mg-best-frogger', label: 'Best' } },
            { file: 'whack-a-mole', name: 'Whack-a-Mole', icon: '🔨', tag: 'arcade', desc: '30s of bonking', best: { key: 'mg-best-whack', label: 'Best' } },
            { file: 'pong', name: 'Pong', icon: '🏓', tag: 'classic', desc: 'vs AI or a friend', best: { key: 'mg-wins-pong', label: 'Match wins' } },
            { file: 'typing-test', name: 'Typing Speed Test', icon: '⌨️', tag: 'skill', desc: 'How fast can you type?', best: { key: 'mg-best-typing', label: 'Best', suffix: ' WPM' } },
            { file: 'doodle-jump', name: 'Doodle Jump', icon: '🟢', tag: 'arcade', desc: 'Bounce ever higher', best: { key: 'mg-best-doodle', label: 'Best' } },
            { file: 'air-hockey', name: 'Air Hockey', icon: '🏒', tag: 'arcade', desc: 'First to 7 goals', best: { key: 'mg-wins-hockey', label: 'Match wins' } },
            { file: 'connect-four', name: 'Connect Four', icon: '🔴', tag: 'classic', desc: 'Four in a row wins', best: { key: 'mg-wins-connect4', label: 'AI beaten' } },
            { file: 'simon-says', name: 'Simon Says', icon: '🎵', tag: 'skill', desc: 'Repeat the pattern', best: { key: 'mg-best-simon', label: 'Best', suffix: ' rounds' } },
            { file: 'wordle', name: 'Wordle', icon: '🟩', tag: 'puzzle', desc: 'Guess the word in 6', best: { key: 'mg-best-wordle', label: 'Streak' } },
            { file: 'tetris', name: 'Tetris', icon: '🟪', tag: 'arcade', desc: 'The classic stacker', best: { key: 'mg-best-tetris', label: 'Best' } },
            { file: 'reaction-time', name: 'Reaction Time', icon: '⚡', tag: 'skill', desc: 'How fast are you?', best: { key: 'mg-best-reaction', label: 'Best', suffix: ' ms' } },
            { file: 'battleship', name: 'Battleship', icon: '🚢', tag: 'classic', desc: 'Sink the AI fleet', best: { key: 'mg-wins-battleship', label: 'Wins' } },
            { file: 'pacman', name: 'Pac-Man', icon: '👻', tag: 'arcade', desc: 'Dots, ghosts, glory', best: { key: 'mg-best-pacman', label: 'Best' } },
            { file: 'solitaire', name: 'Solitaire', icon: '🃏', tag: 'classic', desc: 'Klondike, draw 1 or 3', best: { key: 'mg-wins-solitaire', label: 'Wins' } },
            { file: 'asteroids', name: 'Asteroids', icon: '☄️', tag: 'arcade', desc: 'Blast & drift', best: { key: 'mg-best-asteroids', label: 'Best' } },
            { file: 'lights-out', name: 'Lights Out', icon: '💡', tag: 'puzzle', desc: 'Switch them all off', best: { key: 'mg-best-lightsout', label: 'Best', suffix: ' moves' } },
            { file: 'dino-runner', name: 'Dino Runner', icon: '🦖', tag: 'arcade', desc: 'Jump, duck, survive', best: { key: 'mg-best-dino', label: 'Best' } },
            { file: 'bubble-shooter', name: 'Bubble Shooter', icon: '🫧', tag: 'arcade', desc: 'Pop matching trios', best: { key: 'mg-best-bubbles', label: 'Best' } },
            { file: 'nonogram', name: 'Nonogram', icon: '🖼️', tag: 'puzzle', desc: 'Picture logic puzzle', best: { key: 'mg-best-nonogram', label: 'Best', time: true } },
            { file: 'checkers', name: 'Checkers', icon: '⚫', tag: 'classic', desc: 'Kings & captures vs AI', best: { key: 'mg-wins-checkers', label: 'AI beaten' } },
            { file: 'aim-trainer', name: 'Aim Trainer', icon: '🎯', tag: 'skill', desc: '30s precision blitz', best: { key: 'mg-best-aim', label: 'Best' } },
        ];
        const TAGS = ['all', 'arcade', 'puzzle', 'classic', 'skill'];
        let activeTag = 'all';

        const listEl = document.getElementById('game-list');
        const chipsEl = document.getElementById('chips');
        const searchBar = document.getElementById('search-bar');
        const noResults = document.getElementById('no-results');

        function fmtTime(s) {
            s = +s;
            return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
        }

        function bestText(g) {
            if (!g.best) return '';
            const v = localStorage.getItem(g.best.key);
            if (v === null || v === '' || +v === 0) return '';
            return `🏆 ${g.best.label}: ${g.best.time ? fmtTime(v) : v}${g.best.suffix || ''}`;
        }

        function renderChips() {
            chipsEl.innerHTML = '';
            TAGS.forEach(tag => {
                const b = document.createElement('button');
                b.className = 'chip' + (tag === activeTag ? ' active' : '');
                b.textContent = tag === 'all' ? `All (${GAMES.length})` : tag[0].toUpperCase() + tag.slice(1);
                b.onclick = () => { activeTag = tag; renderChips(); renderGames(); };
                chipsEl.appendChild(b);
            });
        }

        function renderGames() {
            const q = searchBar.value.trim().toLowerCase();
            listEl.innerHTML = '';
            let shown = 0;
            GAMES.forEach((g, i) => {
                if (activeTag !== 'all' && g.tag !== activeTag) return;
                if (q && !(g.name.toLowerCase().includes(q) || g.tag.includes(q) || g.desc.toLowerCase().includes(q))) return;
                const a = document.createElement('a');
                a.className = 'game';
                a.href = g.file + '.html';
                a.style.animationDelay = (shown * 30) + 'ms';
                a.innerHTML = `
                    <span class="tag">${g.tag}</span>
                    <span class="icon">${g.icon}</span>
                    <span>${g.name}</span>
                    <span class="desc">${g.desc}</span>
                    <span class="best">${bestText(g)}</span>`;
                listEl.appendChild(a);
                shown++;
            });
            noResults.style.display = shown ? 'none' : 'block';
        }

        searchBar.addEventListener('input', renderGames);
        document.addEventListener('keydown', e => {
            if (e.key === '/' && document.activeElement !== searchBar) {
                e.preventDefault();
                searchBar.focus();
            }
        });

        document.getElementById('random-game-button').addEventListener('click', () => {
            const g = GAMES[Math.floor(Math.random() * GAMES.length)];
            window.location.href = g.file + '.html';
        });

        // Theme toggle (shared 'theme' key across all pages)
        const themeToggle = document.getElementById('theme-toggle');
        function applyTheme() {
            const light = localStorage.getItem('theme') === 'light';
            document.body.classList.toggle('light-mode', light);
            themeToggle.textContent = light ? '🌙' : '☀️';
        }
        themeToggle.addEventListener('click', () => {
            localStorage.setItem('theme', localStorage.getItem('theme') === 'light' ? 'dark' : 'light');
            applyTheme();
        });
        applyTheme();

        // Easter egg: click the title 5 times for confetti
        const gameTitle = document.getElementById('game-title');
        let clickCount = 0, eggTimeout;
        gameTitle.addEventListener('click', () => {
            clickCount++;
            clearTimeout(eggTimeout);
            if (clickCount === 5) {
                clickCount = 0;
                const msg = document.createElement('div');
                msg.className = 'egg-msg';
                msg.textContent = '🎉 You found the Easter Egg! 🎉';
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 2500);
                const pieces = ['🎉', '⭐', '🎊', '💜', '🎮', '✨'];
                for (let i = 0; i < 40; i++) {
                    const c = document.createElement('div');
                    c.className = 'confetti';
                    c.textContent = pieces[Math.floor(Math.random() * pieces.length)];
                    c.style.left = Math.random() * 100 + 'vw';
                    c.style.animationDuration = (1.6 + Math.random() * 1.6) + 's';
                    c.style.animationDelay = (Math.random() * 0.5) + 's';
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 4000);
                }
            }
            eggTimeout = setTimeout(() => { clickCount = 0; }, 2000);
        });

        // ---------- Achievements (derived live from the games' saved scores) ----------
        const ls = k => localStorage.getItem(k);
        const gte = (k, n) => +ls(k) >= n;
        const lteNZ = (k, n) => { const v = +ls(k); return v > 0 && v <= n; };
        const hasAny = (...keys) => keys.some(k => ls(k) !== null && ls(k) !== '');

        const ACHIEVEMENTS = [
            { icon: '🐍', name: 'Snake Charmer', desc: 'Eat 20 apples in one Snake run', check: () => gte('mg-best-snake', 20) },
            { icon: '🧩', name: 'Tile Tactician', desc: 'Score 3,000+ in 2048', check: () => gte('mg-best-2048', 3000) },
            { icon: '🐦', name: 'Frequent Flyer', desc: 'Score 10 in Flappy Bird', check: () => gte('mg-best-flappy', 10) },

        ACHIEVEMENTS.push({
            icon: '🏆', name: 'Trophy Hunter', desc: 'Earn 15 other achievements',
            check: () => ACHIEVEMENTS.slice(0, -1).filter(a => a.check()).length >= 15
        });

        const achModal = document.getElementById('ach-modal');
        function renderAchievements() {
            const grid = document.getElementById('ach-grid');
            grid.innerHTML = '';
            let earned = 0;
            ACHIEVEMENTS.forEach(a => {
                const ok = a.check();
                if (ok) earned++;
                const d = document.createElement('div');
                d.className = 'ach ' + (ok ? 'earned' : 'locked');
                d.innerHTML = `<div class="ach-icon">${a.icon}</div>
                    <div><div class="ach-name">${a.name}</div><div class="ach-desc">${a.desc}</div></div>`;
                grid.appendChild(d);
            });
            document.getElementById('ach-count').textContent = `${earned}/${ACHIEVEMENTS.length}`;
            document.getElementById('ach-progress').innerHTML = `<b>${earned}</b> of ${ACHIEVEMENTS.length} unlocked`;
        }
        document.getElementById('ach-btn').onclick = () => {
            renderAchievements();
            achModal.classList.remove('hidden');
        };
        document.getElementById('ach-close').onclick = () => achModal.classList.add('hidden');
        achModal.addEventListener('click', e => { if (e.target === achModal) achModal.classList.add('hidden'); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') achModal.classList.add('hidden'); });

        renderChips();
        renderGames();
        renderAchievements();

        // PWA: offline caching + install support (https/localhost only)
        if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
