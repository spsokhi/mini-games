<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Hopper — Mini-Game Hub</title>
    <style>
        :root {
            --bg: #0f1117; --panel: #171a23; --panel-2: #1e2230; --border: #2a2f3f;
            --text: #e8eaf2; --muted: #9aa1b5; --accent: #8b5cf6; --accent-2: #22d3ee;
            --gold: #fbbf24; --shadow: 0 10px 30px rgba(0,0,0,.35);
        }
        body.light-mode {
            --bg: #eef1f7; --panel: #ffffff; --panel-2: #f3f5fa; --border: #d8dce8;
            --text: #232735; --muted: #5b6274; --shadow: 0 10px 30px rgba(35,39,53,.12);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(900px 450px at 80% -10%, rgba(52,211,153,.10), transparent 60%), var(--bg);
            color: var(--text); transition: background-color .3s, color .3s;
        }
        .topbar {
            width: 100%; max-width: 520px; display: flex; align-items: center;
            justify-content: space-between; gap: 10px; padding: 14px 16px;
        }
        .back { color: var(--muted); text-decoration: none; font-weight: 600; padding: 8px 12px; border-radius: 10px; }
        .back:hover { color: var(--text); background: var(--panel); }
        h1 { font-size: 1.5rem; margin: 0; }
        .top-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: var(--panel); border: 1px solid var(--border); color: var(--text);
            width: 40px; height: 40px; border-radius: 10px; font-size: 1.05rem; cursor: pointer;
        }
        .icon-btn:hover { border-color: var(--accent); }

        .hud { display: flex; gap: 10px; padding: 4px 16px 12px; flex-wrap: wrap; justify-content: center; }
        .stat {
            background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
            padding: 7px 18px; text-align: center; min-width: 86px;
        }
        .stat .label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .stat .value { font-size: 1.25rem; font-weight: 800; }
        #best-el .value { color: var(--gold); }

        .stage { position: relative; width: min(94vw, 380px); }
        canvas {
            display: block; width: 100%; height: auto;
            border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow);
            touch-action: none; cursor: pointer;
        }
        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; gap: 10px;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
            background: rgba(10,12,18,.6); border-radius: 16px; backdrop-filter: blur(2px);
        }
        .overlay.hidden { display: none; }
        .overlay .big { font-size: 2rem; font-weight: 800; margin: 0; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,.5); }
        .overlay .sub { color: #e8eaf2; margin: 0; text-shadow: 0 1px 4px rgba(0,0,0,.5); }
        .overlay .new-best { color: var(--gold); font-weight: 800; }
        .btn {
            padding: 12px 26px; font-size: 1rem; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 6px 18px rgba(139,92,246,.35); transition: transform .15s;
        }
        .btn:hover { transform: translateY(-2px); }
        .hint { color: var(--muted); font-size: .88rem; padding: 12px 16px; text-align: center; max-width: 420px; }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="back" href="index.html">← Hub</a>
        <h1>🐔 Road Hopper</h1>
        <div class="top-actions">
            <button id="sound-btn" class="icon-btn" title="Toggle sound">🔊</button>
            <button id="theme-btn" class="icon-btn" title="Toggle theme">☀️</button>
        </div>
    </header>

    <div class="hud">
        <div class="stat"><div class="label">Score</div><div class="value" id="score">0</div></div>
        <div class="stat" id="best-el"><div class="label">Best</div><div class="value" id="best">0</div></div>
    </div>

    <div class="stage">
        <canvas id="gameCanvas" width="380" height="560"></canvas>
        <div class="overlay" id="overlay">
            <p class="big" id="ov-title">🐔 Road Hopper</p>
            <p class="sub" id="ov-sub">Hop across roads and rails.<br>Keep moving — the screen won't wait!</p>
            <button class="btn" id="ov-btn">Hop!</button>
        </div>
    </div>

    <p class="hint"><b>Arrows / WASD</b> to hop, or <b>swipe</b> (tap = hop forward). Watch for the flashing signal — a train is coming. Fall behind the screen and it's over.</p>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        function applyTheme() {
            const light = localStorage.getItem('theme') === 'light';
            document.body.classList.toggle('light-mode', light);
            themeBtn.textContent = light ? '🌙' : '☀️';
        }
        themeBtn.onclick = () => { localStorage.setItem('theme', localStorage.getItem('theme') === 'light' ? 'dark' : 'light'); applyTheme(); };
        applyTheme();

        let muted = localStorage.getItem('mg-muted') === '1', actx;
        const soundBtn = document.getElementById('sound-btn');
        soundBtn.textContent = muted ? '🔇' : '🔊';
        soundBtn.onclick = () => { muted = !muted; localStorage.setItem('mg-muted', muted ? '1' : '0'); soundBtn.textContent = muted ? '🔇' : '🔊'; };
        function beep(freq, dur = 0.08, type = 'square', vol = 0.04, slide = 0) {
            if (muted) return;
            actx = actx || new (window.AudioContext || window.webkitAudioContext)();
            const o = actx.createOscillator(), g = actx.createGain();
            o.type = type; o.frequency.value = freq;
            if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), actx.currentTime + dur);
            g.gain.setValueAtTime(vol, actx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
            o.connect(g); g.connect(actx.destination);
            o.start(); o.stop(actx.currentTime + dur);
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        const BEST_KEY = 'mg-best-hopper';
        const COLS = 9, CELL = 42;
        const GRID_X = (W - COLS * CELL) / 2;
        const colX = c => GRID_X + c * CELL + CELL / 2;
        const CAR_W = 64, CAR_H = 30;

        let state = 'menu'; // menu | play | over
        let world, chunkType, chunkLeft, genRow;
        let pc, pr, hop, camera, moved, autoSpeed, score, t, last = 0;
        let best = +localStorage.getItem(BEST_KEY) || 0;
        document.getElementById('best').textContent = best;

        const overlay = document.getElementById('overlay');
        const ovTitle = document.getElementById('ov-title');
        const ovSub = document.getElementById('ov-sub');
        const ovBtn = document.getElementById('ov-btn');

        function makeRow(r) {
            if (r < 3 || chunkLeft <= 0) {
                if (r < 3) { chunkType = 'grass'; chunkLeft = 1; }
                else {
                    const roll = Math.random();
                    if (roll < 0.42) { chunkType = 'grass'; chunkLeft = 1 + Math.floor(Math.random() * 2); }
                    else if (roll < 0.9) { chunkType = 'road'; chunkLeft = 1 + Math.floor(Math.random() * Math.min(4, 2 + r / 40)); }
                    else { chunkType = 'rail'; chunkLeft = 1; }
                }
            }
            chunkLeft--;
            if (chunkType === 'grass') {
                const trees = new Set();
                if (r > 0) {
                    const n = Math.floor(Math.random() * 4);
                    while (trees.size < n) {
                        const c = Math.floor(Math.random() * COLS);
                        if (!(r <= 3 && c === 4)) trees.add(c); // keep the spawn column clear early
                    }
                }
                return { type: 'grass', trees };
            }
            if (chunkType === 'road') {
                return {
                    type: 'road', cars: [],
                    dir: Math.random() < 0.5 ? 1 : -1,
                    speed: 1.2 + Math.random() * 1.7 + Math.min(1.4, r / 90),
                    timer: Math.random() * 60,
                };
            }
            return { type: 'rail', train: null, warn: 0, timer: 120 + Math.random() * 240 };
        }

        function ensureRows() {
            while (genRow < camera + 16) {
                world[genRow] = makeRow(genRow);
                genRow++;
            }
        }

        function start() {
            world = {}; chunkLeft = 0; genRow = 0;
            pc = 4; pr = 0; hop = 0; camera = -6; moved = false; autoSpeed = 0.006; score = 0; t = 0;
            ensureRows();
            document.getElementById('score').textContent = 0;
            state = 'play';
            overlay.classList.add('hidden');
            last = 0;
            requestAnimationFrame(loop);
        }

        function tryHop(dc, dr) {
            if (state !== 'play' || hop > 0.35) return;
            const nc = pc + dc, nr = pr + dr;
            if (nc < 0 || nc >= COLS || nr < 0) return;
            if (nr < Math.floor(camera) + 1) return; // can't hop below the screen
            ensureRows();
            const row = world[nr];
            if (row.type === 'grass' && row.trees.has(nc)) return;
            pc = nc; pr = nr; hop = 1; moved = true;
            beep(500 + Math.random() * 100, .05, 'square', .03, 120);
            if (pr > score) {
                score = pr;
                document.getElementById('score').textContent = score;
                if (score % 25 === 0) beep(900, .1, 'triangle', .05);
            }
        }

        function die(kind) {
            state = 'over';
            beep(150, .4, 'sawtooth', .07, -80);
            let isBest = false;
            if (score > best) { best = score; localStorage.setItem(BEST_KEY, best); isBest = true; }
            document.getElementById('best').textContent = best;
            ovTitle.textContent = kind === 'car' ? '🚗 Squashed!' : kind === 'train' ? '🚆 Trained!' : '🦅 Left Behind!';
            ovSub.innerHTML = `Score: <b>${score}</b>` + (isBest ? ' · <span class="new-best">🏆 New best!</span>' : ` · Best: ${best}`);
            ovBtn.textContent = 'Hop Again';
            overlay.classList.remove('hidden');
        }

        function update(dt) {
            t += dt;
            hop = Math.max(0, hop - 0.14 * dt);
            if (moved) {
                autoSpeed = Math.min(0.02, autoSpeed + 0.000012 * dt);
                camera += autoSpeed * dt;
            }
            camera = Math.max(camera, pr - 8);
            ensureRows();
            if (pr < camera - 0.2) return die('behind');

            for (let r = Math.floor(camera) - 1; r < camera + 16; r++) {
                const row = world[r];
                if (!row) continue;
                if (row.type === 'road') {
                    row.timer -= dt;
                    if (row.timer <= 0) {
                        row.cars.push({ x: row.dir > 0 ? -CAR_W : W + CAR_W, color: ['#f87171', '#fbbf24', '#22d3ee', '#f472b6', '#e2e8f0'][Math.floor(Math.random() * 5)] });
                        row.timer = (110 + Math.random() * 110) / row.speed;
                    }
                    row.cars.forEach(c => { c.x += row.dir * row.speed * dt; });
                    row.cars = row.cars.filter(c => c.x > -CAR_W * 2 && c.x < W + CAR_W * 2);
                    if (r === pr) {
                        for (const c of row.cars) {
                            if (Math.abs(c.x - colX(pc)) < (CAR_W + CELL * 0.6) / 2) return die('car');
                        }
                    }
                } else if (row.type === 'rail') {
                    if (row.train === null) {
                        row.timer -= dt;
                        if (row.timer <= 0) {
                            row.warn += dt;
                            if (row.warn > 55) { row.train = -260; row.warn = 0; beep(250, .2, 'square', .05); }
                        }
                    } else {
                        row.train += 20 * dt;
                        if (row.train > W + 600) { row.train = null; row.timer = 240 + Math.random() * 300; }
                        else if (r === pr && row.train > -220 && row.train < W + 40) return die('train');
                    }
                }
            }
        }

        const rowY = r => H - 80 - (r - camera) * CELL;

        function draw() {
            const light = document.body.classList.contains('light-mode');
            ctx.fillStyle = light ? '#8fce74' : '#1d3527';
            ctx.fillRect(0, 0, W, H);

            const lo = Math.floor(camera) - 1, hi = Math.floor(camera) + 15;
            for (let r = lo; r <= hi; r++) {
                const row = world[r];
                if (!row) continue;
                const y = rowY(r);
                if (row.type === 'grass') {
                    ctx.fillStyle = r % 2 ? (light ? '#9ad67f' : '#20402d') : (light ? '#8fce74' : '#1d3527');
                    ctx.fillRect(0, y - CELL / 2, W, CELL);
                    row.trees.forEach(c => {
                        const x = colX(c);
                        ctx.fillStyle = light ? '#8d6e4b' : '#4a3826';
                        ctx.fillRect(x - 5, y - 4, 10, 14);
                        ctx.fillStyle = light ? '#3f9142' : '#2c5e38';
                        ctx.beginPath(); ctx.arc(x, y - 10, 15, 0, 7); ctx.fill();
                        ctx.fillStyle = light ? '#54a856' : '#377247';
                        ctx.beginPath(); ctx.arc(x - 6, y - 4, 9, 0, 7); ctx.fill();
                    });
                } else if (row.type === 'road') {
                    ctx.fillStyle = light ? '#8b93a3' : '#242936';
                    ctx.fillRect(0, y - CELL / 2, W, CELL);
                    ctx.fillStyle = light ? 'rgba(248,250,252,.6)' : 'rgba(200,206,222,.35)';
                    for (let x = (t * 0) % 40; x < W; x += 40) ctx.fillRect(x, y - 1, 20, 3);
                    row.cars.forEach(c => {
                        ctx.fillStyle = c.color;
                        ctx.beginPath(); ctx.roundRect(c.x - CAR_W / 2, y - CAR_H / 2, CAR_W, CAR_H, 8); ctx.fill();
                        ctx.fillStyle = 'rgba(15,23,42,.5)';
                        ctx.beginPath(); ctx.roundRect(c.x - CAR_W / 2 + (row.dir > 0 ? 10 : 18), y - CAR_H / 2 + 5, 36, CAR_H - 10, 5); ctx.fill();
                    });
                } else {
                    ctx.fillStyle = light ? '#a89f92' : '#2a2836';
                    ctx.fillRect(0, y - CELL / 2, W, CELL);
                    ctx.fillStyle = light ? '#7a6f5e' : '#454152';
                    for (let x = 6; x < W; x += 26) ctx.fillRect(x, y - CELL / 2 + 5, 12, CELL - 10);
                    ctx.fillStyle = light ? '#5c5346' : '#565064';
                    ctx.fillRect(0, y - 8, W, 5);
                    ctx.fillRect(0, y + 4, W, 5);
                    // warning signal
                    const warnOn = row.train === null && row.warn > 0 && Math.floor(row.warn / 7) % 2 === 0;
                    ctx.fillStyle = warnOn ? '#ef4444' : (light ? '#94a3b8' : '#3f3a4d');
                    ctx.beginPath(); ctx.arc(14, y - CELL / 2 + 9, 6, 0, 7); ctx.fill();
                    if (row.train !== null) {
                        ctx.fillStyle = light ? '#475569' : '#8b93a8';
                        ctx.beginPath(); ctx.roundRect(row.train - 210, y - 17, 420, 34, 8); ctx.fill();
                        ctx.fillStyle = '#fbbf24';
                        for (let i = 0; i < 6; i++) ctx.fillRect(row.train - 190 + i * 68, y - 8, 22, 16);
                    }
                }
            }

            // chicken
            if (state !== 'over' || true) {
                const x = colX(pc), y = rowY(pr) - 6 - Math.sin(hop * Math.PI) * 12;
                const squash = 1 + Math.sin(hop * Math.PI) * 0.15;
                ctx.save();
                ctx.translate(x, y);
                ctx.scale(1 / squash, squash);
                ctx.fillStyle = 'rgba(0,0,0,.25)';
                ctx.beginPath(); ctx.ellipse(0, 15, 12, 4, 0, 0, 7); ctx.fill();
                ctx.fillStyle = '#fafaf5';
                ctx.beginPath(); ctx.ellipse(0, 0, 12, 13, 0, 0, 7); ctx.fill();
                ctx.fillStyle = '#eceae2';
                ctx.beginPath(); ctx.ellipse(-5, 3, 6, 7, 0.4, 0, 7); ctx.fill(); // wing
                ctx.fillStyle = '#ef4444';
                ctx.beginPath(); ctx.arc(-2, -12, 3, 0, 7); ctx.arc(2, -13, 3, 0, 7); ctx.fill(); // comb
                ctx.fillStyle = '#f97316';
                ctx.beginPath(); ctx.moveTo(-3, -6); ctx.lineTo(0, -1); ctx.lineTo(3, -6); ctx.fill(); // beak
                ctx.fillStyle = '#1e293b';
                ctx.beginPath(); ctx.arc(-5, -7, 1.7, 0, 7); ctx.arc(5, -7, 1.7, 0, 7); ctx.fill(); // eyes
                ctx.restore();
            }
        }

        function loop(now) {
            if (state === 'over') { draw(); return; }
            const dt = Math.min((now - (last || now)) / 16.667, 3);
            last = now;
            if (state === 'play') update(dt);
            draw();
            if (state !== 'over') requestAnimationFrame(loop);
        }

        ovBtn.onclick = e => { e.stopPropagation(); start(); };
        let touchStart = null;
        canvas.addEventListener('pointerdown', e => {
            e.preventDefault();
            if (state !== 'play') { start(); return; }
            touchStart = { x: e.clientX, y: e.clientY };
        });
        window.addEventListener('pointerup', e => {
            if (!touchStart || state !== 'play') { touchStart = null; return; }
            const dx = e.clientX - touchStart.x, dy = e.clientY - touchStart.y;
            touchStart = null;
            if (Math.max(Math.abs(dx), Math.abs(dy)) < 22) return tryHop(0, 1); // tap = forward
            if (Math.abs(dx) > Math.abs(dy)) tryHop(dx > 0 ? 1 : -1, 0);
            else tryHop(0, dy < 0 ? 1 : -1);
        });
        overlay.addEventListener('pointerdown', e => {
            if (e.target === ovBtn) return;
            if (state !== 'play') start();
        });
        document.addEventListener('keydown', e => {
            const k = e.key.toLowerCase();
            if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright'].includes(e.key.toLowerCase()) || 'wasd'.includes(k) && k.length === 1) e.preventDefault();
            if (state !== 'play') {
                if (e.key === 'ArrowUp' || k === 'w' || e.key === ' ') start();
                return;
            }
            if (e.key === 'ArrowUp' || k === 'w') tryHop(0, 1);
            else if (e.key === 'ArrowDown' || k === 's') tryHop(0, -1);
            else if (e.key === 'ArrowLeft' || k === 'a') tryHop(-1, 0);
            else if (e.key === 'ArrowRight' || k === 'd') tryHop(1, 0);
        });

        world = {}; chunkLeft = 0; genRow = 0; pc = 4; pr = 0; hop = 0; camera = -6; t = 0;
        ensureRows();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
