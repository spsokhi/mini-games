<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole — Mini-Game Hub</title>
    <style>
        :root {
            --bg: #0f1117; --panel: #171a23; --panel-2: #1e2230; --border: #2a2f3f;
            --text: #e8eaf2; --muted: #9aa1b5; --accent: #8b5cf6; --accent-2: #22d3ee;
            --good: #34d399; --bad: #f87171; --gold: #fbbf24; --shadow: 0 10px 30px rgba(0,0,0,.35);
        }
        body.light-mode {
            --bg: #eef1f7; --panel: #ffffff; --panel-2: #f3f5fa; --border: #d8dce8;
            --text: #232735; --muted: #5b6274; --shadow: 0 10px 30px rgba(35,39,53,.12);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(900px 450px at 80% -10%, rgba(251,191,36,.1), transparent 60%), var(--bg);
            color: var(--text); transition: background-color .3s, color .3s;
        }
        .topbar {
            width: 100%; max-width: 560px; display: flex; align-items: center;
            justify-content: space-between; gap: 10px; padding: 14px 16px;
        }
        .back { color: var(--muted); text-decoration: none; font-weight: 600; padding: 8px 12px; border-radius: 10px; }
        .back:hover { color: var(--text); background: var(--panel); }
        h1 { font-size: 1.5rem; margin: 0; }
        .top-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: var(--panel); border: 1px solid var(--border); color: var(--text);
            width: 40px; height: 40px; border-radius: 10px; font-size: 1.05rem; cursor: pointer;
        }
        .icon-btn:hover { border-color: var(--accent); }

        .hud { display: flex; gap: 10px; padding: 4px 16px 14px; flex-wrap: wrap; justify-content: center; }
        .stat {
            background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
            padding: 7px 16px; text-align: center; min-width: 86px;
        }
        .stat .label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .stat .value { font-size: 1.25rem; font-weight: 800; font-variant-numeric: tabular-nums; }
        #best-el .value { color: var(--gold); }
        #time-el .value.low { color: var(--bad); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: .4; } }
        #combo-el .value { color: var(--accent-2); }

        .stage { position: relative; }
        .holes {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
            background: var(--panel); border: 1px solid var(--border); border-radius: 18px;
            padding: 18px; width: min(94vw, 440px); box-shadow: var(--shadow);
        }
        .hole {
            aspect-ratio: 1; position: relative; overflow: hidden; cursor: pointer;
            border-radius: 14px; -webkit-tap-highlight-color: transparent;
            background:
                radial-gradient(ellipse 70% 30% at 50% 82%, #1a120b 0%, #2d1f12 55%, transparent 56%),
                linear-gradient(to bottom, #4d3a22, #6b4f2e);
            user-select: none;
        }
        body.light-mode .hole {
            background:
                radial-gradient(ellipse 70% 30% at 50% 82%, #3d2c17 0%, #5c4425 55%, transparent 56%),
                linear-gradient(to bottom, #8b6a3d, #a98450);
        }
        .mole {
            position: absolute; left: 50%; bottom: -80%;
            transform: translateX(-50%);
            font-size: clamp(2.6rem, 12vw, 3.6rem); line-height: 1;
            transition: bottom .12s ease-out;
            pointer-events: none;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,.4));
        }
        .hole.up .mole { bottom: 18%; }
        .hole.bonked .mole { transform: translateX(-50%) scale(.75) rotate(12deg); transition: transform .1s; }
        .mole.golden { filter: drop-shadow(0 0 12px rgba(251,191,36,.95)); }

        .float-score {
            position: absolute; left: 50%; top: 30%; transform: translateX(-50%);
            font-size: 1.3rem; font-weight: 800; pointer-events: none; z-index: 3;
            animation: floatUp .7s ease-out forwards;
        }
        .float-score.plus { color: var(--good); }
        .float-score.minus { color: var(--bad); }
        @keyframes floatUp { to { top: -10%; opacity: 0; } }

        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; gap: 10px;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
            background: rgba(10,12,18,.78); border-radius: 18px; backdrop-filter: blur(3px); z-index: 5;
        }
        body.light-mode .overlay { background: rgba(240,243,249,.85); }
        .overlay.hidden { display: none; }
        .overlay .big { font-size: 1.9rem; font-weight: 800; margin: 0; }
        .overlay .sub { color: var(--muted); margin: 0; line-height: 1.8; }
        .overlay .new-best { color: var(--gold); font-weight: 800; }
        .btn {
            padding: 12px 26px; font-size: 1rem; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 6px 18px rgba(139,92,246,.35); transition: transform .15s;
        }
        .btn:hover { transform: translateY(-2px); }
        .hint { color: var(--muted); font-size: .88rem; padding: 12px 16px; text-align: center; }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="back" href="index.html">← Hub</a>
        <h1>🔨 Whack-a-Mole</h1>
        <div class="top-actions">
            <button id="sound-btn" class="icon-btn" title="Toggle sound">🔊</button>
            <button id="theme-btn" class="icon-btn" title="Toggle theme">☀️</button>
        </div>
    </header>

    <div class="hud">
        <div class="stat"><div class="label">Score</div><div class="value" id="score">0</div></div>
        <div class="stat" id="best-el"><div class="label">Best</div><div class="value" id="best">0</div></div>
        <div class="stat" id="time-el"><div class="label">Time</div><div class="value" id="time">30</div></div>
        <div class="stat" id="combo-el"><div class="label">Combo</div><div class="value" id="combo">×1</div></div>
    </div>

    <div class="stage">
        <div class="holes" id="holes"></div>
        <div class="overlay" id="overlay">
            <p class="big" id="ov-title">🔨 Whack-a-Mole</p>
            <p class="sub" id="ov-sub">🐹 = 1 pt · ✨🐹 golden = 3 pts · 💣 = −3 pts!<br>Chain hits without missing to build a combo.</p>
            <button class="btn" id="ov-btn">Start · 30s</button>
        </div>
    </div>

    <p class="hint">Bonk the critters, dodge the bombs. 30 seconds on the clock!</p>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        function applyTheme() {
            const light = localStorage.getItem('theme') === 'light';
            document.body.classList.toggle('light-mode', light);
            themeBtn.textContent = light ? '🌙' : '☀️';
        }
        themeBtn.onclick = () => { localStorage.setItem('theme', localStorage.getItem('theme') === 'light' ? 'dark' : 'light'); applyTheme(); };
        applyTheme();

        let muted = localStorage.getItem('mg-muted') === '1', actx;
        const soundBtn = document.getElementById('sound-btn');
        soundBtn.textContent = muted ? '🔇' : '🔊';
        soundBtn.onclick = () => { muted = !muted; localStorage.setItem('mg-muted', muted ? '1' : '0'); soundBtn.textContent = muted ? '🔇' : '🔊'; };
        function beep(freq, dur = 0.07, type = 'square', vol = 0.05, slide = 0) {
            if (muted) return;
            actx = actx || new (window.AudioContext || window.webkitAudioContext)();
            const o = actx.createOscillator(), g = actx.createGain();
            o.type = type; o.frequency.value = freq;
            if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), actx.currentTime + dur);
            g.gain.setValueAtTime(vol, actx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
            o.connect(g); g.connect(actx.destination);
            o.start(); o.stop(actx.currentTime + dur);
        }

        const ROUND_SECONDS = 30, BEST_KEY = 'mg-best-whack';
        const holesEl = document.getElementById('holes');
        const overlay = document.getElementById('overlay');

        let score = 0, timeLeft = 0, combo = 0, playing = false;
        let tickId = null, spawnTimeout = null;
        let best = +localStorage.getItem(BEST_KEY) || 0;
        document.getElementById('best').textContent = best;

        const holes = [];
        for (let i = 0; i < 9; i++) {
            const hole = document.createElement('div');
            hole.className = 'hole';
            const mole = document.createElement('div');
            mole.className = 'mole';
            mole.textContent = '🐹';
            hole.appendChild(mole);
            hole.addEventListener('pointerdown', e => { e.preventDefault(); whack(hole); });
            holesEl.appendChild(hole);
            holes.push(hole);
        }

        function setCombo(v) {
            combo = v;
            document.getElementById('combo').textContent = '×' + Math.min(1 + Math.floor(combo / 3), 4);
        }
        function comboMult() { return Math.min(1 + Math.floor(combo / 3), 4); }

        function floatScore(hole, text, cls) {
            const f = document.createElement('div');
            f.className = 'float-score ' + cls;
            f.textContent = text;
            hole.appendChild(f);
            setTimeout(() => f.remove(), 700);
        }

        function spawn() {
            if (!playing) return;
            const free = holes.filter(h => !h.classList.contains('up'));
            if (free.length) {
                const hole = free[Math.floor(Math.random() * free.length)];
                const mole = hole.querySelector('.mole');
                const roll = Math.random();
                if (roll < 0.12) { hole.dataset.kind = 'bomb'; mole.textContent = '💣'; mole.classList.remove('golden'); }
                else if (roll < 0.24) { hole.dataset.kind = 'gold'; mole.textContent = '🐹'; mole.classList.add('golden'); }
                else { hole.dataset.kind = 'normal'; mole.textContent = '🐹'; mole.classList.remove('golden'); }
                hole.classList.remove('bonked');
                hole.classList.add('up');

                const elapsed = ROUND_SECONDS - timeLeft;
                const upTime = Math.max(450, 1000 - elapsed * 18);
                setTimeout(() => {
                    if (hole.classList.contains('up') && !hole.classList.contains('bonked')) {
                        hole.classList.remove('up');
                        if (hole.dataset.kind !== 'bomb' && playing) setCombo(0); // missed one
                    }
                }, upTime);
            }
            const elapsed = ROUND_SECONDS - timeLeft;
            const gap = Math.max(320, 750 - elapsed * 15);
            spawnTimeout = setTimeout(spawn, gap);
        }

        function whack(hole) {
            if (!playing || !hole.classList.contains('up') || hole.classList.contains('bonked')) return;
            hole.classList.add('bonked');
            setTimeout(() => hole.classList.remove('up', 'bonked'), 120);

            const kind = hole.dataset.kind;
            if (kind === 'bomb') {
                score = Math.max(0, score - 3);
                setCombo(0);
                floatScore(hole, '−3', 'minus');
                beep(120, .25, 'sawtooth', .07, -60);
            } else {
                setCombo(combo + 1);
                const pts = (kind === 'gold' ? 3 : 1) * comboMult();
                score += pts;
                floatScore(hole, '+' + pts, 'plus');
                beep(kind === 'gold' ? 900 : 600, .07, 'square', .05, 200);
            }
            document.getElementById('score').textContent = score;
        }

        function start() {
            score = 0; timeLeft = ROUND_SECONDS;
            setCombo(0);
            playing = true;
            document.getElementById('score').textContent = 0;
            document.getElementById('time').textContent = timeLeft;
            document.getElementById('time').classList.remove('low');
            overlay.classList.add('hidden');
            spawn();
            tickId = setInterval(() => {
                timeLeft--;
                const t = document.getElementById('time');
                t.textContent = timeLeft;
                if (timeLeft <= 5) t.classList.add('low');
                if (timeLeft <= 0) end();
            }, 1000);
        }

        function end() {
            playing = false;
            clearInterval(tickId);
            clearTimeout(spawnTimeout);
            holes.forEach(h => h.classList.remove('up', 'bonked'));
            let isBest = false;
            if (score > best) { best = score; localStorage.setItem(BEST_KEY, best); isBest = true; }
            document.getElementById('best').textContent = best;
            document.getElementById('ov-title').textContent = "⏰ Time's Up!";
            document.getElementById('ov-sub').innerHTML =
                `You scored <b>${score}</b> points` +
                (isBest ? '<br><span class="new-best">🏆 New best!</span>' : `<br>Best: ${best}`);
            document.getElementById('ov-btn').textContent = 'Play Again · 30s';
            overlay.classList.remove('hidden');
            beep(440, .1); setTimeout(() => beep(330, .18), 120);
        }

        document.getElementById('ov-btn').onclick = start;
    </script>
</body>
</html>
