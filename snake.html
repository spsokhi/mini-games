<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake — Mini-Game Hub</title>
    <style>
        :root {
            --bg: #0f1117; --panel: #171a23; --panel-2: #1e2230; --border: #2a2f3f;
            --text: #e8eaf2; --muted: #9aa1b5; --accent: #8b5cf6; --accent-2: #22d3ee;
            --good: #34d399; --bad: #f87171; --gold: #fbbf24;
            --shadow: 0 10px 30px rgba(0,0,0,.35);
        }
        body.light-mode {
            --bg: #eef1f7; --panel: #ffffff; --panel-2: #f3f5fa; --border: #d8dce8;
            --text: #232735; --muted: #5b6274; --shadow: 0 10px 30px rgba(35,39,53,.12);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(900px 450px at 80% -10%, rgba(52,211,153,.12), transparent 60%), var(--bg);
            color: var(--text); transition: background-color .3s, color .3s;
        }
        .topbar {
            width: 100%; max-width: 640px; display: flex; align-items: center;
            justify-content: space-between; gap: 10px; padding: 14px 16px;
        }
        .back { color: var(--muted); text-decoration: none; font-weight: 600; padding: 8px 12px; border-radius: 10px; }
        .back:hover { color: var(--text); background: var(--panel); }
        h1 { font-size: 1.5rem; margin: 0; }
        .top-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: var(--panel); border: 1px solid var(--border); color: var(--text);
            width: 40px; height: 40px; border-radius: 10px; font-size: 1.05rem; cursor: pointer;
        }
        .icon-btn:hover { border-color: var(--accent); }

        .hud {
            display: flex; gap: 10px; padding: 4px 16px 12px; width: 100%;
            max-width: 640px; justify-content: center; flex-wrap: wrap;
        }
        .stat {
            background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
            padding: 8px 18px; text-align: center; min-width: 90px;
        }
        .stat .label { font-size: .72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .stat .value { font-size: 1.3rem; font-weight: 800; }
        #best-el .value { color: var(--gold); }
        #speed-el .value { color: var(--accent-2); }

        .stage { position: relative; width: min(92vw, 460px); }
        canvas {
            display: block; width: 100%; height: auto; background: var(--panel);
            border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow);
            touch-action: none;
        }
        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; gap: 10px;
            align-items: center; justify-content: center; text-align: center;
            background: rgba(10, 12, 18, .72); border-radius: 16px; backdrop-filter: blur(3px);
            padding: 20px;
        }
        body.light-mode .overlay { background: rgba(240, 243, 249, .8); }
        .overlay.hidden { display: none; }
        .overlay .big { font-size: 2rem; font-weight: 800; margin: 0; }
        .overlay .sub { color: var(--muted); margin: 0; }
        .overlay .new-best { color: var(--gold); font-weight: 800; }
        .btn {
            padding: 12px 26px; font-size: 1rem; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 6px 18px rgba(139,92,246,.35); transition: transform .15s;
        }
        .btn:hover { transform: translateY(-2px); }
        .hint { color: var(--muted); font-size: .88rem; padding: 10px 16px; text-align: center; }

        .dpad { display: none; grid-template-columns: repeat(3, 64px); gap: 6px; padding: 12px; }
        .dpad button {
            width: 64px; height: 56px; font-size: 1.4rem; border-radius: 12px;
            border: 1px solid var(--border); background: var(--panel); color: var(--text); cursor: pointer;
        }
        .dpad button:active { background: var(--accent); color: #fff; }
        .dpad .blank { visibility: hidden; }
        @media (pointer: coarse) { .dpad { display: grid; } .hint .kb { display: none; } }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="back" href="index.html">← Hub</a>
        <h1>🐍 Snake</h1>
        <div class="top-actions">
            <button id="sound-btn" class="icon-btn" title="Toggle sound">🔊</button>
            <button id="theme-btn" class="icon-btn" title="Toggle theme">☀️</button>
        </div>
    </header>

    <div class="hud">
        <div class="stat"><div class="label">Score</div><div class="value" id="score">0</div></div>
        <div class="stat" id="best-el"><div class="label">Best</div><div class="value" id="best">0</div></div>
        <div class="stat" id="speed-el"><div class="label">Speed</div><div class="value" id="speed">1</div></div>
    </div>

    <div class="stage">
        <canvas id="gameCanvas" width="460" height="460"></canvas>
        <div class="overlay" id="overlay">
            <p class="big" id="ov-title">🐍 Snake</p>
            <p class="sub" id="ov-sub">Eat apples, don't bite yourself.</p>
            <button class="btn" id="ov-btn">Play</button>
        </div>
    </div>

    <p class="hint"><span class="kb">Arrows / WASD to move · <b>P</b> or <b>Space</b> to pause · </span>Swipe on the board to steer</p>

    <div class="dpad">
        <span class="blank"></span><button data-d="up">⬆️</button><span class="blank"></span>
        <button data-d="left">⬅️</button><button data-d="down">⬇️</button><button data-d="right">➡️</button>
    </div>

    <script>
        // ---------- shared helpers ----------
        const themeBtn = document.getElementById('theme-btn');
        function applyTheme() {
            const light = localStorage.getItem('theme') === 'light';
            document.body.classList.toggle('light-mode', light);
            themeBtn.textContent = light ? '🌙' : '☀️';
        }
        themeBtn.onclick = () => { localStorage.setItem('theme', localStorage.getItem('theme') === 'light' ? 'dark' : 'light'); applyTheme(); };
        applyTheme();

        let muted = localStorage.getItem('mg-muted') === '1', actx;
        const soundBtn = document.getElementById('sound-btn');
        soundBtn.textContent = muted ? '🔇' : '🔊';
        soundBtn.onclick = () => { muted = !muted; localStorage.setItem('mg-muted', muted ? '1' : '0'); soundBtn.textContent = muted ? '🔇' : '🔊'; };
        function beep(freq, dur = 0.08, type = 'square', vol = 0.04, slide = 0) {
            if (muted) return;
            actx = actx || new (window.AudioContext || window.webkitAudioContext)();
            const o = actx.createOscillator(), g = actx.createGain();
            o.type = type; o.frequency.value = freq;
            if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), actx.currentTime + dur);
            g.gain.setValueAtTime(vol, actx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
            o.connect(g); g.connect(actx.destination);
            o.start(); o.stop(actx.currentTime + dur);
        }

        // ---------- game ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const COLS = 20, CELL = canvas.width / COLS;
        const BEST_KEY = 'mg-best-snake';

        let snake, dir, dirQueue, food, score, speedLevel, tickMs, acc, last;
        let state = 'menu'; // menu | play | pause | over
        let best = +localStorage.getItem(BEST_KEY) || 0;
        document.getElementById('best').textContent = best;

        const overlay = document.getElementById('overlay');
        const ovTitle = document.getElementById('ov-title');
        const ovSub = document.getElementById('ov-sub');
        const ovBtn = document.getElementById('ov-btn');

        function reset() {
            snake = [{ x: 9, y: 10 }, { x: 8, y: 10 }, { x: 7, y: 10 }];
            dir = { x: 1, y: 0 };
            dirQueue = [];
            score = 0; speedLevel = 1; tickMs = 140; acc = 0; last = 0;
            document.getElementById('score').textContent = 0;
            document.getElementById('speed').textContent = 1;
            placeFood();
        }

        function placeFood() {
            const free = [];
            for (let x = 0; x < COLS; x++)
                for (let y = 0; y < COLS; y++)
                    if (!snake.some(s => s.x === x && s.y === y)) free.push({ x, y });
            food = free[Math.floor(Math.random() * free.length)];
        }

        function setDir(d) {
            const v = { up: { x: 0, y: -1 }, down: { x: 0, y: 1 }, left: { x: -1, y: 0 }, right: { x: 1, y: 0 } }[d];
            if (v && dirQueue.length < 3) dirQueue.push(v);
        }

        function step() {
            while (dirQueue.length) {
                const d = dirQueue.shift();
                if ((d.x !== -dir.x || d.y !== -dir.y) && (d.x !== dir.x || d.y !== dir.y)) { dir = d; break; }
            }
            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= COLS ||
                snake.some(s => s.x === head.x && s.y === head.y)) {
                return gameOver();
            }
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score++;
                document.getElementById('score').textContent = score;
                beep(660, .07, 'square', .05, 200);
                if (score % 5 === 0 && tickMs > 70) {
                    tickMs -= 9; speedLevel++;
                    document.getElementById('speed').textContent = speedLevel;
                    beep(880, .1, 'triangle', .05, 300);
                }
                placeFood();
            } else {
                snake.pop();
            }
        }

        function draw() {
            const light = document.body.classList.contains('light-mode');
            ctx.fillStyle = light ? '#ffffff' : '#171a23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // checkerboard
            ctx.fillStyle = light ? 'rgba(35,39,53,.04)' : 'rgba(255,255,255,.025)';
            for (let x = 0; x < COLS; x++)
                for (let y = 0; y < COLS; y++)
                    if ((x + y) % 2) ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
            // apple
            ctx.font = `${CELL * 0.9}px serif`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('🍎', food.x * CELL + CELL / 2, food.y * CELL + CELL / 2 + 1);
            // snake
            snake.forEach((s, i) => {
                const t = i / snake.length;
                ctx.fillStyle = i === 0 ? '#34d399' : `rgba(52, 211, 153, ${0.9 - t * 0.55})`;
                const pad = i === 0 ? 1 : 1.5;
                roundRect(s.x * CELL + pad, s.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, i === 0 ? 7 : 5);
            });
            // eyes
            const h = snake[0];
            ctx.fillStyle = '#0f1117';
            const ex = h.x * CELL + CELL / 2, ey = h.y * CELL + CELL / 2, off = CELL * 0.18;
            const dx = dir.y === 0 ? dir.x * CELL * 0.15 : 0, dy = dir.x === 0 ? dir.y * CELL * 0.15 : 0;
            const px = dir.x === 0 ? off : 0, py = dir.y === 0 ? off : 0;
            ctx.beginPath();
            ctx.arc(ex + dx - px, ey + dy - py, CELL * 0.08, 0, 7);
            ctx.arc(ex + dx + px, ey + dy + py, CELL * 0.08, 0, 7);
            ctx.fill();
        }
        function roundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.fill();
        }

        function loop(now) {
            if (state !== 'play') return;
            if (!last) last = now;
            acc += now - last; last = now;
            while (acc >= tickMs && state === 'play') { acc -= tickMs; step(); }
            if (state === 'play') { draw(); requestAnimationFrame(loop); }
        }

        function start() {
            reset();
            state = 'play';
            overlay.classList.add('hidden');
            last = 0;
            requestAnimationFrame(loop);
        }

        function gameOver() {
            state = 'over';
            beep(160, .35, 'sawtooth', .06, -100);
            let isBest = false;
            if (score > best) { best = score; localStorage.setItem(BEST_KEY, best); isBest = true; }
            document.getElementById('best').textContent = best;
            draw();
            ovTitle.textContent = '💥 Game Over';
            ovSub.innerHTML = `Score: <b>${score}</b>` + (isBest ? ' · <span class="new-best">🏆 New best!</span>' : ` · Best: ${best}`);
            ovBtn.textContent = 'Play Again';
            overlay.classList.remove('hidden');
        }

        function togglePause() {
            if (state === 'play') {
                state = 'pause';
                ovTitle.textContent = '⏸️ Paused';
                ovSub.textContent = 'Take a breath…';
                ovBtn.textContent = 'Resume';
                overlay.classList.remove('hidden');
            } else if (state === 'pause') {
                state = 'play';
                overlay.classList.add('hidden');
                last = 0;
                requestAnimationFrame(loop);
            }
        }

        ovBtn.onclick = () => { if (state === 'pause') togglePause(); else start(); };

        document.addEventListener('keydown', e => {
            const map = {
                ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
                w: 'up', s: 'down', a: 'left', d: 'right', W: 'up', S: 'down', A: 'left', D: 'right'
            };
            if (map[e.key]) {
                e.preventDefault();
                if (state === 'menu' || state === 'over') return;
                setDir(map[e.key]);
            } else if (e.key === 'p' || e.key === 'P' || e.key === ' ') {
                e.preventDefault();
                if (state === 'menu' || state === 'over') start();
                else togglePause();
            }
        });

        document.querySelectorAll('.dpad button').forEach(b =>
            b.addEventListener('pointerdown', e => { e.preventDefault(); setDir(b.dataset.d); }));

        let touchStart = null;
        canvas.addEventListener('pointerdown', e => { touchStart = { x: e.clientX, y: e.clientY }; });
        canvas.addEventListener('pointerup', e => {
            if (!touchStart) return;
            const dx = e.clientX - touchStart.x, dy = e.clientY - touchStart.y;
            touchStart = null;
            if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
            setDir(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
        });

        document.addEventListener('visibilitychange', () => {
            if (document.hidden && state === 'play') togglePause();
        });

        reset();
        draw();
    </script>
</body>
</html>
