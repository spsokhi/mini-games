<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout — Mini-Game Hub</title>
    <style>
        :root {
            --bg: #0f1117; --panel: #171a23; --panel-2: #1e2230; --border: #2a2f3f;
            --text: #e8eaf2; --muted: #9aa1b5; --accent: #8b5cf6; --accent-2: #22d3ee;
            --gold: #fbbf24; --shadow: 0 10px 30px rgba(0,0,0,.35);
        }
        body.light-mode {
            --bg: #eef1f7; --panel: #ffffff; --panel-2: #f3f5fa; --border: #d8dce8;
            --text: #232735; --muted: #5b6274; --shadow: 0 10px 30px rgba(35,39,53,.12);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(900px 450px at 80% -10%, rgba(139,92,246,.12), transparent 60%), var(--bg);
            color: var(--text); transition: background-color .3s, color .3s;
        }
        .topbar {
            width: 100%; max-width: 600px; display: flex; align-items: center;
            justify-content: space-between; gap: 10px; padding: 14px 16px;
        }
        .back { color: var(--muted); text-decoration: none; font-weight: 600; padding: 8px 12px; border-radius: 10px; }
        .back:hover { color: var(--text); background: var(--panel); }
        h1 { font-size: 1.5rem; margin: 0; }
        .top-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: var(--panel); border: 1px solid var(--border); color: var(--text);
            width: 40px; height: 40px; border-radius: 10px; font-size: 1.05rem; cursor: pointer;
        }
        .icon-btn:hover { border-color: var(--accent); }

        .hud { display: flex; gap: 10px; padding: 4px 16px 12px; flex-wrap: wrap; justify-content: center; }
        .stat {
            background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
            padding: 7px 16px; text-align: center; min-width: 82px;
        }
        .stat .label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .stat .value { font-size: 1.2rem; font-weight: 800; }
        #best-el .value { color: var(--gold); }
        #lives-el .value { color: #f87171; }

        .stage { position: relative; width: min(94vw, 520px); }
        canvas {
            display: block; width: 100%; height: auto; background: var(--panel);
            border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow);
            touch-action: none; cursor: pointer;
        }
        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; gap: 10px;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
            background: rgba(10,12,18,.72); border-radius: 16px; backdrop-filter: blur(3px);
        }
        body.light-mode .overlay { background: rgba(240,243,249,.8); }
        .overlay.hidden { display: none; }
        .overlay .big { font-size: 2rem; font-weight: 800; margin: 0; }
        .overlay .sub { color: var(--muted); margin: 0; }
        .overlay .new-best { color: var(--gold); font-weight: 800; }
        .btn {
            padding: 12px 26px; font-size: 1rem; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 6px 18px rgba(139,92,246,.35); transition: transform .15s;
        }
        .btn:hover { transform: translateY(-2px); }
        .hint { color: var(--muted); font-size: .88rem; padding: 12px 16px; text-align: center; }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="back" href="index.html">← Hub</a>
        <h1>🧱 Breakout</h1>
        <div class="top-actions">
            <button id="sound-btn" class="icon-btn" title="Toggle sound">🔊</button>
            <button id="theme-btn" class="icon-btn" title="Toggle theme">☀️</button>
        </div>
    </header>

    <div class="hud">
        <div class="stat"><div class="label">Score</div><div class="value" id="score">0</div></div>
        <div class="stat" id="best-el"><div class="label">Best</div><div class="value" id="best">0</div></div>
        <div class="stat"><div class="label">Level</div><div class="value" id="level">1</div></div>
        <div class="stat" id="lives-el"><div class="label">Lives</div><div class="value" id="lives">3</div></div>
    </div>

    <div class="stage">
        <canvas id="gameCanvas" width="520" height="400"></canvas>
        <div class="overlay" id="overlay">
            <p class="big" id="ov-title">🧱 Breakout</p>
            <p class="sub" id="ov-sub">Clear every brick. Don't drop the ball!</p>
            <button class="btn" id="ov-btn">Play</button>
        </div>
    </div>

    <p class="hint">Move with mouse, arrow keys, or drag on the board · Click / Space to launch · <b>P</b> to pause</p>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        function applyTheme() {
            const light = localStorage.getItem('theme') === 'light';
            document.body.classList.toggle('light-mode', light);
            themeBtn.textContent = light ? '🌙' : '☀️';
        }
        themeBtn.onclick = () => { localStorage.setItem('theme', localStorage.getItem('theme') === 'light' ? 'dark' : 'light'); applyTheme(); };
        applyTheme();

        let muted = localStorage.getItem('mg-muted') === '1', actx;
        const soundBtn = document.getElementById('sound-btn');
        soundBtn.textContent = muted ? '🔇' : '🔊';
        soundBtn.onclick = () => { muted = !muted; localStorage.setItem('mg-muted', muted ? '1' : '0'); soundBtn.textContent = muted ? '🔇' : '🔊'; };
        function beep(freq, dur = 0.06, type = 'square', vol = 0.04, slide = 0) {
            if (muted) return;
            actx = actx || new (window.AudioContext || window.webkitAudioContext)();
            const o = actx.createOscillator(), g = actx.createGain();
            o.type = type; o.frequency.value = freq;
            if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), actx.currentTime + dur);
            g.gain.setValueAtTime(vol, actx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
            o.connect(g); g.connect(actx.destination);
            o.start(); o.stop(actx.currentTime + dur);
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        const BEST_KEY = 'mg-best-breakout';

        const PADDLE_H = 12, BALL_R = 7;
        let paddleW, paddleX, ball, bricks, score, lives, level, stuck;
        let leftPressed = false, rightPressed = false;
        let state = 'menu'; // menu | play | pause | over
        let last = 0;
        let best = +localStorage.getItem(BEST_KEY) || 0;
        document.getElementById('best').textContent = best;

        const overlay = document.getElementById('overlay');
        const ovTitle = document.getElementById('ov-title');
        const ovSub = document.getElementById('ov-sub');
        const ovBtn = document.getElementById('ov-btn');

        const ROW_COLORS = ['#f87171', '#fb923c', '#fbbf24', '#34d399', '#22d3ee', '#8b5cf6', '#f472b6'];

        function buildLevel() {
            bricks = [];
            const rows = Math.min(4 + level, 7);
            const cols = 9, pad = 6, top = 44, side = 14;
            const bw = (W - side * 2 - pad * (cols - 1)) / cols, bh = 18;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const hp = (level >= 2 && r < Math.min(level - 1, 3)) ? 2 : 1;
                    bricks.push({
                        x: side + c * (bw + pad), y: top + r * (bh + pad),
                        w: bw, h: bh, hp, color: ROW_COLORS[r % ROW_COLORS.length]
                    });
                }
            }
        }

        function resetBall() {
            stuck = true;
            ball = { x: paddleX + paddleW / 2, y: H - PADDLE_H - 10 - BALL_R, dx: 0, dy: 0 };
        }

        function ballSpeed() { return 4.4 + level * 0.4; }

        function launch() {
            if (!stuck) return;
            stuck = false;
            const a = -Math.PI / 2 + (Math.random() * 0.6 - 0.3);
            const s = ballSpeed();
            ball.dx = Math.cos(a) * s;
            ball.dy = Math.sin(a) * s;
            beep(520, .06, 'square', .05);
        }

        function newGame() {
            score = 0; lives = 3; level = 1;
            paddleW = 92;
            paddleX = (W - paddleW) / 2;
            buildLevel();
            resetBall();
            updateHud();
        }

        function updateHud() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('level').textContent = level;
            document.getElementById('best').textContent = best;
        }

        function update(dt) {
            if (leftPressed) paddleX -= 8 * dt;
            if (rightPressed) paddleX += 8 * dt;
            paddleX = Math.max(0, Math.min(W - paddleW, paddleX));

            if (stuck) {
                ball.x = paddleX + paddleW / 2;
                ball.y = H - PADDLE_H - 10 - BALL_R;
                return;
            }

            ball.x += ball.dx * dt;
            ball.y += ball.dy * dt;

            // walls
            if (ball.x < BALL_R) { ball.x = BALL_R; ball.dx = Math.abs(ball.dx); beep(300, .04); }
            if (ball.x > W - BALL_R) { ball.x = W - BALL_R; ball.dx = -Math.abs(ball.dx); beep(300, .04); }
            if (ball.y < BALL_R) { ball.y = BALL_R; ball.dy = Math.abs(ball.dy); beep(300, .04); }

            // paddle
            const py = H - PADDLE_H - 8;
            if (ball.dy > 0 && ball.y + BALL_R >= py && ball.y + BALL_R <= py + PADDLE_H + 8 &&
                ball.x >= paddleX - BALL_R && ball.x <= paddleX + paddleW + BALL_R) {
                const hit = (ball.x - paddleX) / paddleW; // 0..1
                const angle = -Math.PI / 2 + (hit - 0.5) * (Math.PI * 0.7);
                const s = ballSpeed();
                ball.dx = Math.cos(angle) * s;
                ball.dy = Math.sin(angle) * s;
                ball.y = py - BALL_R;
                beep(440, .05, 'square', .05);
            }

            // dropped
            if (ball.y > H + BALL_R) {
                lives--;
                updateHud();
                beep(150, .3, 'sawtooth', .06, -80);
                if (lives <= 0) return gameOver();
                resetBall();
                return;
            }

            // bricks
            for (let i = bricks.length - 1; i >= 0; i--) {
                const b = bricks[i];
                if (ball.x + BALL_R < b.x || ball.x - BALL_R > b.x + b.w ||
                    ball.y + BALL_R < b.y || ball.y - BALL_R > b.y + b.h) continue;
                // bounce off the nearest face
                const overlapX = Math.min(ball.x + BALL_R - b.x, b.x + b.w - (ball.x - BALL_R));
                const overlapY = Math.min(ball.y + BALL_R - b.y, b.y + b.h - (ball.y - BALL_R));
                if (overlapX < overlapY) ball.dx = -ball.dx;
                else ball.dy = -ball.dy;
                b.hp--;
                if (b.hp <= 0) {
                    bricks.splice(i, 1);
                    score += 10;
                    beep(600 + Math.random() * 200, .06, 'square', .05, 150);
                } else {
                    score += 5;
                    beep(380, .05, 'square', .05);
                }
                if (score > best) { best = score; localStorage.setItem(BEST_KEY, best); }
                updateHud();
                break;
            }

            if (!bricks.length) levelUp();
        }

        function levelUp() {
            level++;
            score += 50;
            paddleW = Math.max(64, paddleW - 6);
            if (score > best) { best = score; localStorage.setItem(BEST_KEY, best); }
            updateHud();
            buildLevel();
            resetBall();
            state = 'pause';
            beep(660, .1, 'triangle', .06); setTimeout(() => beep(880, .15, 'triangle', .06), 120);
            ovTitle.textContent = `✨ Level ${level}!`;
            ovSub.textContent = '+50 bonus · bricks get tougher, paddle gets smaller…';
            ovBtn.textContent = 'Continue';
            overlay.classList.remove('hidden');
        }

        function gameOver() {
            state = 'over';
            const isBest = score >= best && score > 0;
            ovTitle.textContent = '💀 Game Over';
            ovSub.innerHTML = `Score: <b>${score}</b> · Level ${level}` + (isBest ? ' · <span class="new-best">🏆 New best!</span>' : ` · Best: ${best}`);
            ovBtn.textContent = 'Play Again';
            overlay.classList.remove('hidden');
        }

        function draw() {
            const light = document.body.classList.contains('light-mode');
            ctx.fillStyle = light ? '#ffffff' : '#171a23';
            ctx.fillRect(0, 0, W, H);

            bricks.forEach(b => {
                ctx.globalAlpha = b.hp === 2 ? 1 : (b.hp === 1 && level >= 2 ? 0.9 : 1);
                ctx.fillStyle = b.color;
                ctx.beginPath();
                ctx.roundRect(b.x, b.y, b.w, b.h, 4);
                ctx.fill();
                if (b.hp === 2) {
                    ctx.strokeStyle = 'rgba(255,255,255,.7)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            });
            ctx.globalAlpha = 1;

            // paddle
            const grad = ctx.createLinearGradient(paddleX, 0, paddleX + paddleW, 0);
            grad.addColorStop(0, '#8b5cf6'); grad.addColorStop(1, '#22d3ee');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.roundRect(paddleX, H - PADDLE_H - 8, paddleW, PADDLE_H, 7);
            ctx.fill();

            // ball
            ctx.fillStyle = light ? '#232735' : '#e8eaf2';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
            ctx.fill();

            if (stuck && state === 'play') {
                ctx.fillStyle = light ? 'rgba(35,39,53,.5)' : 'rgba(232,234,242,.5)';
                ctx.font = '600 14px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText('Click or press Space to launch', W / 2, H - 60);
            }
        }

        function loop(now) {
            if (state !== 'play') return;
            const dt = Math.min((now - (last || now)) / 16.667, 3);
            last = now;
            update(dt);
            draw();
            if (state === 'play') requestAnimationFrame(loop);
        }

        function begin() {
            if (state === 'menu' || state === 'over') newGame();
            state = 'play';
            overlay.classList.add('hidden');
            last = 0;
            requestAnimationFrame(loop);
        }
        ovBtn.onclick = begin;

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') leftPressed = true;
            else if (e.key === 'ArrowRight') rightPressed = true;
            else if (e.key === ' ') {
                e.preventDefault();
                if (state === 'play') launch();
                else begin();
            } else if (e.key === 'p' || e.key === 'P') {
                if (state === 'play') {
                    state = 'pause';
                    ovTitle.textContent = '⏸️ Paused';
                    ovSub.textContent = '';
                    ovBtn.textContent = 'Resume';
                    overlay.classList.remove('hidden');
                } else if (state === 'pause') begin();
            }
        });
        document.addEventListener('keyup', e => {
            if (e.key === 'ArrowLeft') leftPressed = false;
            else if (e.key === 'ArrowRight') rightPressed = false;
        });

        function pointerX(e) {
            const rect = canvas.getBoundingClientRect();
            return (e.clientX - rect.left) / rect.width * W;
        }
        canvas.addEventListener('pointermove', e => {
            if (state !== 'play') return;
            paddleX = Math.max(0, Math.min(W - paddleW, pointerX(e) - paddleW / 2));
        });
        canvas.addEventListener('pointerdown', e => {
            if (state === 'play') {
                paddleX = Math.max(0, Math.min(W - paddleW, pointerX(e) - paddleW / 2));
                launch();
            }
        });

        document.addEventListener('visibilitychange', () => {
            if (document.hidden && state === 'play') {
                state = 'pause';
                ovTitle.textContent = '⏸️ Paused';
                ovSub.textContent = '';
                ovBtn.textContent = 'Resume';
                overlay.classList.remove('hidden');
            }
        });

        newGame();
        draw();
    </script>
</body>
</html>
