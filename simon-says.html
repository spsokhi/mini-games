<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says — Mini-Game Hub</title>
    <style>
        :root {
            --bg: #0f1117; --panel: #171a23; --panel-2: #1e2230; --border: #2a2f3f;
            --text: #e8eaf2; --muted: #9aa1b5; --accent: #8b5cf6; --accent-2: #22d3ee;
            --good: #34d399; --bad: #f87171; --gold: #fbbf24; --shadow: 0 10px 30px rgba(0,0,0,.35);
        }
        body.light-mode {
            --bg: #eef1f7; --panel: #ffffff; --panel-2: #f3f5fa; --border: #d8dce8;
            --text: #232735; --muted: #5b6274; --shadow: 0 10px 30px rgba(35,39,53,.12);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(900px 450px at 80% -10%, rgba(139,92,246,.14), transparent 60%), var(--bg);
            color: var(--text); transition: background-color .3s, color .3s;
        }
        .topbar {
            width: 100%; max-width: 520px; display: flex; align-items: center;
            justify-content: space-between; gap: 10px; padding: 14px 16px;
        }
        .back { color: var(--muted); text-decoration: none; font-weight: 600; padding: 8px 12px; border-radius: 10px; }
        .back:hover { color: var(--text); background: var(--panel); }
        h1 { font-size: 1.5rem; margin: 0; }
        .top-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: var(--panel); border: 1px solid var(--border); color: var(--text);
            width: 40px; height: 40px; border-radius: 10px; font-size: 1.05rem; cursor: pointer;
        }
        .icon-btn:hover { border-color: var(--accent); }

        .hud { display: flex; gap: 10px; padding: 4px 16px 14px; flex-wrap: wrap; justify-content: center; }
        .stat {
            background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
            padding: 7px 18px; text-align: center; min-width: 90px;
        }
        .stat .label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .stat .value { font-size: 1.25rem; font-weight: 800; }
        #best-el .value { color: var(--gold); }

        .status { font-size: 1.1rem; font-weight: 700; min-height: 1.6em; margin-bottom: 12px; color: var(--muted); }
        .status.your-turn { color: var(--good); }
        .status.watch { color: var(--accent-2); }

        .stage { position: relative; }
        .simon {
            width: min(88vw, 360px); height: min(88vw, 360px);
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
            position: relative; padding: 14px; background: var(--panel);
            border: 1px solid var(--border); border-radius: 50%;
            box-shadow: var(--shadow);
        }
        .pad {
            cursor: pointer; border: none; opacity: .55;
            transition: opacity .1s ease, filter .1s ease, transform .08s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .pad:disabled { cursor: default; }
        .pad.lit { opacity: 1; filter: brightness(1.5) saturate(1.2); transform: scale(1.02); }
        .pad[data-c="0"] { background: #16a34a; border-radius: 100% 12px 12px 12px; }
        .pad[data-c="1"] { background: #dc2626; border-radius: 12px 100% 12px 12px; }
        .pad[data-c="2"] { background: #eab308; border-radius: 12px 12px 12px 100%; }
        .pad[data-c="3"] { background: #2563eb; border-radius: 12px 12px 100% 12px; }
        .hub-centre {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 34%; height: 34%; border-radius: 50%;
            background: var(--panel); border: 4px solid var(--border);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2; pointer-events: none;
        }
        .hub-centre .round-num { font-size: 1.9rem; font-weight: 800; line-height: 1; }
        .hub-centre .round-label { font-size: .62rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }

        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; gap: 10px;
            align-items: center; justify-content: center; text-align: center; padding: 30px;
            background: rgba(10,12,18,.8); border-radius: 50%; backdrop-filter: blur(3px); z-index: 5;
        }
        body.light-mode .overlay { background: rgba(240,243,249,.88); }
        .overlay.hidden { display: none; }
        .overlay .big { font-size: 1.7rem; font-weight: 800; margin: 0; }
        .overlay .sub { color: var(--muted); margin: 0; line-height: 1.7; font-size: .95rem; }
        .overlay .new-best { color: var(--gold); font-weight: 800; }
        .btn {
            padding: 12px 26px; font-size: 1rem; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 6px 18px rgba(139,92,246,.35); transition: transform .15s;
        }
        .btn:hover { transform: translateY(-2px); }
        .hint { color: var(--muted); font-size: .88rem; padding: 14px 16px; text-align: center; }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="back" href="index.html">← Hub</a>
        <h1>🎵 Simon Says</h1>
        <div class="top-actions">
            <button id="sound-btn" class="icon-btn" title="Toggle sound">🔊</button>
            <button id="theme-btn" class="icon-btn" title="Toggle theme">☀️</button>
        </div>
    </header>

    <div class="hud">
        <div class="stat"><div class="label">Round</div><div class="value" id="round">—</div></div>
        <div class="stat" id="best-el"><div class="label">Best</div><div class="value" id="best">0</div></div>
    </div>

    <div class="status" id="status">Press Start to play</div>

    <div class="stage">
        <div class="simon" id="simon">
            <button class="pad" data-c="0" disabled></button>
            <button class="pad" data-c="1" disabled></button>
            <button class="pad" data-c="2" disabled></button>
            <button class="pad" data-c="3" disabled></button>
            <div class="hub-centre">
                <div class="round-num" id="centre-round">•</div>
                <div class="round-label">round</div>
            </div>
        </div>
        <div class="overlay" id="overlay">
            <p class="big" id="ov-title">🎵 Simon Says</p>
            <p class="sub" id="ov-sub">Watch the pattern, then repeat it.<br>It grows every round!</p>
            <button class="btn" id="ov-btn">Start</button>
        </div>
    </div>

    <p class="hint">The sequence plays faster as it gets longer. One wrong pad ends the run!</p>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        function applyTheme() {
            const light = localStorage.getItem('theme') === 'light';
            document.body.classList.toggle('light-mode', light);
            themeBtn.textContent = light ? '🌙' : '☀️';
        }
        themeBtn.onclick = () => { localStorage.setItem('theme', localStorage.getItem('theme') === 'light' ? 'dark' : 'light'); applyTheme(); };
        applyTheme();

        let muted = localStorage.getItem('mg-muted') === '1', actx;
        const soundBtn = document.getElementById('sound-btn');
        soundBtn.textContent = muted ? '🔇' : '🔊';
        soundBtn.onclick = () => { muted = !muted; localStorage.setItem('mg-muted', muted ? '1' : '0'); soundBtn.textContent = muted ? '🔇' : '🔊'; };
        function tone(freq, dur = 0.28, type = 'sine', vol = 0.08) {
            if (muted) return;
            actx = actx || new (window.AudioContext || window.webkitAudioContext)();
            const o = actx.createOscillator(), g = actx.createGain();
            o.type = type; o.frequency.value = freq;
            g.gain.setValueAtTime(vol, actx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
            o.connect(g); g.connect(actx.destination);
            o.start(); o.stop(actx.currentTime + dur);
        }

        // classic Simon tones: green, red, yellow, blue
        const FREQS = [392, 329.6, 261.6, 196];
        const BEST_KEY = 'mg-best-simon';

        let sequence = [], inputPos = 0, round = 0;
        let phase = 'idle'; // idle | playback | input | over
        let best = +localStorage.getItem(BEST_KEY) || 0;
        document.getElementById('best').textContent = best;

        const pads = [...document.querySelectorAll('.pad')];
        const overlay = document.getElementById('overlay');
        const statusEl = document.getElementById('status');

        function setStatus(text, cls = '') {
            statusEl.textContent = text;
            statusEl.className = 'status ' + cls;
        }
        function setRound(n) {
            document.getElementById('round').textContent = n || '—';
            document.getElementById('centre-round').textContent = n || '•';
        }
        function setPadsEnabled(on) { pads.forEach(p => p.disabled = !on); }

        function stepDelay() { return Math.max(260, 560 - sequence.length * 18); }
        function litTime() { return Math.max(180, 380 - sequence.length * 12); }

        function light(c, ms) {
            const pad = pads[c];
            pad.classList.add('lit');
            tone(FREQS[c], ms / 1000 + 0.1);
            setTimeout(() => pad.classList.remove('lit'), ms);
        }

        function playback() {
            phase = 'playback';
            setPadsEnabled(false);
            setStatus('👀 Watch…', 'watch');
            sequence.forEach((c, i) => {
                setTimeout(() => light(c, litTime()), 500 + i * stepDelay());
            });
            setTimeout(() => {
                phase = 'input';
                inputPos = 0;
                setPadsEnabled(true);
                setStatus('🎯 Your turn!', 'your-turn');
            }, 500 + sequence.length * stepDelay());
        }

        function nextRound() {
            round++;
            setRound(round);
            sequence.push(Math.floor(Math.random() * 4));
            playback();
        }

        function padPressed(c) {
            if (phase !== 'input') return;
            light(c, 220);
            if (c === sequence[inputPos]) {
                inputPos++;
                if (inputPos === sequence.length) {
                    phase = 'playback';
                    setPadsEnabled(false);
                    setStatus('✅ Nice!', 'your-turn');
                    setTimeout(nextRound, 650);
                }
            } else {
                fail();
            }
        }

        function fail() {
            phase = 'over';
            setPadsEnabled(false);
            tone(110, 0.6, 'sawtooth', 0.09);
            const reached = round - 1; // last fully completed round
            let isBest = false;
            if (reached > best) { best = reached; localStorage.setItem(BEST_KEY, best); isBest = true; }
            document.getElementById('best').textContent = best;
            setStatus('💥 Wrong pad!', '');
            document.getElementById('ov-title').textContent = '💥 Game Over';
            document.getElementById('ov-sub').innerHTML =
                `You completed <b>${reached}</b> round${reached === 1 ? '' : 's'}` +
                (isBest ? '<br><span class="new-best">🏆 New best!</span>' : `<br>Best: ${best}`);
            document.getElementById('ov-btn').textContent = 'Play Again';
            setTimeout(() => overlay.classList.remove('hidden'), 700);
        }

        function start() {
            sequence = []; round = 0;
            overlay.classList.add('hidden');
            setRound(0);
            nextRound();
        }

        pads.forEach(p => p.addEventListener('pointerdown', e => {
            e.preventDefault();
            padPressed(+p.dataset.c);
        }));
        document.getElementById('ov-btn').onclick = start;

        // keyboard: 1-4 / QWAS corners
        document.addEventListener('keydown', e => {
            const map = { '1': 0, '2': 1, '3': 2, '4': 3, q: 0, w: 1, a: 2, s: 3 };
            const c = map[e.key.toLowerCase()];
            if (c !== undefined) padPressed(c);
        });
    </script>
</body>
</html>
