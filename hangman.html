<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman — Mini-Game Hub</title>
    <style>
        :root {
            --bg: #0f1117; --panel: #171a23; --panel-2: #1e2230; --border: #2a2f3f;
            --text: #e8eaf2; --muted: #9aa1b5; --accent: #8b5cf6; --accent-2: #22d3ee;
            --good: #34d399; --bad: #f87171; --gold: #fbbf24; --shadow: 0 10px 30px rgba(0,0,0,.35);
        }
        body.light-mode {
            --bg: #eef1f7; --panel: #ffffff; --panel-2: #f3f5fa; --border: #d8dce8;
            --text: #232735; --muted: #5b6274; --shadow: 0 10px 30px rgba(35,39,53,.12);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(900px 450px at 80% -10%, rgba(248,113,113,.09), transparent 60%), var(--bg);
            color: var(--text); transition: background-color .3s, color .3s;
        }
        .topbar {
            width: 100%; max-width: 620px; display: flex; align-items: center;
            justify-content: space-between; gap: 10px; padding: 14px 16px;
        }
        .back { color: var(--muted); text-decoration: none; font-weight: 600; padding: 8px 12px; border-radius: 10px; }
        .back:hover { color: var(--text); background: var(--panel); }
        h1 { font-size: 1.5rem; margin: 0; }
        .icon-btn {
            background: var(--panel); border: 1px solid var(--border); color: var(--text);
            width: 40px; height: 40px; border-radius: 10px; font-size: 1.05rem; cursor: pointer;
        }
        .icon-btn:hover { border-color: var(--accent); }

        .hud { display: flex; gap: 10px; padding-bottom: 10px; flex-wrap: wrap; justify-content: center; }
        .stat {
            background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
            padding: 7px 16px; text-align: center; min-width: 86px;
        }
        .stat .label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .stat .value { font-size: 1.2rem; font-weight: 800; }
        #streak-stat .value { color: var(--gold); }

        .game-area {
            display: flex; gap: 20px; align-items: center; justify-content: center;
            flex-wrap: wrap; padding: 0 16px; max-width: 640px;
        }
        .gallows-box {
            background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
            padding: 10px; box-shadow: var(--shadow);
        }
        svg .draw { stroke: var(--text); stroke-width: 3.5; stroke-linecap: round; fill: none; }
        svg .part { visibility: hidden; }
        svg .part.show { visibility: visible; animation: sketch .3s ease; }
        @keyframes sketch { from { opacity: 0; } }

        .word-side { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .category {
            font-size: .85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
            color: var(--accent-2); background: var(--panel); border: 1px solid var(--border);
            padding: 5px 14px; border-radius: 999px;
        }
        .word-display {
            font-size: clamp(1.5rem, 6vw, 2.2rem); letter-spacing: clamp(5px, 2vw, 12px);
            font-weight: 800; word-break: break-all; text-align: center; min-height: 1.4em;
        }
        .message { font-size: 1.15rem; font-weight: 700; min-height: 1.5em; text-align: center; }
        .message.win { color: var(--good); }
        .message.lose { color: var(--bad); }

        .letters {
            display: grid; grid-template-columns: repeat(9, 1fr); gap: 6px;
            width: min(94vw, 480px); padding: 14px 16px 6px;
        }
        .letters button {
            padding: 10px 0; font-size: 1rem; font-weight: 700; text-transform: uppercase;
            border: 1px solid var(--border); border-radius: 8px;
            background: var(--panel); color: var(--text); cursor: pointer; transition: all .12s ease;
        }
        .letters button:hover:not(:disabled) { border-color: var(--accent); transform: translateY(-2px); }
        .letters button.hit { background: rgba(52,211,153,.18); border-color: var(--good); color: var(--good); }
        .letters button.miss { background: rgba(248,113,113,.12); border-color: transparent; color: var(--muted); opacity: .55; }
        .letters button:disabled { cursor: default; }

        .actions { display: flex; gap: 10px; padding: 14px; }
        .btn {
            padding: 11px 24px; font-size: 1rem; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 6px 18px rgba(139,92,246,.35); transition: transform .15s;
        }
        .btn:hover:not(:disabled) { transform: translateY(-2px); }
        .btn.ghost { background: var(--panel); color: var(--text); border: 1px solid var(--border); box-shadow: none; }
        .btn:disabled { opacity: .45; cursor: not-allowed; }
        .hint-note { color: var(--muted); font-size: .85rem; padding-bottom: 16px; text-align: center; }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="back" href="index.html">← Hub</a>
        <h1>🔤 Hangman</h1>
        <button id="theme-btn" class="icon-btn" title="Toggle theme">☀️</button>
    </header>

    <div class="hud">
        <div class="stat"><div class="label">Tries Left</div><div class="value" id="tries">6</div></div>
        <div class="stat" id="streak-stat"><div class="label">Streak</div><div class="value" id="streak">0</div></div>
        <div class="stat"><div class="label">Best Streak</div><div class="value" id="best-streak">0</div></div>
    </div>

    <div class="game-area">
        <div class="gallows-box">
            <svg width="170" height="200" viewBox="0 0 170 200">
                <line class="draw" x1="20" y1="190" x2="120" y2="190"/>
                <line class="draw" x1="45" y1="190" x2="45" y2="20"/>
                <line class="draw" x1="45" y1="20" x2="115" y2="20"/>
                <line class="draw" x1="115" y1="20" x2="115" y2="42"/>
                <circle class="draw part" id="p0" cx="115" cy="58" r="16"/>
                <line class="draw part" id="p1" x1="115" y1="74" x2="115" y2="125"/>
                <line class="draw part" id="p2" x1="115" y1="88" x2="90" y2="110"/>
                <line class="draw part" id="p3" x1="115" y1="88" x2="140" y2="110"/>
                <line class="draw part" id="p4" x1="115" y1="125" x2="95" y2="160"/>
                <line class="draw part" id="p5" x1="115" y1="125" x2="135" y2="160"/>
            </svg>
        </div>
        <div class="word-side">
            <div class="category" id="category"></div>
            <p class="word-display" id="word-display"></p>
            <p class="message" id="message"></p>
        </div>
    </div>

    <div class="letters" id="letters"></div>

    <div class="actions">
        <button class="btn ghost" id="hint-btn">💡 Hint (1)</button>
        <button class="btn" id="next-btn" style="display:none">Next Word →</button>
    </div>
    <p class="hint-note">Tip: you can type letters on your keyboard.</p>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        function applyTheme() {
            const light = localStorage.getItem('theme') === 'light';
            document.body.classList.toggle('light-mode', light);
            themeBtn.textContent = light ? '🌙' : '☀️';
        }
        themeBtn.onclick = () => { localStorage.setItem('theme', localStorage.getItem('theme') === 'light' ? 'dark' : 'light'); applyTheme(); };
        applyTheme();

        const WORDS = {
            'Animals': ['elephant','giraffe','kangaroo','penguin','dolphin','octopus','leopard','tortoise','flamingo','squirrel','hedgehog','crocodile','butterfly','panther','raccoon'],
            'Countries': ['india','japan','brazil','canada','germany','australia','portugal','thailand','morocco','iceland','mexico','egypt','norway','vietnam','argentina'],
            'Food': ['samosa','biryani','pancake','chocolate','spaghetti','sandwich','dumpling','croissant','avocado','pretzel','lasagna','burrito','waffle','noodles','paneer'],
            'Sports': ['cricket','football','badminton','hockey','tennis','archery','cycling','swimming','wrestling','marathon','volleyball','kabaddi'],
            'Technology': ['keyboard','internet','algorithm','database','computer','software','browser','python','javascript','compiler','network','robot','satellite','bluetooth'],
        };
        const BEST_KEY = 'mg-best-hangman';
        const MAX_TRIES = 6;

        let word = '', category = '', guessed = new Set(), wrong = 0, active = false, hintUsed = false;
        let streak = 0;
        let bestStreak = +localStorage.getItem(BEST_KEY) || 0;

        const wordDisplay = document.getElementById('word-display');
        const lettersDiv = document.getElementById('letters');
        const message = document.getElementById('message');
        const hintBtn = document.getElementById('hint-btn');
        const nextBtn = document.getElementById('next-btn');
        document.getElementById('best-streak').textContent = bestStreak;

        function newGame() {
            const cats = Object.keys(WORDS);
            category = cats[Math.floor(Math.random() * cats.length)];
            const list = WORDS[category];
            word = list[Math.floor(Math.random() * list.length)];
            guessed = new Set(); wrong = 0; active = true; hintUsed = false;

            document.getElementById('category').textContent = '📁 ' + category;
            document.getElementById('tries').textContent = MAX_TRIES;
            message.textContent = ''; message.className = 'message';
            hintBtn.disabled = false; hintBtn.textContent = '💡 Hint (1)';
            nextBtn.style.display = 'none';
            for (let i = 0; i < 6; i++) document.getElementById('p' + i).classList.remove('show');

            lettersDiv.innerHTML = '';
            for (let i = 97; i <= 122; i++) {
                const ch = String.fromCharCode(i);
                const btn = document.createElement('button');
                btn.textContent = ch;
                btn.id = 'key-' + ch;
                btn.onclick = () => guess(ch);
                lettersDiv.appendChild(btn);
            }
            renderWord();
        }

        function renderWord() {
            wordDisplay.textContent = word.split('').map(l => guessed.has(l) ? l.toUpperCase() : '_').join(' ');
        }

        function guess(ch) {
            if (!active || guessed.has(ch)) return;
            guessed.add(ch);
            const btn = document.getElementById('key-' + ch);
            btn.disabled = true;

            if (word.includes(ch)) {
                btn.classList.add('hit');
                renderWord();
                if (word.split('').every(l => guessed.has(l))) finish(true);
            } else {
                btn.classList.add('miss');
                document.getElementById('p' + wrong).classList.add('show');
                wrong++;
                document.getElementById('tries').textContent = MAX_TRIES - wrong;
                if (wrong >= MAX_TRIES) finish(false);
            }
        }

        function finish(won) {
            active = false;
            if (won) {
                streak++;
                message.textContent = '🎉 You got it!';
                message.classList.add('win');
                if (streak > bestStreak) {
                    bestStreak = streak;
                    localStorage.setItem(BEST_KEY, bestStreak);
                    message.textContent += ' 🏆 New best streak!';
                }
            } else {
                streak = 0;
                message.textContent = `💀 The word was "${word.toUpperCase()}"`;
                message.classList.add('lose');
                renderRevealed();
            }
            document.getElementById('streak').textContent = streak;
            document.getElementById('best-streak').textContent = bestStreak;
            hintBtn.disabled = true;
            nextBtn.style.display = 'inline-block';
            lettersDiv.querySelectorAll('button').forEach(b => b.disabled = true);
        }

        function renderRevealed() {
            wordDisplay.textContent = word.toUpperCase().split('').join(' ');
        }

        hintBtn.onclick = () => {
            if (!active || hintUsed) return;
            const hidden = word.split('').filter(l => !guessed.has(l));
            if (!hidden.length) return;
            hintUsed = true;
            hintBtn.disabled = true;
            hintBtn.textContent = '💡 Hint (0)';
            guess(hidden[Math.floor(Math.random() * hidden.length)]);
        };
        nextBtn.onclick = newGame;

        document.addEventListener('keydown', e => {
            const ch = e.key.toLowerCase();
            if (ch >= 'a' && ch <= 'z' && ch.length === 1) guess(ch);
            else if (e.key === 'Enter' && !active) newGame();
        });

        newGame();
    </script>
</body>
</html>
