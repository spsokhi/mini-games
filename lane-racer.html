<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lane Racer — Mini-Game Hub</title>
    <style>
        :root {
            --bg: #0f1117; --panel: #171a23; --panel-2: #1e2230; --border: #2a2f3f;
            --text: #e8eaf2; --muted: #9aa1b5; --accent: #8b5cf6; --accent-2: #22d3ee;
            --gold: #fbbf24; --shadow: 0 10px 30px rgba(0,0,0,.35);
        }
        body.light-mode {
            --bg: #eef1f7; --panel: #ffffff; --panel-2: #f3f5fa; --border: #d8dce8;
            --text: #232735; --muted: #5b6274; --shadow: 0 10px 30px rgba(35,39,53,.12);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(900px 450px at 80% -10%, rgba(248,113,113,.10), transparent 60%), var(--bg);
            color: var(--text); transition: background-color .3s, color .3s;
        }
        .topbar {
            width: 100%; max-width: 520px; display: flex; align-items: center;
            justify-content: space-between; gap: 10px; padding: 14px 16px;
        }
        .back { color: var(--muted); text-decoration: none; font-weight: 600; padding: 8px 12px; border-radius: 10px; }
        .back:hover { color: var(--text); background: var(--panel); }
        h1 { font-size: 1.5rem; margin: 0; }
        .top-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: var(--panel); border: 1px solid var(--border); color: var(--text);
            width: 40px; height: 40px; border-radius: 10px; font-size: 1.05rem; cursor: pointer;
        }
        .icon-btn:hover { border-color: var(--accent); }

        .hud { display: flex; gap: 10px; padding: 4px 16px 12px; flex-wrap: wrap; justify-content: center; }
        .stat {
            background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
            padding: 7px 18px; text-align: center; min-width: 86px;
        }
        .stat .label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .stat .value { font-size: 1.25rem; font-weight: 800; }
        #best-el .value { color: var(--gold); }
        #speed-el .value { color: var(--accent-2); }

        .stage { position: relative; width: min(94vw, 380px); }
        canvas {
            display: block; width: 100%; height: auto;
            border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow);
            touch-action: none; cursor: pointer;
        }
        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; gap: 10px;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
            background: rgba(10,12,18,.6); border-radius: 16px; backdrop-filter: blur(2px);
        }
        .overlay.hidden { display: none; }
        .overlay .big { font-size: 2rem; font-weight: 800; margin: 0; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,.5); }
        .overlay .sub { color: #e8eaf2; margin: 0; text-shadow: 0 1px 4px rgba(0,0,0,.5); }
        .overlay .new-best { color: var(--gold); font-weight: 800; }
        .btn {
            padding: 12px 26px; font-size: 1rem; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 6px 18px rgba(139,92,246,.35); transition: transform .15s;
        }
        .btn:hover { transform: translateY(-2px); }
        .hint { color: var(--muted); font-size: .88rem; padding: 12px 16px; text-align: center; max-width: 420px; }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="back" href="index.html">← Hub</a>
        <h1>🏎️ Lane Racer</h1>
        <div class="top-actions">
            <button id="sound-btn" class="icon-btn" title="Toggle sound">🔊</button>
            <button id="theme-btn" class="icon-btn" title="Toggle theme">☀️</button>
        </div>
    </header>

    <div class="hud">
        <div class="stat"><div class="label">Score</div><div class="value" id="score">0</div></div>
        <div class="stat" id="speed-el"><div class="label">Speed</div><div class="value" id="speed">0</div></div>
        <div class="stat" id="best-el"><div class="label">Best</div><div class="value" id="best">0</div></div>
    </div>

    <div class="stage">
        <canvas id="gameCanvas" width="380" height="560"></canvas>
        <div class="overlay" id="overlay">
            <p class="big" id="ov-title">🏎️ Lane Racer</p>
            <p class="sub" id="ov-sub">Weave through traffic.<br>It only gets faster.</p>
            <button class="btn" id="ov-btn">Drive</button>
        </div>
    </div>

    <p class="hint"><b>← →</b> or <b>A/D</b> to change lanes — on touch, tap the left or right side. The longer you last, the faster the highway gets.</p>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        function applyTheme() {
            const light = localStorage.getItem('theme') === 'light';
            document.body.classList.toggle('light-mode', light);
            themeBtn.textContent = light ? '🌙' : '☀️';
        }
        themeBtn.onclick = () => { localStorage.setItem('theme', localStorage.getItem('theme') === 'light' ? 'dark' : 'light'); applyTheme(); };
        applyTheme();

        let muted = localStorage.getItem('mg-muted') === '1', actx;
        const soundBtn = document.getElementById('sound-btn');
        soundBtn.textContent = muted ? '🔇' : '🔊';
        soundBtn.onclick = () => { muted = !muted; localStorage.setItem('mg-muted', muted ? '1' : '0'); soundBtn.textContent = muted ? '🔇' : '🔊'; };
        function beep(freq, dur = 0.08, type = 'square', vol = 0.04, slide = 0) {
            if (muted) return;
            actx = actx || new (window.AudioContext || window.webkitAudioContext)();
            const o = actx.createOscillator(), g = actx.createGain();
            o.type = type; o.frequency.value = freq;
            if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), actx.currentTime + dur);
            g.gain.setValueAtTime(vol, actx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
            o.connect(g); g.connect(actx.destination);
            o.start(); o.stop(actx.currentTime + dur);
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        const BEST_KEY = 'mg-best-racer';
        const ROAD_X = 30, ROAD_W = 320, LANES = 4, LANE_W = ROAD_W / LANES;
        const laneX = i => ROAD_X + LANE_W / 2 + i * LANE_W;
        const CAR_W = 44, CAR_H = 74;
        const PLAYER_Y = H - 120;
        const COLORS = ['#f87171', '#fbbf24', '#34d399', '#22d3ee', '#f472b6', '#fb923c'];

        let state = 'menu'; // menu | play | over
        let lane, px, cars, dist, score, speed, nextSpawn, dashY, shake, last = 0;
        let best = +localStorage.getItem(BEST_KEY) || 0;
        document.getElementById('best').textContent = best;

        const overlay = document.getElementById('overlay');
        const ovTitle = document.getElementById('ov-title');
        const ovSub = document.getElementById('ov-sub');
        const ovBtn = document.getElementById('ov-btn');

        function start() {
            lane = 1; px = laneX(1);
            cars = []; dist = 0; score = 0; speed = 6; nextSpawn = 200; dashY = 0; shake = 0;
            document.getElementById('score').textContent = 0;
            state = 'play';
            overlay.classList.add('hidden');
            last = 0;
            requestAnimationFrame(loop);
        }

        function steer(dir) {
            if (state !== 'play') return;
            const n = Math.max(0, Math.min(LANES - 1, lane + dir));
            if (n !== lane) { lane = n; beep(300, .04, 'square', .03); }
        }

        function spawnWave() {
            // block 1-3 lanes, never all four, so there is always a way through
            const maxBlock = score > 800 ? 3 : score > 250 ? 2 : 1;
            const k = 1 + Math.floor(Math.random() * maxBlock);
            const lanes = [...Array(LANES).keys()].sort(() => Math.random() - 0.5).slice(0, k);
            lanes.forEach((ln, i) => {
                cars.push({
                    lane: ln, x: laneX(ln),
                    y: -CAR_H - Math.random() * 70 - (k === 3 && i === 2 ? 150 : 0), // stagger the third car
                    vy: 2 + Math.random() * 1.6,
                    color: COLORS[Math.floor(Math.random() * COLORS.length)],
                });
            });
            nextSpawn = (170 + Math.random() * 130) * (speed / 6);
        }

        function update(dt) {
            speed = 6 + Math.min(7.5, dist / 2200);
            dist += speed * dt;
            score = Math.floor(dist / 12);
            document.getElementById('score').textContent = score;
            document.getElementById('speed').textContent = Math.round(speed * 20) + ' km/h';

            px += (laneX(lane) - px) * Math.min(1, 0.24 * dt);
            dashY = (dashY + speed * dt) % 48;

            nextSpawn -= speed * dt;
            if (nextSpawn <= 0) spawnWave();

            for (const c of cars) c.y += (speed - c.vy) * dt;
            cars = cars.filter(c => c.y < H + 100);

            for (const c of cars) {
                if (Math.abs(c.x - px) < CAR_W - 6 && Math.abs(c.y - PLAYER_Y) < CAR_H - 8) return crash();
            }
        }

        function crash() {
            state = 'over';
            shake = 12;
            beep(120, .4, 'sawtooth', .08, -60);
            let isBest = false;
            if (score > best) { best = score; localStorage.setItem(BEST_KEY, best); isBest = true; }
            document.getElementById('best').textContent = best;
            ovTitle.textContent = '💥 Crashed!';
            ovSub.innerHTML = `Score: <b>${score}</b>` + (isBest ? ' · <span class="new-best">🏆 New best!</span>' : ` · Best: ${best}`);
            ovBtn.textContent = 'Drive Again';
            overlay.classList.remove('hidden');
        }

        function drawCar(x, y, color, isPlayer) {
            ctx.save();
            ctx.translate(x, y);
            // body
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.roundRect(-CAR_W / 2, -CAR_H / 2, CAR_W, CAR_H, 10);
            ctx.fill();
            // roof/windshield
            ctx.fillStyle = 'rgba(15,23,42,.55)';
            ctx.beginPath();
            ctx.roundRect(-CAR_W / 2 + 6, -CAR_H / 2 + (isPlayer ? 12 : 14), CAR_W - 12, 16, 5);
            ctx.fill();
            ctx.beginPath();
            ctx.roundRect(-CAR_W / 2 + 6, CAR_H / 2 - 26, CAR_W - 12, 12, 5);
            ctx.fill();
            // lights
            ctx.fillStyle = isPlayer ? '#fef9c3' : '#fecaca';
            ctx.fillRect(-CAR_W / 2 + 4, isPlayer ? -CAR_H / 2 + 2 : CAR_H / 2 - 6, 9, 4);
            ctx.fillRect(CAR_W / 2 - 13, isPlayer ? -CAR_H / 2 + 2 : CAR_H / 2 - 6, 9, 4);
            ctx.restore();
        }

        function draw() {
            const light = document.body.classList.contains('light-mode');
            ctx.save();
            if (shake > 0) {
                ctx.translate((Math.random() - .5) * shake, (Math.random() - .5) * shake);
                shake *= 0.85;
            }
            // grass
            ctx.fillStyle = light ? '#86c66c' : '#1c3325';
            ctx.fillRect(-10, -10, W + 20, H + 20);
            // roadside bushes
            ctx.fillStyle = light ? '#6aab52' : '#16281d';
            for (let i = 0; i < 7; i++) {
                const by = ((i * 97 + dist * 0.9) % (H + 80)) - 40;
                ctx.beginPath(); ctx.arc(14, by, 11, 0, 7); ctx.fill();
                ctx.beginPath(); ctx.arc(W - 14, by + 40, 11, 0, 7); ctx.fill();
            }
            // road
            ctx.fillStyle = light ? '#9aa1ad' : '#242936';
            ctx.fillRect(ROAD_X, -10, ROAD_W, H + 20);
            // edge lines
            ctx.fillStyle = light ? '#f8fafc' : '#c8cede';
            ctx.fillRect(ROAD_X + 2, -10, 4, H + 20);
            ctx.fillRect(ROAD_X + ROAD_W - 6, -10, 4, H + 20);
            // dashed lane lines
            ctx.fillStyle = light ? 'rgba(248,250,252,.75)' : 'rgba(200,206,222,.5)';
            for (let l = 1; l < LANES; l++) {
                const lx = ROAD_X + l * LANE_W - 2;
                for (let y = dashY - 48; y < H; y += 48) ctx.fillRect(lx, y, 4, 26);
            }
            // traffic + player
            cars.forEach(c => drawCar(c.x, c.y, c.color, false));
            drawCar(px, PLAYER_Y, '#8b5cf6', true);
            ctx.restore();
        }

        function loop(now) {
            if (state === 'over') { draw(); return; }
            const dt = Math.min((now - (last || now)) / 16.667, 3);
            last = now;
            if (state === 'play') update(dt);
            draw();
            if (state !== 'over') requestAnimationFrame(loop);
        }

        ovBtn.onclick = e => { e.stopPropagation(); start(); };
        canvas.addEventListener('pointerdown', e => {
            e.preventDefault();
            if (state !== 'play') { start(); return; }
            const rect = canvas.getBoundingClientRect();
            steer((e.clientX - rect.left) / rect.width < 0.5 ? -1 : 1);
        });
        overlay.addEventListener('pointerdown', e => {
            if (e.target === ovBtn) return;
            if (state !== 'play') start();
        });
        document.addEventListener('keydown', e => {
            const k = e.key.toLowerCase();
            if (e.key === 'ArrowLeft' || k === 'a') { e.preventDefault(); if (state !== 'play') start(); else steer(-1); }
            if (e.key === 'ArrowRight' || k === 'd') { e.preventDefault(); if (state !== 'play') start(); else steer(1); }
        });

        cars = []; dist = 0; px = laneX(1); dashY = 0; shake = 0;
        requestAnimationFrame(loop);
    </script>
</body>
</html>
