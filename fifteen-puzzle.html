<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15-Puzzle — Mini-Game Hub</title>
    <style>
        :root {
            --bg: #0f1117; --panel: #171a23; --panel-2: #1e2230; --border: #2a2f3f;
            --text: #e8eaf2; --muted: #9aa1b5; --accent: #8b5cf6; --accent-2: #22d3ee;
            --good: #34d399; --gold: #fbbf24; --shadow: 0 10px 30px rgba(0,0,0,.35);
        }
        body.light-mode {
            --bg: #eef1f7; --panel: #ffffff; --panel-2: #f3f5fa; --border: #d8dce8;
            --text: #232735; --muted: #5b6274; --shadow: 0 10px 30px rgba(35,39,53,.12);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(900px 450px at 80% -10%, rgba(139,92,246,.12), transparent 60%), var(--bg);
            color: var(--text); transition: background-color .3s, color .3s;
        }
        .topbar {
            width: 100%; max-width: 520px; display: flex; align-items: center;
            justify-content: space-between; gap: 10px; padding: 14px 16px;
        }
        .back { color: var(--muted); text-decoration: none; font-weight: 600; padding: 8px 12px; border-radius: 10px; }
        .back:hover { color: var(--text); background: var(--panel); }
        h1 { font-size: 1.5rem; margin: 0; }
        .icon-btn {
            background: var(--panel); border: 1px solid var(--border); color: var(--text);
            width: 40px; height: 40px; border-radius: 10px; font-size: 1.05rem; cursor: pointer;
        }
        .icon-btn:hover { border-color: var(--accent); }

        .modes { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 4px 16px 10px; }
        .mode-btn {
            padding: 9px 16px; border-radius: 999px; border: 1px solid var(--border);
            background: var(--panel); color: var(--muted); font-weight: 600; cursor: pointer;
            transition: all .15s ease;
        }
        .mode-btn:hover { border-color: var(--accent); color: var(--text); }
        .mode-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #fff; border-color: transparent;
        }

        .hud { display: flex; gap: 10px; padding-bottom: 12px; flex-wrap: wrap; justify-content: center; }
        .stat {
            background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
            padding: 7px 18px; text-align: center; min-width: 86px;
        }
        .stat .label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .stat .value { font-size: 1.25rem; font-weight: 800; }
        #best-el .value { color: var(--gold); }

        .stage { position: relative; }
        .board {
            position: relative; width: min(94vw, 400px); height: min(94vw, 400px);
            background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
            box-shadow: var(--shadow); touch-action: none; user-select: none; -webkit-user-select: none;
        }
        .tile {
            position: absolute; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(145deg, var(--panel-2), var(--bg));
            border: 1px solid var(--border); border-radius: 12px;
            font-weight: 800; cursor: pointer;
            box-shadow: 0 3px 8px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.05);
            transition: transform .12s ease;
            -webkit-tap-highlight-color: transparent;
        }
        body.light-mode .tile { background: linear-gradient(145deg, #ffffff, #e6eaf4); }
        .tile:hover { border-color: var(--accent); }
        .tile.right { color: var(--accent-2); border-color: rgba(34,211,238,.35); }
        .board.won .tile { color: var(--good); border-color: rgba(52,211,153,.5); cursor: default; }

        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; gap: 10px;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
            background: rgba(10,12,18,.82); border-radius: 16px; backdrop-filter: blur(3px); z-index: 5;
        }
        body.light-mode .overlay { background: rgba(240,243,249,.9); }
        .overlay.hidden { display: none; }
        .overlay .big { font-size: 1.9rem; font-weight: 800; margin: 0; }
        .overlay .sub { color: var(--muted); margin: 0; line-height: 1.8; }
        .overlay .new-best { color: var(--gold); font-weight: 800; }
        .btn {
            padding: 12px 26px; font-size: 1rem; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 6px 18px rgba(139,92,246,.35); transition: transform .15s;
        }
        .btn:hover { transform: translateY(-2px); }

        .toolbar { display: flex; gap: 8px; padding: 16px; }
        .tool-btn {
            padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--panel); color: var(--text); font-weight: 600; cursor: pointer;
        }
        .tool-btn:hover { border-color: var(--accent); }
        .hint { color: var(--muted); font-size: .88rem; padding: 0 16px 20px; text-align: center; max-width: 440px; }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="back" href="index.html">← Hub</a>
        <h1>🔢 15-Puzzle</h1>
        <button id="theme-btn" class="icon-btn" title="Toggle theme">☀️</button>
    </header>

    <div class="modes">
        <button class="mode-btn" data-n="3">😊 3×3</button>
        <button class="mode-btn active" data-n="4">🔥 4×4</button>
    </div>

    <div class="hud">
        <div class="stat"><div class="label">Moves</div><div class="value" id="moves">0</div></div>
        <div class="stat"><div class="label">Time</div><div class="value" id="time">0:00</div></div>
        <div class="stat" id="best-el"><div class="label">Best</div><div class="value" id="best">—</div></div>
    </div>

    <div class="stage">
        <div class="board" id="board"></div>
        <div class="overlay hidden" id="overlay">
            <p class="big" id="ov-title"></p>
            <p class="sub" id="ov-sub"></p>
            <button class="btn" id="ov-btn">New Game</button>
        </div>
    </div>

    <div class="toolbar">
        <button class="tool-btn" id="new-btn">🔄 Shuffle</button>
    </div>

    <p class="hint">Slide the tiles into order, 1 → 15, blank in the corner. Tap any tile in the blank's row or column to slide the whole run — arrow keys work too.</p>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        function applyTheme() {
            const light = localStorage.getItem('theme') === 'light';
            document.body.classList.toggle('light-mode', light);
            themeBtn.textContent = light ? '🌙' : '☀️';
        }
        themeBtn.onclick = () => { localStorage.setItem('theme', localStorage.getItem('theme') === 'light' ? 'dark' : 'light'); applyTheme(); };
        applyTheme();

        function bestKey(n) { return n === 4 ? 'mg-best-15puzzle' : 'mg-best-15puzzle-' + n; }
        function fmtTime(s) { return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); }

        let N = 4, grid, moves, secs, timer = null, started, won;
        const boardEl = document.getElementById('board');
        const overlay = document.getElementById('overlay');
        const tileEls = new Map(); // value -> element

        const GAP = 8;
        const idx = (r, c) => r * N + c;
        function tileSize() { return (boardEl.clientWidth - GAP * (N + 1)) / N; }

        function showBest() {
            const b = localStorage.getItem(bestKey(N));
            document.getElementById('best').textContent = b ? b + ' mv' : '—';
        }

        function blankPos() {
            const i = grid.indexOf(0);
            return [Math.floor(i / N), i % N];
        }

        function slideToward(r, c) { // slide the run of tiles between (r,c) and the blank
            const [br, bc] = blankPos();
            if (r === br && c === bc) return false;
            if (r !== br && c !== bc) return false;
            const dr = Math.sign(br - r), dc = Math.sign(bc - c);
            // walk back from the blank to the clicked tile, shifting each tile into the hole
            let cr = br, cc = bc, n = 0;
            while (cr !== r || cc !== c) {
                const pr = cr - dr, pc = cc - dc;
                grid[idx(cr, cc)] = grid[idx(pr, pc)];
                cr = pr; cc = pc;
                n++;
            }
            grid[idx(r, c)] = 0;
            return n;
        }

        function scramble() {
            grid = [...Array(N * N).keys()].map(v => (v + 1) % (N * N));
            let lastDir = null;
            const steps = N === 4 ? 260 : 120;
            for (let i = 0; i < steps; i++) {
                const [br, bc] = blankPos();
                const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]].filter(([dr, dc]) => {
                    const r = br + dr, c = bc + dc;
                    if (r < 0 || r >= N || c < 0 || c >= N) return false;
                    return !lastDir || !(dr === -lastDir[0] && dc === -lastDir[1]);
                });
                const [dr, dc] = dirs[Math.floor(Math.random() * dirs.length)];
                slideToward(br + dr, bc + dc);
                lastDir = [dr, dc];
            }
        }

        function newGame() {
            do { scramble(); } while (isSolved());
            moves = 0; secs = 0; started = false; won = false;
            clearInterval(timer);
            document.getElementById('moves').textContent = 0;
            document.getElementById('time').textContent = '0:00';
            overlay.classList.add('hidden');
            boardEl.classList.remove('won');
            showBest();
            build();
        }

        function build() {
            boardEl.innerHTML = '';
            tileEls.clear();
            const ts = tileSize();
            grid.forEach((v, i) => {
                if (v === 0) return;
                const d = document.createElement('div');
                d.className = 'tile';
                d.textContent = v;
                d.style.width = d.style.height = ts + 'px';
                d.style.fontSize = ts * 0.4 + 'px';
                d.addEventListener('pointerdown', e => { e.preventDefault(); clickTile(v); });
                boardEl.appendChild(d);
                tileEls.set(v, d);
            });
            position();
        }

        function position() {
            const ts = tileSize();
            grid.forEach((v, i) => {
                if (v === 0) return;
                const r = Math.floor(i / N), c = i % N;
                const el = tileEls.get(v);
                el.style.transform = `translate(${GAP + c * (ts + GAP)}px, ${GAP + r * (ts + GAP)}px)`;
                el.classList.toggle('right', v === i + 1);
            });
        }

        function isSolved() {
            return grid.every((v, i) => v === (i + 1) % (N * N));
        }

        function clickTile(v) {
            if (won) return;
            const i = grid.indexOf(v);
            const n = slideToward(Math.floor(i / N), i % N);
            if (!n) return;
            if (!started) {
                started = true;
                timer = setInterval(() => {
                    secs++;
                    document.getElementById('time').textContent = fmtTime(secs);
                }, 1000);
            }
            moves += n;
            document.getElementById('moves').textContent = moves;
            position();
            if (isSolved()) win();
        }

        function win() {
            won = true;
            clearInterval(timer);
            boardEl.classList.add('won');
            position();
            const key = bestKey(N);
            const prev = +localStorage.getItem(key) || Infinity;
            const isBest = moves < prev;
            if (isBest) localStorage.setItem(key, moves);
            document.getElementById('ov-title').textContent = '🎉 Solved!';
            document.getElementById('ov-sub').innerHTML =
                `${N}×${N} in <b>${moves}</b> moves · ${fmtTime(secs)}<br>` +
                (isBest ? '<span class="new-best">🏆 New best!</span>' : `Best: ${Math.min(prev, moves)} moves`);
            showBest();
            setTimeout(() => overlay.classList.remove('hidden'), 600);
        }

        document.addEventListener('keydown', e => {
            if (won) return;
            const map = { ArrowUp: [1, 0], ArrowDown: [-1, 0], ArrowLeft: [0, 1], ArrowRight: [0, -1] };
            const d = map[e.key];
            if (!d) return;
            e.preventDefault();
            const [br, bc] = blankPos();
            const r = br + d[0], c = bc + d[1];
            if (r < 0 || r >= N || c < 0 || c >= N) return;
            clickTile(grid[idx(r, c)]);
        });

        document.getElementById('new-btn').onclick = newGame;
        document.getElementById('ov-btn').onclick = newGame;
        document.querySelectorAll('.mode-btn').forEach(b => {
            b.onclick = () => {
                document.querySelectorAll('.mode-btn').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                N = +b.dataset.n;
                newGame();
            };
        });
        window.addEventListener('resize', build);

        newGame();
    </script>
</body>
</html>
