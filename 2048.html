<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 — Mini-Game Hub</title>
    <style>
        :root {
            --bg: #0f1117; --panel: #171a23; --panel-2: #1e2230; --border: #2a2f3f;
            --text: #e8eaf2; --muted: #9aa1b5; --accent: #8b5cf6; --accent-2: #22d3ee;
            --gold: #fbbf24; --shadow: 0 10px 30px rgba(0,0,0,.35);
        }
        body.light-mode {
            --bg: #eef1f7; --panel: #ffffff; --panel-2: #f3f5fa; --border: #d8dce8;
            --text: #232735; --muted: #5b6274; --shadow: 0 10px 30px rgba(35,39,53,.12);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(900px 450px at 80% -10%, rgba(251,191,36,.1), transparent 60%), var(--bg);
            color: var(--text); transition: background-color .3s, color .3s;
        }
        .topbar {
            width: 100%; max-width: 560px; display: flex; align-items: center;
            justify-content: space-between; gap: 10px; padding: 14px 16px;
        }
        .back { color: var(--muted); text-decoration: none; font-weight: 600; padding: 8px 12px; border-radius: 10px; }
        .back:hover { color: var(--text); background: var(--panel); }
        h1 { font-size: 1.5rem; margin: 0; }
        .icon-btn {
            background: var(--panel); border: 1px solid var(--border); color: var(--text);
            width: 40px; height: 40px; border-radius: 10px; font-size: 1.05rem; cursor: pointer;
        }
        .icon-btn:hover { border-color: var(--accent); }

        .hud { display: flex; gap: 10px; padding: 4px 16px 14px; flex-wrap: wrap; justify-content: center; }
        .stat {
            background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
            padding: 8px 20px; text-align: center; min-width: 96px;
        }
        .stat .label { font-size: .72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .stat .value { font-size: 1.3rem; font-weight: 800; }
        #best-stat .value { color: var(--gold); }

        .toolbar { display: flex; gap: 8px; padding-bottom: 12px; }
        .tool-btn {
            padding: 9px 18px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--panel); color: var(--text); font-weight: 600; cursor: pointer;
        }
        .tool-btn:hover:not(:disabled) { border-color: var(--accent); }
        .tool-btn:disabled { opacity: .4; cursor: not-allowed; }

        .stage { position: relative; }
        .board {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
            padding: 10px; width: min(92vw, 420px); height: min(92vw, 420px);
            box-shadow: var(--shadow); touch-action: none;
        }
        .cell {
            background: var(--panel-2); border-radius: 10px; display: flex;
            align-items: center; justify-content: center;
            font-weight: 800; font-size: clamp(1.2rem, 7vw, 2rem); color: #776e65;
        }
        .cell.pop { animation: pop .18s ease; }
        .cell.merged { animation: mergePulse .22s ease; }
        @keyframes pop { from { transform: scale(.4); } to { transform: scale(1); } }
        @keyframes mergePulse { 0% { transform: scale(1); } 50% { transform: scale(1.18); } 100% { transform: scale(1); } }
        .cell[data-v="2"]    { background: #eee4da; }
        .cell[data-v="4"]    { background: #ede0c8; }
        .cell[data-v="8"]    { background: #f2b179; color: #fff; }
        .cell[data-v="16"]   { background: #f59563; color: #fff; }
        .cell[data-v="32"]   { background: #f67c5f; color: #fff; }
        .cell[data-v="64"]   { background: #f65e3b; color: #fff; }
        .cell[data-v="128"]  { background: #edcf72; color: #fff; font-size: clamp(1rem, 6vw, 1.7rem); }
        .cell[data-v="256"]  { background: #edcc61; color: #fff; font-size: clamp(1rem, 6vw, 1.7rem); }
        .cell[data-v="512"]  { background: #edc850; color: #fff; font-size: clamp(1rem, 6vw, 1.7rem); box-shadow: 0 0 18px rgba(237,200,80,.5); }
        .cell[data-v="1024"] { background: #edc53f; color: #fff; font-size: clamp(.9rem, 5vw, 1.4rem); box-shadow: 0 0 22px rgba(237,197,63,.55); }
        .cell[data-v="2048"] { background: #edc22e; color: #fff; font-size: clamp(.9rem, 5vw, 1.4rem); box-shadow: 0 0 28px rgba(237,194,46,.7); }

        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; gap: 10px;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
            background: rgba(10,12,18,.72); border-radius: 16px; backdrop-filter: blur(3px); z-index: 5;
        }
        body.light-mode .overlay { background: rgba(240,243,249,.82); }
        .overlay.hidden { display: none; }
        .overlay .big { font-size: 2rem; font-weight: 800; margin: 0; }
        .overlay .sub { color: var(--muted); margin: 0; }
        .overlay .new-best { color: var(--gold); font-weight: 800; }
        .overlay .row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn {
            padding: 12px 24px; font-size: 1rem; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 6px 18px rgba(139,92,246,.35); transition: transform .15s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn.ghost { background: var(--panel); color: var(--text); border: 1px solid var(--border); box-shadow: none; }
        .hint { color: var(--muted); font-size: .88rem; padding: 12px 16px; text-align: center; }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="back" href="index.html">← Hub</a>
        <h1>🧩 2048</h1>
        <button id="theme-btn" class="icon-btn" title="Toggle theme">☀️</button>
    </header>

    <div class="hud">
        <div class="stat"><div class="label">Score</div><div class="value" id="score">0</div></div>
        <div class="stat" id="best-stat"><div class="label">Best</div><div class="value" id="best">0</div></div>
    </div>

    <div class="toolbar">
        <button class="tool-btn" id="undo-btn" disabled>↩️ Undo</button>
        <button class="tool-btn" id="new-btn">🔄 New Game</button>
    </div>

    <div class="stage">
        <div class="board" id="board"></div>
        <div class="overlay hidden" id="overlay">
            <p class="big" id="ov-title"></p>
            <p class="sub" id="ov-sub"></p>
            <div class="row">
                <button class="btn" id="ov-new">New Game</button>
                <button class="btn ghost hidden" id="ov-continue">Keep Going</button>
            </div>
        </div>
    </div>

    <p class="hint">Arrow keys / WASD or swipe to move. Join tiles to reach <b>2048</b>!</p>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        function applyTheme() {
            const light = localStorage.getItem('theme') === 'light';
            document.body.classList.toggle('light-mode', light);
            themeBtn.textContent = light ? '🌙' : '☀️';
        }
        themeBtn.onclick = () => { localStorage.setItem('theme', localStorage.getItem('theme') === 'light' ? 'dark' : 'light'); applyTheme(); };
        applyTheme();

        const N = 4, BEST_KEY = 'mg-best-2048';
        let board, score, prev = null, won = false, over = false, keepPlaying = false;
        let best = +localStorage.getItem(BEST_KEY) || 0;
        let newTiles = new Set(), mergedTiles = new Set();

        const boardEl = document.getElementById('board');
        const overlay = document.getElementById('overlay');
        const undoBtn = document.getElementById('undo-btn');
        document.getElementById('best').textContent = best;

        function init() {
            board = Array.from({ length: N }, () => Array(N).fill(0));
            score = 0; prev = null; won = false; over = false; keepPlaying = false;
            newTiles.clear(); mergedTiles.clear();
            undoBtn.disabled = true;
            overlay.classList.add('hidden');
            addTile(); addTile();
            render();
        }

        function addTile() {
            const empty = [];
            for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) if (!board[r][c]) empty.push([r, c]);
            if (!empty.length) return;
            const [r, c] = empty[Math.floor(Math.random() * empty.length)];
            board[r][c] = Math.random() < 0.9 ? 2 : 4;
            newTiles.add(r * N + c);
        }

        function render() {
            boardEl.innerHTML = '';
            document.getElementById('score').textContent = score;
            document.getElementById('best').textContent = best;
            for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
                const d = document.createElement('div');
                d.className = 'cell';
                const v = board[r][c];
                if (v) {
                    d.dataset.v = v;
                    d.textContent = v;
                    if (newTiles.has(r * N + c)) d.classList.add('pop');
                    if (mergedTiles.has(r * N + c)) d.classList.add('merged');
                }
                boardEl.appendChild(d);
            }
            newTiles.clear(); mergedTiles.clear();
        }

        // Merge a line toward index 0; returns merged line + gained score + merge positions
        function mergeLine(line) {
            const vals = line.filter(v => v);
            const out = []; let gained = 0; const mergedAt = [];
            for (let i = 0; i < vals.length; i++) {
                if (i + 1 < vals.length && vals[i] === vals[i + 1]) {
                    out.push(vals[i] * 2);
                    gained += vals[i] * 2;
                    mergedAt.push(out.length - 1);
                    i++;
                } else {
                    out.push(vals[i]);
                }
            }
            while (out.length < N) out.push(0);
            return { out, gained, mergedAt };
        }

        function move(dr, dc) {
            const before = board.map(row => [...row]);
            const beforeScore = score;
            let moved = false;
            for (let i = 0; i < N; i++) {
                // extract line in movement order
                const line = [], coords = [];
                for (let j = 0; j < N; j++) {
                    const r = dc !== 0 ? i : (dr === 1 ? N - 1 - j : j);
                    const c = dr !== 0 ? i : (dc === 1 ? N - 1 - j : j);
                    line.push(board[r][c]); coords.push([r, c]);
                }
                const { out, gained, mergedAt } = mergeLine(line);
                score += gained;
                for (let j = 0; j < N; j++) {
                    const [r, c] = coords[j];
                    if (board[r][c] !== out[j]) moved = true;
                    board[r][c] = out[j];
                    if (mergedAt.includes(j)) mergedTiles.add(r * N + c);
                }
            }
            if (!moved) { score = beforeScore; mergedTiles.clear(); return; }
            prev = { board: before, score: beforeScore };
            undoBtn.disabled = false;
            addTile();
            if (score > best) { best = score; localStorage.setItem(BEST_KEY, best); }
            render();
            checkEnd();
        }

        function checkEnd() {
            if (!won && !keepPlaying && board.some(row => row.some(v => v === 2048))) {
                won = true;
                showOverlay('🎉 You made 2048!', `Score: ${score}`, true);
                return;
            }
            for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
                if (!board[r][c]) return;
                if (r + 1 < N && board[r][c] === board[r + 1][c]) return;
                if (c + 1 < N && board[r][c] === board[r][c + 1]) return;
            }
            over = true;
            const isBest = score >= best && score > 0;
            showOverlay('💀 Game Over', `Score: ${score}` + (isBest ? ' · 🏆 New best!' : ` · Best: ${best}`), false);
        }

        function showOverlay(title, sub, canContinue) {
            document.getElementById('ov-title').textContent = title;
            document.getElementById('ov-sub').textContent = sub;
            document.getElementById('ov-continue').classList.toggle('hidden', !canContinue);
            overlay.classList.remove('hidden');
        }

        document.getElementById('ov-new').onclick = init;
        document.getElementById('new-btn').onclick = init;
        document.getElementById('ov-continue').onclick = () => { keepPlaying = true; overlay.classList.add('hidden'); };
        undoBtn.onclick = () => {
            if (!prev) return;
            board = prev.board.map(row => [...row]);
            score = prev.score;
            prev = null; over = false;
            undoBtn.disabled = true;
            overlay.classList.add('hidden');
            render();
        };

        document.addEventListener('keydown', e => {
            if (!overlay.classList.contains('hidden')) return;
            const map = {
                ArrowUp: [-1, 0], ArrowDown: [1, 0], ArrowLeft: [0, -1], ArrowRight: [0, 1],
                w: [-1, 0], s: [1, 0], a: [0, -1], d: [0, 1]
            };
            const m = map[e.key] || map[e.key.toLowerCase && e.key.toLowerCase()];
            if (m && !over) { e.preventDefault(); move(m[0], m[1]); }
        });

        let touchStart = null;
        boardEl.addEventListener('pointerdown', e => { touchStart = { x: e.clientX, y: e.clientY }; });
        boardEl.addEventListener('pointerup', e => {
            if (!touchStart || over || !overlay.classList.contains('hidden')) { touchStart = null; return; }
            const dx = e.clientX - touchStart.x, dy = e.clientY - touchStart.y;
            touchStart = null;
            if (Math.max(Math.abs(dx), Math.abs(dy)) < 28) return;
            if (Math.abs(dx) > Math.abs(dy)) move(0, dx > 0 ? 1 : -1);
            else move(dy > 0 ? 1 : -1, 0);
        });

        init();
    </script>
</body>
</html>
