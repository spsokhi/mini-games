<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku — Mini-Game Hub</title>
    <style>
        :root {
            --bg: #0f1117; --panel: #171a23; --panel-2: #1e2230; --border: #2a2f3f;
            --text: #e8eaf2; --muted: #9aa1b5; --accent: #8b5cf6; --accent-2: #22d3ee;
            --good: #34d399; --bad: #f87171; --gold: #fbbf24; --shadow: 0 10px 30px rgba(0,0,0,.35);
            --hl: rgba(139, 92, 246, .14); --hl-strong: rgba(139, 92, 246, .32);
        }
        body.light-mode {
            --bg: #eef1f7; --panel: #ffffff; --panel-2: #f3f5fa; --border: #d8dce8;
            --text: #232735; --muted: #5b6274; --shadow: 0 10px 30px rgba(35,39,53,.12);
            --hl: rgba(139, 92, 246, .1); --hl-strong: rgba(139, 92, 246, .25);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(900px 450px at 80% -10%, rgba(34,211,238,.1), transparent 60%), var(--bg);
            color: var(--text); transition: background-color .3s, color .3s;
        }
        .topbar {
            width: 100%; max-width: 560px; display: flex; align-items: center;
            justify-content: space-between; gap: 10px; padding: 14px 16px;
        }
        .back { color: var(--muted); text-decoration: none; font-weight: 600; padding: 8px 12px; border-radius: 10px; }
        .back:hover { color: var(--text); background: var(--panel); }
        h1 { font-size: 1.5rem; margin: 0; }
        .icon-btn {
            background: var(--panel); border: 1px solid var(--border); color: var(--text);
            width: 40px; height: 40px; border-radius: 10px; font-size: 1.05rem; cursor: pointer;
        }
        .icon-btn:hover { border-color: var(--accent); }

        .modes { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 4px 16px 10px; }
        .mode-btn {
            padding: 9px 16px; border-radius: 999px; border: 1px solid var(--border);
            background: var(--panel); color: var(--muted); font-weight: 600; cursor: pointer;
            transition: all .15s ease;
        }
        .mode-btn:hover { border-color: var(--accent); color: var(--text); }
        .mode-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #fff; border-color: transparent;
        }

        .hud { display: flex; gap: 10px; padding-bottom: 12px; flex-wrap: wrap; justify-content: center; }
        .stat {
            background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
            padding: 7px 16px; text-align: center; min-width: 86px;
        }
        .stat .label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
        .stat .value { font-size: 1.2rem; font-weight: 800; font-variant-numeric: tabular-nums; }
        #best-el .value { color: var(--gold); }

        .stage { position: relative; }
        .grid {
            display: grid; grid-template-columns: repeat(9, 1fr);
            width: min(94vw, 440px); aspect-ratio: 1;
            background: var(--border); border: 2px solid var(--muted); border-radius: 10px;
            overflow: hidden; gap: 1px; box-shadow: var(--shadow);
        }
        .cell {
            background: var(--panel); display: flex; align-items: center; justify-content: center;
            font-size: clamp(1rem, 4vw, 1.35rem); font-weight: 600; cursor: pointer;
            user-select: none; -webkit-tap-highlight-color: transparent; position: relative;
        }
        /* thick 3x3 separators */
        .cell.bx { border-left: 2px solid var(--muted); }
        .cell.by { border-top: 2px solid var(--muted); }
        .cell.fixed { font-weight: 800; }
        .cell.user { color: var(--accent-2); }
        .cell.hl { background: var(--hl); }
        .cell.same { background: var(--hl-strong); }
        .cell.selected { background: var(--hl-strong); box-shadow: inset 0 0 0 2px var(--accent); }
        .cell.conflict { color: var(--bad) !important; }
        .cell.conflict::after {
            content: ''; position: absolute; inset: 0; background: rgba(248,113,113,.14); pointer-events: none;
        }
        .cell.hinted { animation: hintFlash .8s ease; }
        @keyframes hintFlash { 0% { background: rgba(251,191,36,.5); } }

        .numpad {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
            width: min(94vw, 440px); padding: 14px 0 6px;
        }
        .numpad button {
            padding: 12px 0; font-size: 1.15rem; font-weight: 700;
            border: 1px solid var(--border); border-radius: 10px;
            background: var(--panel); color: var(--text); cursor: pointer; transition: all .12s ease;
        }
        .numpad button:hover { border-color: var(--accent); transform: translateY(-2px); }
        .numpad .erase { color: var(--bad); }

        .toolbar { display: flex; gap: 8px; padding: 6px 0 16px; flex-wrap: wrap; justify-content: center; }
        .tool-btn {
            padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--panel); color: var(--text); font-weight: 600; cursor: pointer;
        }
        .tool-btn:hover:not(:disabled) { border-color: var(--accent); }
        .tool-btn:disabled { opacity: .4; cursor: not-allowed; }

        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; gap: 10px;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
            background: rgba(10,12,18,.8); border-radius: 10px; backdrop-filter: blur(3px); z-index: 5;
        }
        body.light-mode .overlay { background: rgba(240,243,249,.86); }
        .overlay.hidden { display: none; }
        .overlay .big { font-size: 1.9rem; font-weight: 800; margin: 0; }
        .overlay .sub { color: var(--muted); margin: 0; line-height: 1.7; }
        .overlay .new-best { color: var(--gold); font-weight: 800; }
        .btn {
            padding: 12px 26px; font-size: 1rem; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 6px 18px rgba(139,92,246,.35); transition: transform .15s;
        }
        .btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="back" href="index.html">← Hub</a>
        <h1>🔢 Sudoku</h1>
        <button id="theme-btn" class="icon-btn" title="Toggle theme">☀️</button>
    </header>

    <div class="modes">
        <button class="mode-btn active" data-diff="easy">😊 Easy</button>
        <button class="mode-btn" data-diff="medium">🤔 Medium</button>
        <button class="mode-btn" data-diff="hard">🔥 Hard</button>
    </div>

    <div class="hud">
        <div class="stat"><div class="label">Time</div><div class="value" id="time">0:00</div></div>
        <div class="stat" id="best-el"><div class="label">Best</div><div class="value" id="best">—</div></div>
        <div class="stat"><div class="label">Hints</div><div class="value" id="hints">3</div></div>
    </div>

    <div class="stage">
        <div class="grid" id="grid"></div>
        <div class="overlay hidden" id="overlay">
            <p class="big" id="ov-title"></p>
            <p class="sub" id="ov-sub"></p>
            <button class="btn" id="ov-btn">New Puzzle</button>
        </div>
    </div>

    <div class="numpad" id="numpad"></div>

    <div class="toolbar">
        <button class="tool-btn" id="hint-btn">💡 Hint</button>
        <button class="tool-btn" id="clear-btn">🧹 Clear My Entries</button>
        <button class="tool-btn" id="new-btn">🔄 New Puzzle</button>
    </div>

    <script>
        const themeBtn = document.getElementById('theme-btn');
        function applyTheme() {
            const light = localStorage.getItem('theme') === 'light';
            document.body.classList.toggle('light-mode', light);
            themeBtn.textContent = light ? '🌙' : '☀️';
        }
        themeBtn.onclick = () => { localStorage.setItem('theme', localStorage.getItem('theme') === 'light' ? 'dark' : 'light'); applyTheme(); };
        applyTheme();

        const DIFFS = { easy: 38, medium: 46, hard: 52 }; // cells removed
        function bestKey(d) { return 'mg-best-sudoku-' + d; }

        let diff = 'easy';
        let solution, puzzle, board, fixed, selected = null;
        let seconds = 0, timerId = null, active = false, hintsLeft = 3;

        const gridEl = document.getElementById('grid');
        const overlay = document.getElementById('overlay');

        function fmt(s) { return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); }

        // --- generation (randomized backtracking → different solution every time) ---
        function shuffle(a) {
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }
        function isValid(g, r, c, n) {
            for (let i = 0; i < 9; i++)
                if (g[r][i] === n || g[i][c] === n) return false;
            const br = Math.floor(r / 3) * 3, bc = Math.floor(c / 3) * 3;
            for (let i = br; i < br + 3; i++)
                for (let j = bc; j < bc + 3; j++)
                    if (g[i][j] === n) return false;
            return true;
        }
        function solve(g) {
            for (let r = 0; r < 9; r++) for (let c = 0; c < 9; c++) {
                if (g[r][c] === 0) {
                    for (const n of shuffle([1,2,3,4,5,6,7,8,9])) {
                        if (isValid(g, r, c, n)) {
                            g[r][c] = n;
                            if (solve(g)) return true;
                            g[r][c] = 0;
                        }
                    }
                    return false;
                }
            }
            return true;
        }
        function generate() {
            solution = Array.from({ length: 9 }, () => Array(9).fill(0));
            solve(solution);
            puzzle = solution.map(r => [...r]);
            const spots = shuffle(Array.from({ length: 81 }, (_, i) => i)).slice(0, DIFFS[diff]);
            spots.forEach(i => { puzzle[Math.floor(i / 9)][i % 9] = 0; });
        }

        function newPuzzle() {
            generate();
            board = puzzle.map(r => [...r]);
            fixed = puzzle.map(r => r.map(v => v !== 0));
            selected = null;
            seconds = 0; hintsLeft = 3; active = true;
            clearInterval(timerId);
            timerId = setInterval(() => {
                seconds++;
                document.getElementById('time').textContent = fmt(seconds);
            }, 1000);
            document.getElementById('time').textContent = '0:00';
            document.getElementById('hints').textContent = hintsLeft;
            document.getElementById('hint-btn').disabled = false;
            overlay.classList.add('hidden');
            showBest();
            render();
        }

        function showBest() {
            const b = localStorage.getItem(bestKey(diff));
            document.getElementById('best').textContent = b ? fmt(+b) : '—';
        }

        function conflicts() {
            const bad = new Set();
            const groups = [];
            for (let i = 0; i < 9; i++) {
                groups.push(Array.from({ length: 9 }, (_, j) => [i, j]));           // row
                groups.push(Array.from({ length: 9 }, (_, j) => [j, i]));           // col
                const br = Math.floor(i / 3) * 3, bc = (i % 3) * 3;                 // box
                const box = [];
                for (let r = br; r < br + 3; r++) for (let c = bc; c < bc + 3; c++) box.push([r, c]);
                groups.push(box);
            }
            groups.forEach(cellsInGroup => {
                const seen = {};
                cellsInGroup.forEach(([r, c]) => {
                    const v = board[r][c];
                    if (!v) return;
                    if (seen[v] !== undefined) { bad.add(r * 9 + c); bad.add(seen[v]); }
                    else seen[v] = r * 9 + c;
                });
            });
            return bad;
        }

        function render() {
            const bad = conflicts();
            gridEl.innerHTML = '';
            const selVal = selected !== null ? board[Math.floor(selected / 9)][selected % 9] : 0;
            for (let r = 0; r < 9; r++) for (let c = 0; c < 9; c++) {
                const i = r * 9 + c;
                const d = document.createElement('div');
                d.className = 'cell';
                if (c % 3 === 0 && c !== 0) d.classList.add('bx');
                if (r % 3 === 0 && r !== 0) d.classList.add('by');
                const v = board[r][c];
                if (v) d.textContent = v;
                if (fixed[r][c]) d.classList.add('fixed'); else if (v) d.classList.add('user');
                if (bad.has(i)) d.classList.add('conflict');
                if (selected !== null) {
                    const sr = Math.floor(selected / 9), sc = selected % 9;
                    if (i === selected) d.classList.add('selected');
                    else if (r === sr || c === sc ||
                        (Math.floor(r / 3) === Math.floor(sr / 3) && Math.floor(c / 3) === Math.floor(sc / 3)))
                        d.classList.add('hl');
                    else if (v && v === selVal) d.classList.add('same');
                }
                d.onclick = () => { selected = i; render(); };
                gridEl.appendChild(d);
            }
        }

        function input(n) {
            if (!active || selected === null) return;
            const r = Math.floor(selected / 9), c = selected % 9;
            if (fixed[r][c]) return;
            board[r][c] = n;
            render();
            checkWin();
        }

        function checkWin() {
            for (let r = 0; r < 9; r++) for (let c = 0; c < 9; c++) if (!board[r][c]) return;
            if (conflicts().size) return;
            active = false;
            clearInterval(timerId);
            const key = bestKey(diff);
            const prev = +localStorage.getItem(key) || Infinity;
            const isBest = seconds < prev;
            if (isBest) localStorage.setItem(key, seconds);
            document.getElementById('ov-title').textContent = '🎉 Solved!';
            document.getElementById('ov-sub').innerHTML =
                `Time: <b>${fmt(seconds)}</b> · Difficulty: ${diff}<br>` +
                (isBest ? '<span class="new-best">🏆 New best time!</span>' : `Best: ${fmt(Math.min(prev, seconds))}`);
            overlay.classList.remove('hidden');
            showBest();
        }

        document.getElementById('hint-btn').onclick = () => {
            if (!active || hintsLeft <= 0) return;
            // fill the selected empty/incorrect cell, otherwise a random empty one
            let target = null;
            if (selected !== null) {
                const r = Math.floor(selected / 9), c = selected % 9;
                if (!fixed[r][c] && board[r][c] !== solution[r][c]) target = [r, c];
            }
            if (!target) {
                const empties = [];
                for (let r = 0; r < 9; r++) for (let c = 0; c < 9; c++)
                    if (!fixed[r][c] && board[r][c] !== solution[r][c]) empties.push([r, c]);
                if (!empties.length) return;
                target = empties[Math.floor(Math.random() * empties.length)];
            }
            const [r, c] = target;
            board[r][c] = solution[r][c];
            hintsLeft--;
            document.getElementById('hints').textContent = hintsLeft;
            if (hintsLeft === 0) document.getElementById('hint-btn').disabled = true;
            selected = r * 9 + c;
            render();
            gridEl.children[r * 9 + c].classList.add('hinted');
            checkWin();
        };

        document.getElementById('clear-btn').onclick = () => {
            if (!active) return;
            board = puzzle.map(r => [...r]);
            render();
        };
        document.getElementById('new-btn').onclick = newPuzzle;
        document.getElementById('ov-btn').onclick = newPuzzle;

        // numpad
        const numpad = document.getElementById('numpad');
        for (let n = 1; n <= 9; n++) {
            const b = document.createElement('button');
            b.textContent = n;
            b.onclick = () => input(n);
            numpad.appendChild(b);
        }
        const eraseBtn = document.createElement('button');
        eraseBtn.textContent = '⌫';
        eraseBtn.className = 'erase';
        eraseBtn.onclick = () => input(0);
        numpad.appendChild(eraseBtn);

        document.addEventListener('keydown', e => {
            if (e.key >= '1' && e.key <= '9') input(+e.key);
            else if (e.key === 'Backspace' || e.key === 'Delete' || e.key === '0') input(0);
            else if (e.key.startsWith('Arrow') && selected !== null) {
                e.preventDefault();
                let r = Math.floor(selected / 9), c = selected % 9;
                if (e.key === 'ArrowUp') r = Math.max(0, r - 1);
                if (e.key === 'ArrowDown') r = Math.min(8, r + 1);
                if (e.key === 'ArrowLeft') c = Math.max(0, c - 1);
                if (e.key === 'ArrowRight') c = Math.min(8, c + 1);
                selected = r * 9 + c;
                render();
            }
        });

        document.querySelectorAll('.mode-btn').forEach(b => {
            b.onclick = () => {
                document.querySelectorAll('.mode-btn').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                diff = b.dataset.diff;
                newPuzzle();
            };
        });

        newPuzzle();
    </script>
</body>
</html>
